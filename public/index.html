    /** navigate(event, path) — use in onclick handlers for <a> tags */
    function navigate(e, path) {
      if (e) { e.preventDefault(); e.stopPropagation(); }
      if (path === location.pathname + location.search) return;
      history.pushState(null, '', path);
      route();
    }

    /** go(path) — programmatic navigation */
    function go(path) {
      history.pushState(null, '', path);
      route();
    }

    window.addEventListener('popstate', () => route());

    function route() {
      const p = location.pathname;
      const q = new URLSearchParams(location.search);

      // Hide quiz bar by default; pages that need it show it themselves
      hideBar();
      setP(10);

      // Topbar visibility — hide on admin pages (admin has own sidebar)
      const isAdminPage = p.startsWith('/admin');
      $('main-topbar').style.display = isAdminPage ? 'none' : '';

      // Show lang button only when user is signed in (not on landing — landing has its own)
      const langBtn = $('lang-toggle-btn');
      if (langBtn) langBtn.style.display = (currentUser && p !== '/') ? '' : 'none';

      // Dispatch
      if (p === '/') return renderLanding();
      if (p === '/account' || p === '/user/account' || p === '/admin/account') return renderLogin();
      if (p === '/user/dashboard') return requireAuth(() => renderUserDashboard());
      if (p === '/user/topics') return requireAuth(() => renderTopics());
      if (p === '/quizzes/create') return requireAuth(() => renderConfigure());
      if (p === '/quizzes') return requireAuth(() => renderQuizLibrary());
      if (p === '/admin/dashboard') return requireAdmin(() => renderAdmin('dashboard'));
      if (p === '/admin/users') return requireAdmin(() => renderAdmin('users'));
      if (p === '/admin/results') return requireAdmin(() => renderAdmin('results'));
      if (p === '/admin/quizzes') return requireAdmin(() => renderAdmin('quizzes'));

      // /quizzes/:id/results
      const rm = p.match(/^\/quizzes\/([^/]+)\/results$/);
      if (rm) return requireAuth(() => renderResultPage(rm[1], q.get('uid')));

      // /quizzes/:id
      const qm = p.match(/^\/quizzes\/([^/]+)$/);
      if (qm) return renderQuizAttemptOrPreview(qm[1], q);

      // 404
      setV(`<div class="page"><div class="state-box">
    <div class="state-icon warn"><i class="fa-solid fa-map-pin"></i></div>
    <div class="state-title">Page Not Found</div>
    <div class="state-desc">The page <code>${p}</code> doesn't exist.</div>
    <button class="btn btn-accent" onclick="go('/')">Go Home</button>
  </div></div>`);
    }

    function requireAuth(fn) {
      if (!authToken || !currentUser) { go('/account'); return; }
      fn();
    }
    function requireAdmin(fn) {
      if (!authToken || !currentUser) { go('/account'); return; }
      if (currentUser.role !== 'admin' && currentUser.uid !== 'admin') { go('/'); return; }
      fn();
    }

      if (!profession) { go('/user/topics'); return; }
      setP(60);
      const nm = lang === 'ur' ? profession.label_ur : profession.label_en;
      const concepts = profession.concepts.join(', ');
      const ql = profession.lang === 'ur' ? 'Urdu' : 'English';
      setV(`<div class="page" style="animation:fadeUp .2s ease both">
    <div class="loader-wrap">
      <div class="spinner" style="width:48px;height:48px;border-width:4px"></div>
      <div class="loader-title">${t('generating')}</div>
      <div class="loader-sub">${t('generating_sub')}</div>
      <div style="font-size:12px;color:var(--fg-subtle);font-family:var(--font-mono);margin-top:8px">${profession.id} · ${qCount} questions</div>
    </div>
  </div>`);
      try {
        const controller = new AbortController();
        const to = setTimeout(() => controller.abort(), 90000);
        let res;
        try {
          res = await fetch('/api/generate', {
            method: 'POST', signal: controller.signal,
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
            body: JSON.stringify({
              topic: `${profession.label_en} for AJK PSC`, count: qCount,
              concepts, lang: ql, professionId: profession.id
            })
          });
        } finally { clearTimeout(to); }
        if (!res.ok) {
          const d = await res.json().catch(() => ({}));
          throw new Error(d.error || `Server error ${res.status}`);
        }
        const data = await res.json();
        if (!data.questions?.length) throw new Error('No questions returned by AI.');
        quiz = data.questions; answers = {}; qIdx = 0;
        currentQuizId = data.quizId || null;
        currentQuizSource = data.source || 'ai';
        if (currentQuizSource === 'cache') toast(t('quiz_cached'), 'warn');
        startTime = Date.now();
        if (timerID) clearInterval(timerID);
        timerID = setInterval(updateBar, 1000);
        // Navigate to quiz URL (shareable)
        if (currentQuizId) {
          history.replaceState(null, '', `/quizzes/${currentQuizId}`);
        }
        setP(70); renderQuiz(0);
      } catch (e) {
        const isAbort = e.name === 'AbortError';
        setV(`<div class="page"><div class="state-box">
      <div class="state-icon error"><i class="fa-solid fa-triangle-exclamation"></i></div>
      <div class="state-title">${isAbort ? 'Timed Out' : 'Generation Failed'}</div>
      <div class="state-desc">${isAbort ? 'AI took too long. Try fewer questions.' : e.message}</div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button class="btn btn-accent" onclick="doGenerate()"><i class="fa-solid fa-rotate-right"></i> Try Again</button>
        <button class="btn btn-ghost" onclick="go('/quizzes/create')"><i class="fa-solid fa-arrow-left"></i> ${t('back')}</button>
      </div>
    </div></div>`);
      }
    }

    /* ═══════════════════════════════════════════════════════════════════════
       QUIZ ATTEMPT  /quizzes/:id
    ═══════════════════════════════════════════════════════════════════════ */

    /** Called by router for /quizzes/:id */
    async function renderQuizAttemptOrPreview(quizId, params) {
      // If quiz is already loaded in memory for this quizId, render it directly
      if (quiz && currentQuizId === quizId) {
        renderQuiz(qIdx);
        return;
      }
      // Public preview mode (no auth) OR auth attempt
      if (!authToken || !currentUser) {
        renderQuizPublicPreview(quizId);
        return;
      }
      // Authenticated — check topic access before loading
      const isAdmin = currentUser?.role === 'admin' || currentUser?.uid === 'admin';
      setP(30);
      setV(`<div class="page"><div class="loader-wrap"><div class="spinner"></div><div class="loader-title">Loading quiz…</div></div></div>`);
      try {
        const { ok, data } = await api('GET', `/api/quizzes/${quizId}`);
        if (!ok) {
          const isAccessDenied = data.error?.includes('Forbidden') || data.error?.includes('plan');
          setV(`<div class="page"><div class="state-box">
        <div class="state-icon error"><i class="fa-solid fa-${isAccessDenied ? 'lock' : 'triangle-exclamation'}"></i></div>
        <div class="state-title">${isAccessDenied ? 'Access Denied' : 'Quiz Not Found'}</div>
        <div class="state-desc">${isAccessDenied ? 'This quiz belongs to a topic not included in your plan. Contact admin to get access.' : data.error || 'This quiz does not exist.'}</div>
        <div style="display:flex;gap:10px;margin-top:8px">
          <button class="btn btn-accent" onclick="go('/quizzes')">My Quiz Library</button>
          ${isAccessDenied ? `<a href="https://wa.me/923428910567" target="_blank" class="btn btn-ghost"><i class="fa-brands fa-whatsapp"></i> Contact Admin</a>` : ''}
        </div>
      </div></div>`);
          return;
        }
        quiz = data.questions;
        answers = {};
        qIdx = 0;
        currentQuizId = quizId;
        currentQuizSource = data._source || 'ai';
        startTime = Date.now();
        // Set profession from quiz data for result display
        if (data.professionId && PROF_MAP[data.professionId]) {
          profession = PROF_MAP[data.professionId];
        } else if (!profession) {
          // synthetic profession object
          profession = { id: data.professionId || 'unknown', label_en: data.topic || 'Quiz', label_ur: data.topic || 'کوئز', lang: 'en' };
        }
        if (timerID) clearInterval(timerID);
        timerID = setInterval(updateBar, 1000);
        setP(70);
        renderQuiz(0);
      } catch (e) {
        toast(e.message, 'error');
        go('/quizzes');
      }
    }

    /** Public preview — no correct answers shown */
    async function renderQuizPublicPreview(quizId) {
      setP(20);
      setV(`<div class="page"><div class="loader-wrap"><div class="spinner"></div><div class="loader-title">Loading quiz…</div></div></div>`);
      try {
        const { ok, data } = await api('GET', `/api/quizzes/${quizId}?preview=1`, null, true);
        if (!ok) { setV(`<div class="page"><div class="state-box"><div class="state-icon error"><i class="fa-solid fa-triangle-exclamation"></i></div><div class="state-title">Quiz Not Found</div><div class="state-desc">${data.error || 'This quiz does not exist.'}</div><button class="btn btn-ghost" onclick="go('/quizzes')">Quiz Library</button></div></div>`); return; }
          const items = (data.questions || []).map((q, i) => {
            const qHtml = mdInline(q.question);
            return `
        <div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:10px">
          <div style="font-weight:600;font-size:14px;margin-bottom:12px" class="md">${i + 1}. ${qHtml}</div>
          <div style="display:flex;flex-direction:column;gap:6px">
            ${(q.options || []).map((o, j) => `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-md);font-size:13px">
              <div style="width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border-strong);display:grid;place-items:center;font-size:11px;font-weight:700;font-family:var(--font-mono);flex-shrink:0">${'ABCD'[j]}</div><span class="md">${mdInline(o)}</span>
            </div>`).join('')}
          </div>
        </div>`;
          }).join('');
        setV(`<div class="page" style="animation:fadeUp .25s ease both">
      <div class="page-header">
        <div class="page-breadcrumb">
          <span data-nav onclick="go('/quizzes')">Quiz Library</span>
          <span class="sep">/</span><span class="current">Preview</span>
        </div>
        <div class="page-title">${data.topic || 'Quiz'}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
          ${data.professionId ? `<span class="badge badge-default">${data.professionId}</span>` : ''}
          <span class="badge badge-default">${data.count} questions</span>
          <span class="badge badge-default">${(data.lang || '').toUpperCase()}</span>
        </div>
      </div>
      <div class="callout" style="background:var(--accent-subtle);border:1px solid var(--accent-border);border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px;font-size:13px">
        <i class="fa-solid fa-lock" style="color:var(--accent)"></i>
        <div><strong>Sign in to attempt this quiz</strong> — Correct answers are hidden in preview mode.
          <button class="btn btn-accent btn-sm" onclick="go('/account')" style="margin-inline-start:10px">Sign In</button>
        </div>
      </div>
      ${items}
      </div>`);
          applyMath($('main-content'));
          setP(100);
      } catch (e) { toast(e.message, 'error'); }
    }

    /* ═══════════════════════════════════════════════════════════════════════
       QUIZ UI (shared between generate flow and direct URL)
    ═══════════════════════════════════════════════════════════════════════ */
    function renderQuiz(idx) {
      qIdx = idx;
      const q = quiz[idx], total = quiz.length, answered = Object.keys(answers).length;
      const isRTL = profession?.lang === 'ur';
      const qHtml = mdInline(q.question);
      updateBar(answered, total); showBar();
      setP(70 + (answered / total) * 20);
      const opts = q.options.map((o, i) => {
        const sel = answers[idx] === o;
        return `<button class="option-btn ${sel ? 'selected' : ''}" data-answer="${encodeURIComponent(o)}" onclick="pickAnswer(${idx},this)">
          <div class="option-letter">${'ABCD'[i]}</div>
          <span class="option-text md" style="${isRTL ? 'direction:rtl' : ''}">${mdInline(o)}</span>
        </button>`;
      }).join('');
      const dots = quiz.map((_, i) => `<div class="q-dot ${i === idx ? 'current' : answers[i] !== undefined ? 'answered' : ''}" onclick="renderQuiz(${i})">${i + 1}</div>`).join('');
      const topicLabel = profession ? (lang === 'ur' ? profession.label_ur : profession.label_en) : 'Quiz';
      setV(`<div class="page page-md" style="animation:fadeUp .2s ease both">
    <div class="page-breadcrumb" style="margin-bottom:12px">
      <span data-nav onclick="go('/user/topics')">${t('choose_topic')}</span>
      <span class="sep">/</span><span>${topicLabel}</span><span class="sep">/</span>
      <span class="current">Question ${idx + 1}</span>
    </div>
    <div class="question-card">
      <div class="question-head">
        <span class="question-num">${t('q_of', { n: idx + 1, total })}</span>
        <span class="badge badge-${answered === total ? 'success' : 'default'}">${answered}/${total} ${t('answered')}</span>
        ${currentQuizSource === 'cache' ? `<span class="badge" style="background:var(--warning-subtle);color:var(--warning);font-size:10px">${t('quiz_source_cache')}</span>` : ''}
        </div>
        <div class="question-body">
          <div class="question-text md" style="${isRTL ? 'direction:rtl;text-align:right' : ''}">${qHtml}</div>
          <div class="options-list">${opts}</div>
        </div>
      <div class="question-nav">
        <button class="btn btn-ghost" onclick="renderQuiz(${idx - 1})" ${idx === 0 ? 'disabled' : ''}>
          <i class="fa-solid fa-arrow-left"></i> ${t('back')}
        </button>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost btn-sm" onclick="openQNav()"><i class="fa-solid fa-grip"></i></button>
          <button class="btn ${idx < total - 1 ? 'btn-ghost' : 'btn-accent'}" onclick="${idx < total - 1 ? `renderQuiz(${idx + 1})` : 'openSubmitModal()'}">
            ${idx < total - 1 ? `${t('next')} <i class="fa-solid fa-arrow-right"></i>` : `<i class="fa-solid fa-flag-checkered"></i> ${t('submit_quiz')}`}
          </button>
        </div>
      </div>
    </div>
    <div class="mob-q-nav">
      <div class="mob-q-nav-head" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.mob-nav-chevron').style.transform=this.nextElementSibling.classList.contains('open')?'rotate(180deg)':''">
        <span><i class="fa-solid fa-grip" style="margin-inline-end:6px;font-size:11px"></i>${t('answered_of', { n: answered, total })}</span>
        <i class="fa-solid fa-chevron-down mob-nav-chevron" style="font-size:10px;transition:transform 200ms"></i>
      </div>
      <div class="mob-q-nav-body">
        <div class="q-grid">${dots}</div>
      </div>
    </div>
    </div>`);
      applyMath($('main-content'));
    }

    function pickAnswer(idx, btn) {
      const answer = decodeURIComponent(btn.dataset.answer || '');
      answers[idx] = answer;
      btn.closest('.options-list').querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      const dot = document.querySelectorAll('.q-dot')[idx];
      if (dot) { dot.classList.remove('current'); dot.classList.add('answered'); }
      updateBar();
      setTimeout(() => { if (idx < quiz.length - 1) renderQuiz(idx + 1); else openSubmitModal(); }, 400);
    }

    function updateBar() {
      const answered = Object.keys(answers).length, total = quiz?.length || 0;
      const el = $('sb-answered'); if (el) el.textContent = t('answered_of', { n: answered, total });
      const tel = $('sb-time');
      if (tel && startTime) {
        const e = Math.floor((Date.now() - startTime) / 1000);
        tel.textContent = `${String(Math.floor(e / 60)).padStart(2, '0')}:${String(e % 60).padStart(2, '0')}`;
      }
    }
    function openQNav() {
      const total = quiz.length, answered = Object.keys(answers).length;
      const grid = quiz.map((_, i) => `<div class="q-dot ${i === qIdx ? 'current' : answers[i] !== undefined ? 'answered' : ''}"
    onclick="closeModal();renderQuiz(${i})" style="width:36px;height:36px;font-size:12px;cursor:pointer">${i + 1}</div>`).join('');
      modal('Questions', `<div style="font-size:13px;color:var(--fg-muted);margin-bottom:12px">${answered}/${total} answered</div>
    <div class="q-grid" style="gap:8px">${grid}</div>`,
        `<button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>`);
    }
    function openSubmitModal() {
      const total = quiz.length, unanswered = total - Object.keys(answers).length;
      if (unanswered > 0) {
        modal(t('submit_quiz'),
          `<div class="callout warn"><i class="fa-solid fa-triangle-exclamation"></i>
       <div><div style="font-weight:600;margin-bottom:4px">${t('unanswered', { n: unanswered })}</div>
       <div style="font-size:13px">${t('unanswered_tip')}</div></div></div>`,
          `<button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
       <button class="btn btn-accent" onclick="closeModal();submitQuiz()">${t('submit_anyway')}</button>`);
      } else { submitQuiz(); }
    }
    function submitQuiz() { closeModal(); if (timerID) clearInterval(timerID); saveAndRenderResults(); }

    /* ═══════════════════════════════════════════════════════════════════════
       RESULTS  /quizzes/:id/results
    ═══════════════════════════════════════════════════════════════════════ */

    /** Called after quiz submission — saves result and navigates to results URL */
    async function saveAndRenderResults() {
      hideBar(); setP(95);
      const total = quiz.length;
      let score = 0;
      const items = quiz.map((q, i) => {
        const sel = answers[i]; const isC = sel === q.correctAnswer; const sk = sel === undefined;
        if (isC) score++;
        return { question: q.question, options: q.options, correctAnswer: q.correctAnswer, selectedAnswer: sel || null, isCorrect: isC, skipped: sk };
      });
      const elapsed = startTime ? Math.floor((Date.now() - startTime) / 1000) : 0;
      const timeStr = `${Math.floor(elapsed / 60)}m ${elapsed % 60}s`;
      const pct = (score / total) * 100, pass = pct >= 60;
      const wrong = items.filter(x => !x.isCorrect && !x.skipped).length;
      const skip = items.filter(x => x.skipped).length;

      // Save result — non-blocking, but we want the resultId for the URL
      let savedResultId = null;
      try {
        const { ok, data } = await api('POST', '/api/results', {
          profession: profession?.id || 'unknown', professionLabel: profession?.label_en || 'Quiz',
          score, total, percentage: pct, pass, wrong, skipped: skip, timeTaken: timeStr,
          quizId: currentQuizId, quizSource: currentQuizSource,
          answers: items.map(({ question, correctAnswer, selectedAnswer, isCorrect, skipped }) =>
            ({ question, correctAnswer, selectedAnswer, isCorrect, skipped }))
        });
        if (ok) savedResultId = data.resultId;
      } catch (e) { console.warn('Result save failed:', e.message); }

      // Store in memory for result page render
      window._lastResult = { items, score, total, pct, pass, wrong, skip, timeStr, savedResultId };
      window._lastQuizItems = items;

      // Navigate to shareable results URL
      const uid = currentUser?.uid;
      if (currentQuizId) {
        const resultsPath = `/quizzes/${currentQuizId}/results${uid ? `?uid=${uid}` : ''}`;
        history.replaceState(null, '', resultsPath);
      }
      setP(100);
      renderResultsPage(items, score, total, pct, pass, wrong, skip, timeStr, savedResultId);
    }

    /** renderResultPage — called by router for /quizzes/:id/results (deeplink) */
    async function renderResultPage(quizId, uid) {
      // If we have in-memory results for this quiz, render them directly
      if (window._lastResult && currentQuizId === quizId) {
        const { items, score, total, pct, pass, wrong, skip, timeStr, savedResultId } = window._lastResult;
        renderResultsPage(items, score, total, pct, pass, wrong, skip, timeStr, savedResultId);
        return;
      }
      // Otherwise, this is a deeplinked result — we can't reconstruct the full result
      // without the saved result record. Show a "result not available" state.
      setV(`<div class="page"><div class="state-box">
    <div class="state-icon warn"><i class="fa-solid fa-clock-rotate-left"></i></div>
    <div class="state-title">Result Not Available</div>
    <div class="state-desc">Quiz results are only available immediately after completing a quiz in this session. Start the quiz to attempt it.</div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-accent" onclick="renderQuizAttemptOrPreview('${quizId}', new URLSearchParams())">Attempt Quiz</button>
      <button class="btn btn-ghost" onclick="go('/quizzes')">Quiz Library</button>
    </div>
  </div></div>`);
    }

    function renderResultsPage(items, score, total, pct, pass, wrong, skip, timeStr, savedResultId) {
      const circ = 2 * Math.PI * 54, offset = circ - (pct / 100) * circ;
      const circMobile = 2 * Math.PI * 46, offsetMobile = circMobile - (pct / 100) * circMobile;
      const nm = profession ? (lang === 'ur' ? profession.label_ur : profession.label_en) : 'Quiz';
      const resultsURL = currentQuizId ? `${location.origin}/quizzes/${currentQuizId}/results${currentUser ? `?uid=${currentUser.uid}` : ''}` : '';

      const previewBtn = currentQuizId
        ? `<button class="btn btn-ghost btn-full btn-sm" onclick="openQuizPreview('${currentQuizId}', _lastQuizItems)">
         <i class="fa-solid fa-eye"></i> ${t('preview_quiz')}
       </button>`
        : '';

      // Mobile review cards (collapsible)
      const mobileReviewHTML = items.map((item, i) => {
        const cls = item.isCorrect ? 'correct' : item.skipped ? 'skipped' : 'incorrect';
        const icon = item.isCorrect ? 'fa-check' : item.skipped ? 'fa-minus' : 'fa-xmark';
        const qHtml = mdInline(item.question);
        let ans = '';
        if (item.skipped) {
          ans = `<div class="results-mobile-review-answer skipped"><span class="results-mobile-review-tag">SKIPPED</span></div>
                   <div class="results-mobile-review-answer correct-ans"><span class="results-mobile-review-tag">${t('correct_answer').toUpperCase()}</span><span class="md">${mdInline(item.correctAnswer)}</span></div>`;
        } else if (item.isCorrect) {
          ans = `<div class="results-mobile-review-answer user-correct"><i class="fa-solid fa-check" style="font-size:9px"></i><span class="results-mobile-review-tag">${t('your_answer').toUpperCase()}</span><span class="md">${mdInline(item.selectedAnswer)}</span></div>`;
        } else {
          ans = `<div class="results-mobile-review-answer user-wrong"><i class="fa-solid fa-xmark" style="font-size:9px"></i><span class="results-mobile-review-tag">${t('your_answer').toUpperCase()}</span><span class="md">${mdInline(item.selectedAnswer)}</span></div>
                   <div class="results-mobile-review-answer correct-ans"><i class="fa-solid fa-check" style="font-size:9px"></i><span class="results-mobile-review-tag">${t('correct_answer').toUpperCase()}</span><span class="md">${mdInline(item.correctAnswer)}</span></div>`;
        }
        return `<div class="results-mobile-review-card ${cls}" style="animation-delay:${i * .02}s">
        <div class="results-mobile-review-card-head">
          <div class="results-mobile-review-icon ${cls}"><i class="fa-solid ${icon}"></i></div>
          <div class="results-mobile-review-q md"><span style="font-family:var(--font-mono);font-size:10px;color:var(--fg-subtle);margin-inline-end:4px">${i + 1}.</span>${qHtml}</div>
        </div>
        <div class="results-mobile-review-answers">${ans}</div>
      </div>`;
      }).join('');

      // Desktop review cards
      const desktopReviewHTML = items.map((item, i) => {
        const cls = item.isCorrect ? 'correct' : item.skipped ? 'skipped' : 'incorrect';
        const icon = item.isCorrect ? 'fa-check' : item.skipped ? 'fa-minus' : 'fa-xmark';
        const qHtml = mdInline(item.question);
        let ans = '';
        if (item.skipped)
          ans = `<div class="review-answer-row skipped-row"><span class="review-tag">SKIPPED</span></div>
             <div class="review-answer-row correct-ans"><span class="review-tag">${t('correct_answer').toUpperCase()}</span><span class="md">${mdInline(item.correctAnswer)}</span></div>`;
        else if (item.isCorrect)
          ans = `<div class="review-answer-row user-correct"><i class="fa-solid fa-check" style="font-size:10px"></i><span class="review-tag">${t('your_answer').toUpperCase()}</span><span class="md">${mdInline(item.selectedAnswer)}</span></div>`;
        else
          ans = `<div class="review-answer-row user-wrong"><i class="fa-solid fa-xmark" style="font-size:10px"></i><span class="review-tag">${t('your_answer').toUpperCase()}</span><span class="md">${mdInline(item.selectedAnswer)}</span></div>
             <div class="review-answer-row correct-ans"><i class="fa-solid fa-check" style="font-size:10px"></i><span class="review-tag">${t('correct_answer').toUpperCase()}</span><span class="md">${mdInline(item.correctAnswer)}</span></div>`;
        return `<div class="review-card ${cls}" style="animation-delay:${i * .02}s">
        <div class="review-card-head">
          <div class="review-icon ${cls}"><i class="fa-solid ${icon}"></i></div>
          <div class="review-q md"><span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle)">${i + 1}. </span>${qHtml}</div>
        </div>
        <div class="review-answers">${ans}</div>
      </div>`;
      }).join('');

      setV(`<div class="page" style="animation:fadeUp .25s ease both">
    
    <!-- Mobile Layout -->
    <div class="results-mobile-layout">
      
      <!-- Mobile Header with Score -->
      <div class="results-mobile-header">
        <div class="page-breadcrumb" style="margin-bottom:12px;justify-content:center">
          <span data-nav onclick="go('/user/topics')">${t('choose_topic')}</span>
          <span class="sep">/</span><span>${nm}</span>
          <span class="sep">/</span><span class="current">${t('result')}</span>
        </div>
        
        <div class="results-mobile-score">
          <div class="results-mobile-score-circle">
            <svg viewBox="0 0 100 100">

    async function loadQuizLibrary() {
      const isAdmin = currentUser?.role === 'admin' || currentUser?.uid === 'admin';
      const allowed = isAdmin ? null : new Set(currentUser?.topics || []);
      const pid = ($('qlib-pid') || {}).value || '';
      const lang_f = ($('qlib-lang') || {}).value || '';
      const el = $('qlib-results'); if (!el) return;
      el.innerHTML = `<div class="loader-wrap" style="padding:40px"><div class="spinner"></div></div>`;

      // If a specific topic is selected, verify the user is allowed (non-admin)
      if (!isAdmin && pid && !allowed.has(pid)) {
        el.innerHTML = `<div class="state-box"><div class="state-icon error"><i class="fa-solid fa-ban"></i></div>
      <div class="state-title">Access Denied</div>
      <div class="state-desc">You don't have access to this topic.</div></div>`;
        return;
      }

      try {
        const p = new URLSearchParams({ limit: 100 });
        if (pid) p.set('professionId', pid);
        if (lang_f) p.set('lang', lang_f);
        const { ok, data } = await api('GET', `/api/quizzes/public?${p}`);
        if (!ok) throw new Error(data.error || 'Failed to load');

        // Filter to only allowed topics (client-side enforcement)
        let quizzes = data.quizzes || [];
        if (!isAdmin) {
          quizzes = quizzes.filter(q => !q.professionId || allowed.has(q.professionId));
        }

        if (!quizzes.length) {
          el.innerHTML = `<div style="padding:40px;text-align:center;color:var(--fg-muted)">
        <i class="fa-solid fa-inbox" style="font-size:32px;margin-bottom:12px;display:block;opacity:.4"></i>
        <div style="font-size:14px">No quizzes found for your topics yet.</div>
        <div style="font-size:13px;margin-top:4px">Generate your first quiz to see it here.</div>
        <button class="btn btn-accent" style="margin-top:16px" onclick="go('/user/topics')">
          <i class="fa-solid fa-wand-magic-sparkles"></i> Generate Quiz
        </button>
      </div>`;
          return;
        }

        el.innerHTML = `<div style="margin-bottom:12px;font-size:13px;color:var(--fg-muted)">${quizzes.length} quiz${quizzes.length !== 1 ? 'zes' : ''}</div>
    <div class="quiz-lib-grid">
      ${quizzes.map(q => {
          const prof = q.professionId ? PROF_MAP[q.professionId] : null;
          const label = prof ? (lang === 'ur' ? prof.label_ur : prof.label_en) : q.topic || q.professionId || 'General';
          return `<div class="quiz-lib-card" onclick="go('/quizzes/${q.quizId}')">
          <div class="quiz-lib-card-head">
            <div class="quiz-lib-card-title">${label}</div>
            ${prof ? `<div class="topic-card-icon" style="width:32px;height:32px;font-size:12px;flex-shrink:0"><i class="${prof.icon}"></i></div>` : ''}
          </div>
          <div class="quiz-lib-card-meta">
            ${q.professionId ? `<span class="badge badge-default" style="font-size:10px">${q.professionId}</span>` : ''}
            <span class="badge badge-default" style="font-size:10px">${q.count} Q</span>
            <span class="badge badge-default" style="font-size:10px">${(q.lang || '').toUpperCase()}</span>
          </div>
          <div class="quiz-lib-card-date">${q.createdAt ? new Date(q.createdAt).toLocaleDateString() : ''}</div>
        </div>`;
        }).join('')}
    </div>`;
        setP(100);
      } catch (e) { el.innerHTML = `<div style="padding:20px;color:var(--error);font-size:13px">${e.message}</div>`; }
    }

    /* ═══════════════════════════════════════════════════════════════════════
       QUIZ PREVIEW MODAL
    ═══════════════════════════════════════════════════════════════════════ */
    function quizPreviewHTML(qz, userAnswers) {
      const items = (qz.questions || []).map((q, i) => {
        const ua = userAnswers ? userAnswers[i] : null;
        const qHtml = mdInline(q.question);
        const opts = (q.options || []).map(o => {
          const isC = o === q.correctAnswer;
          const isSel = ua && ua.selectedAnswer === o;
          let style = 'padding:6px 10px;border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;gap:6px;';
          let icon = '';
          if (isC && isSel) { style += `background:var(--success-subtle);color:var(--success);border-color:var(--success-border);`; icon = `<i class="fa-solid fa-check" style="font-size:10px;flex-shrink:0"></i>`; }
          else if (isC) { style += `background:var(--success-subtle);color:var(--success);border-color:var(--success-border);`; icon = `<i class="fa-solid fa-check" style="font-size:10px;flex-shrink:0"></i>`; }
          else if (isSel) { style += `background:var(--error-subtle);color:var(--error);border-color:var(--error-border);`; icon = `<i class="fa-solid fa-xmark" style="font-size:10px;flex-shrink:0"></i>`; }
          return `<div style="${style}">${icon}<span class="md">${mdInline(o)}</span></div>`;
        }).join('');
        let statusBadge = '';
        if (ua) {
          if (ua.skipped) statusBadge = `<span style="font-size:11px;color:var(--fg-subtle);background:var(--bg-muted);padding:2px 8px;border-radius:4px"><i class="fa-solid fa-minus"></i> Skipped</span>`;
          else if (ua.isCorrect) statusBadge = `<span style="font-size:11px;color:var(--success);background:var(--success-subtle);padding:2px 8px;border-radius:4px"><i class="fa-solid fa-check"></i> Correct</span>`;
          else statusBadge = `<span style="font-size:11px;color:var(--error);background:var(--error-subtle);padding:2px 8px;border-radius:4px"><i class="fa-solid fa-xmark"></i> Incorrect</span>`;
        }
        return `<div style="border:1px solid var(--border);border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:8px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div style="font-weight:600;font-size:13px;flex:1" class="md"><span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle)">${i + 1}. </span>${qHtml}</div>${statusBadge}
        </div>
      <div style="display:flex;flex-direction:column;gap:6px">${opts}</div>
    </div>`;
      }).join('');
      const srcColor = qz._source === 'cache' ? 'var(--warning)' : 'var(--success)';
      const meta = `<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:4px">
    ${qz.professionId ? `<span class="badge badge-default">${qz.professionId}</span>` : ''}
    ${qz.count ? `<span class="badge badge-default">${qz.count} Q</span>` : ''}
    ${qz.lang ? `<span class="badge badge-default">${qz.lang.toUpperCase()}</span>` : ''}
    ${qz._source ? `<span class="badge" style="background:color-mix(in srgb,${srcColor} 12%,transparent);color:${srcColor};border:1px solid color-mix(in srgb,${srcColor} 25%,transparent)">${qz._source === 'cache' ? 'Cached' : 'AI Generated'}</span>` : ''}
    <span style="font-size:10px;color:var(--fg-subtle);font-family:var(--font-mono);margin-inline-start:auto">${qz.quizId || ''}</span>
  </div>`;
      return `<div style="display:flex;flex-direction:column;gap:10px;max-height:65vh;overflow-y:auto;padding-right:4px">${meta}${items || '<div style="color:var(--fg-muted)">No questions.</div>'}</div>`;
    }

          const statusLabel = { active: t('status_active'), expired: t('status_expired'), soon: t('status_soon') }[status];
          const statusClass = status === 'active' ? 'badge-success' : status === 'soon' ? 'badge-warn' : 'badge-error';

              <thead><tr><th>${t('user_name')}</th><th>${t('user_email')}</th><th>${t('user_phone')}</th><th>${t('user_topics')}</th><th>${t('user_expiry')}</th><th>${t('user_status')}</th><th>${t('user_actions')}</th></tr></thead>

            </table></div>
          </div>

            ${rows.map(({ u, statusClass, statusLabel, allTopics, editBtn, delBtn }) => `
              <div class="mob-card">
                <div class="mob-card-header">
                  <div>
                    <div class="mob-card-title">${u.name}</div>
                    <div class="mob-card-subtitle">${u.email}</div>

    async function saveUser(uid_ = '') {
      const name = $('u-name')?.value.trim(), email = $('u-email')?.value.trim(),
        pass = $('u-pass')?.value, phone = $('u-phone')?.value.trim(),
        startDate = $('u-start')?.value, expiryDate = $('u-expiry')?.value,

      if (pass) body.password = pass;
      try {
        const { ok, data } = uid_
          ? await api('PUT', `/api/users/${uid_}`, body)
          : await api('POST', '/api/users', { ...body, password: pass });
        if (!ok) { toast(data.error || 'Save failed', 'error'); return; }

    async function deleteAdminResult(resultId, btn) {
      if (!confirm('Delete this result? This cannot be undone.')) return;
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner" style="width:12px;height:12px;border-width:2px"></div>';
      try {
        const { ok, data } = await api('DELETE', `/api/results/${resultId}`);
        if (!ok) { toast(data?.error || 'Delete failed', 'error'); btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-trash"></i>'; return; }
        // Remove the row (desktop) and card (mobile)
        const row = btn.closest('tr');
        if (row) row.remove();
        const card = document.getElementById(`mob-result-${resultId}`);
        if (card) card.remove();
        toast('Result deleted', 'success');
      } catch (e) { toast('Delete failed: ' + e.message, 'error'); btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-trash"></i>'; }
    }

    /* ─ Admin Quiz Library ─ */
    const PROFESSIONS_LIST_ADMIN = PROFESSIONS.map(p => ({ id: p.id, label: p.label_en }));
    /* All quizzes cache — loaded once per tab visit, filtered client-side */
    let _adminQuizCache = null;

    function adminQuizzesHTML() {
      const profOpts = PROFESSIONS_LIST_ADMIN.map(p => `<option value="${p.id}">${p.label}</option>`).join('');
      return `<div style="animation:fadeUp .25s ease both">
    <div style="margin-bottom:20px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div>
        <h1 style="font-family:var(--font-serif);font-size:26px;font-weight:600;margin-bottom:4px">${t('admin_quizzes')}</h1>
        <p style="color:var(--fg-muted);font-size:14px">All stored quizzes — served as AI fallback when models are unavailable.</p>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="_adminQuizCache=null;loadAdminQuizzes()">
        <i class="fa-solid fa-rotate-right"></i> Refresh
      </button>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:flex-end" class="admin-filter-row">
      <div style="display:flex;flex-direction:column;gap:4px">
        <label style="font-size:11px;font-weight:600;color:var(--fg-muted);text-transform:uppercase;letter-spacing:.05em">Filter by Topic</label>
        <select id="ql-pid" onchange="renderAdminQuizTable()" style="height:36px;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--fg);font-size:13px;min-width:180px">
          <option value="">All Topics</option>${profOpts}
        </select>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <label style="font-size:11px;font-weight:600;color:var(--fg-muted);text-transform:uppercase;letter-spacing:.05em">Language</label>
        <select id="ql-lang" onchange="renderAdminQuizTable()" style="height:36px;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--fg);font-size:13px">
          <option value="">All</option><option value="en">English</option><option value="ur">Urdu</option>
        </select>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <label style="font-size:11px;font-weight:600;color:var(--fg-muted);text-transform:uppercase;letter-spacing:.05em">Questions</label>
        <select id="ql-count" onchange="renderAdminQuizTable()" style="height:36px;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--fg);font-size:13px">
          <option value="">Any</option><option value="5">5</option><option value="10">10</option><option value="15">15</option><option value="30">30</option><option value="50">50</option>
        </select>
      </div>
    </div>
    <div id="ql-stats" style="margin-bottom:12px"></div>
    <div id="quiz-lib-table"><div class="loader-wrap" style="padding:40px"><div class="spinner"></div><div class="loader-sub">Loading quizzes…</div></div></div>
  </div>`;
    }

    async function loadAdminQuizzes() {
      const el = $('quiz-lib-table'); if (!el) return;
      if (_adminQuizCache) { renderAdminQuizTable(); return; }
      el.innerHTML = `<div class="loader-wrap" style="padding:40px"><div class="spinner"></div><div class="loader-sub">Loading quizzes…</div></div>`;
      try {
        // Fetch up to 500 quizzes using the public endpoint (no filter needed, admin can see all)
        const { ok, data } = await api('GET', '/api/quizzes/public?limit=100', null, false);
        if (!ok) throw new Error(data.error || 'Failed to load quizzes');
        _adminQuizCache = data.quizzes || [];
        renderAdminQuizTable();
      } catch (e) {
        if (el) el.innerHTML = `<div style="padding:20px;color:var(--error);font-size:13px"><i class="fa-solid fa-circle-exclamation"></i> ${e.message}</div>`;
      }
    }

    function renderAdminQuizTable() {
      const el = $('quiz-lib-table'), statsEl = $('ql-stats'); if (!el || !_adminQuizCache) return;
      const pid = ($('ql-pid') || {}).value || '';
      const lang_ = ($('ql-lang') || {}).value || '';
      const count = ($('ql-count') || {}).value || '';

      let list = _adminQuizCache;
      if (pid) list = list.filter(q => q.professionId === pid);
      if (lang_) list = list.filter(q => (q.lang || '') === lang_);
      if (count) list = list.filter(q => String(q.count) === count);

      if (statsEl) statsEl.innerHTML = `
    <span class="badge badge-default">${list.length} of ${_adminQuizCache.length} quiz${_adminQuizCache.length !== 1 ? 'zes' : ''}</span>
    ${pid || lang_ || count ? `<button class="btn btn-ghost btn-sm" style="margin-inline-start:6px" onclick="
      const s=['ql-pid','ql-lang','ql-count'];s.forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});renderAdminQuizTable()">
      <i class='fa-solid fa-xmark'></i> Clear filters</button>`: ''}`;

      if (!list.length) {
        el.innerHTML = `<div style="padding:40px;text-align:center;color:var(--fg-muted)">
      <i class="fa-solid fa-inbox" style="font-size:32px;margin-bottom:12px;display:block;opacity:.4"></i>
      <div style="font-size:14px">${_adminQuizCache.length ? 'No quizzes match these filters.' : 'No quizzes stored yet.'}</div>
      ${_adminQuizCache.length === 0 ? '<div style="font-size:13px;margin-top:4px">Quizzes are saved automatically when users generate them.</div>' : ''}
    </div>`;
        return;
      }

      el.innerHTML = `
        <!-- Desktop table -->
        <div class="desktop-only">
          <div class="table-wrap"><table>
            <thead><tr><th>Quiz ID</th><th>Topic</th><th>Lang</th><th>Qs</th><th>Created</th><th>Actions</th></tr></thead>
            <tbody>${list.map(q => {
          const prof = q.professionId ? PROF_MAP[q.professionId] : null;
          const label = prof ? prof.label_en : (q.topic || q.professionId || '—');
          return `<tr>
              <td style="font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle)">${q.quizId}</td>
              <td>
                <div style="display:flex;align-items:center;gap:6px">
                  ${prof ? `<div style="width:22px;height:22px;background:var(--accent-subtle);color:var(--accent);border-radius:4px;display:grid;place-items:center;font-size:10px;flex-shrink:0"><i class="${prof.icon}"></i></div>` : ''}
                  <span style="font-size:13px;font-weight:500">${label}</span>
                </div>
              </td>
              <td><span class="badge badge-default">${(q.lang || '').toUpperCase()}</span></td>
              <td style="font-family:var(--font-mono);font-weight:600">${q.count}</td>
              <td style="font-size:12px;color:var(--fg-muted)">${q.createdAt ? new Date(q.createdAt).toLocaleDateString() : '-'}</td>
              <td style="display:flex;gap:4px">
                <button class="btn btn-ghost btn-sm" onclick="openQuizPreview('${q.quizId}')" title="Preview"><i class="fa-solid fa-eye"></i></button>
                <a href="/quizzes/${q.quizId}" target="_blank" class="btn btn-ghost btn-sm" title="Open" style="text-decoration:none"><i class="fa-solid fa-external-link-alt"></i></a>
              </td>
            </tr>`;
        }).join('')}</tbody>
          </table></div>
        </div>
        <!-- Mobile cards -->
        <div class="mobile-only mob-card-list">
          ${list.map(q => {
          const prof = q.professionId ? PROF_MAP[q.professionId] : null;
          const label = prof ? prof.label_en : (q.topic || q.professionId || '—');
          return `<div class="mob-card">
              <div class="mob-card-header">
                <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">
                  ${prof ? `<div style="width:32px;height:32px;background:var(--accent-subtle);color:var(--accent);border-radius:6px;display:grid;place-items:center;font-size:12px;flex-shrink:0"><i class="${prof.icon}"></i></div>` : ''}
                  <div style="min-width:0">
                    <div class="mob-card-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${label}</div>
                    <div class="mob-card-subtitle" style="font-size:10px">${q.quizId}</div>
                  </div>
                </div>
                <div style="display:flex;gap:4px;flex-shrink:0">
                  <span class="badge badge-default">${(q.lang || '').toUpperCase()}</span>
                  <span class="badge badge-default">${q.count}Q</span>
                </div>
              </div>
              ${q.createdAt ? `<div class="mob-card-row"><span class="mob-card-label">Created</span><span class="mob-card-value">${new Date(q.createdAt).toLocaleDateString()}</span></div>` : ''}
              <div class="mob-card-actions">
                <button class="btn btn-ghost btn-sm" onclick="openQuizPreview('${q.quizId}')"><i class="fa-solid fa-eye"></i> Preview</button>
                <a href="/quizzes/${q.quizId}" target="_blank" class="btn btn-ghost btn-sm" style="text-decoration:none"><i class="fa-solid fa-external-link-alt"></i> Open</a>
              </div>
            </div>`;
        }).join('')}
        </div>`;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       BOOT
    ═══════════════════════════════════════════════════════════════════════ */
    function boot() {
      setP(5);
      setupMarkdown();
      renderChip();
      route();
    }

    window.addEventListener('load', boot);
  </script>
</body>

</html>
