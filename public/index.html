<!doctype html>
<html lang="en" dir="ltr" data-theme="light" data-lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AJK PSC Exam Prep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,500;8..60,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
<style>
    :root {
      --emerald-50: #ecfdf5;
      --emerald-100: #d1fae5;
      --emerald-200: #a7f3d0;
      --emerald-400: #34d399;
      --emerald-500: #10b981;
      --emerald-600: #059669;
      --emerald-700: #047857;
      --emerald-800: #065f46;
      --emerald-900: #064e3b;

      --slate-50:  #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-300: #cbd5e1;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-800: #1e293b;
      --slate-900: #0f172a;
      --slate-950: #020617;

      --bg: #ffffff;
      --bg-subtle: var(--slate-50);
      --bg-muted: var(--slate-100);
      --bg-elevated: #ffffff;
      --fg: var(--slate-900);
      --fg-muted: var(--slate-600);
      --fg-subtle: var(--slate-400);
      --border: var(--slate-200);
      --border-strong: var(--slate-300);

      --brand: var(--emerald-700);
      --brand-light: var(--emerald-600);
      --brand-fg: #ffffff;
      --accent: var(--emerald-600);
      --accent-hover: var(--emerald-700);
      --accent-subtle: var(--emerald-50);
      --accent-border: var(--emerald-200);

      --success: #16a34a;
      --success-subtle: #f0fdf4;
      --success-border: #bbf7d0;
      --error: #dc2626;
      --error-subtle: #fef2f2;
      --error-border: #fecaca;
      --warning: #d97706;
      --warning-subtle: #fffbeb;

      --shadow-xs: 0 1px 2px 0 rgb(0 0 0/0.05);
      --shadow-sm: 0 1px 3px 0 rgb(0 0 0/0.1), 0 1px 2px -1px rgb(0 0 0/0.1);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0/0.1), 0 2px 4px -2px rgb(0 0 0/0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0/0.1), 0 4px 6px -4px rgb(0 0 0/0.1);
      --shadow-xl: 0 20px 25px -5px rgb(0 0 0/0.1), 0 8px 10px -6px rgb(0 0 0/0.1);

      --radius-sm: 4px;
      --radius: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --radius-2xl: 24px;

      --font-serif: "Playfair Display", Georgia, serif;
      --font-body: "Source Serif 4", Georgia, serif;
      --font-mono: "JetBrains Mono", monospace;

      --ease: cubic-bezier(0.4,0,0.2,1);
      --ease-out: cubic-bezier(0,0,0.2,1);
      --ease-spring: cubic-bezier(0.34,1.56,0.64,1);
    }

    [data-theme="dark"] {
      --bg: #080f0a;
      --bg-subtle: #0d1610;
      --bg-muted: #111e16;
      --bg-elevated: #0f1a12;
      --fg: #e8f5ec;
      --fg-muted: #7fa88a;
      --fg-subtle: #4a6b54;
      --border: #1a2e1f;
      --border-strong: #243628;
      --brand: var(--emerald-400);
      --brand-light: var(--emerald-400);
      --brand-fg: #080f0a;
      --accent: var(--emerald-400);
      --accent-hover: var(--emerald-500);
      --accent-subtle: #031a0c;
      --accent-border: #0d3320;
      --success: #34d399;
      --success-subtle: #022010;
      --error: #f87171;
      --error-subtle: #2d0b0b;
    }

    [data-lang="ur"] {
      direction: rtl;
      font-family: "Noto Nastaliq Urdu", "Jameel Noori Nastaleeq", "Source Serif 4", serif;
    }
    [data-lang="ur"] .font-mono { font-family: var(--font-mono); }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font-body);
      background: var(--bg-subtle);
      color: var(--fg);
      min-height: 100dvh;
      line-height: 1.6;
      transition: background 200ms var(--ease), color 200ms var(--ease);
    }

    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes shimmer { 0%{background-position:-600px 0} 100%{background-position:600px 0} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    @keyframes modalIn { from{opacity:0;transform:scale(.95) translateY(6px)} to{opacity:1;transform:scale(1) translateY(0)} }
    @keyframes slideIn { from{transform:translateX(100%)} to{transform:translateX(0)} }

    /* ─── TOPBAR ─── */
    .topbar {
      position: sticky; top: 0; z-index: 50;
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      height: 58px; display: flex; align-items: center;
    }
    .topbar-inner {
      width: 100%; max-width: 1280px; margin: 0 auto;
      padding: 0 24px; display: flex; align-items: center; gap: 12px;
    }
    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
    .brand-mark {
      width: 34px; height: 34px; background: var(--brand);
      border-radius: var(--radius-md); display: grid; place-items: center;
      color: var(--brand-fg); font-size: 16px; flex-shrink: 0;
    }
    .brand-text { display: flex; flex-direction: column; }
    .brand-name { font-family: var(--font-serif); font-size: 15px; font-weight: 600; color: var(--fg); line-height: 1.2; }
    .brand-sub { font-size: 10px; color: var(--fg-subtle); letter-spacing: .04em; font-family: var(--font-mono); }
    .topbar-center { flex: 1; }
    .topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .progress-rail { height: 2px; background: var(--border); }
    .progress-fill { height: 100%; background: var(--accent); transition: width .5s var(--ease-out); width: 0%; }

    .icon-btn {
      width: 34px; height: 34px; border-radius: var(--radius-md);
      background: transparent; border: 1px solid var(--border);
      cursor: pointer; display: grid; place-items: center;
      font-size: 13px; color: var(--fg-muted);
      transition: background 100ms, color 100ms;
    }
    .icon-btn:hover { background: var(--bg-muted); color: var(--fg); }

    .lang-btn {
      height: 34px; padding: 0 12px; border-radius: var(--radius-md);
      background: transparent; border: 1px solid var(--border);
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 500; color: var(--fg-muted);
      font-family: var(--font-mono); transition: all 100ms;
    }
    .lang-btn:hover { background: var(--bg-muted); color: var(--fg); }
    .lang-btn.active { background: var(--accent-subtle); color: var(--accent); border-color: var(--accent-border); }

    /* ─── USER CHIP ─── */
    .user-chip {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 10px 4px 4px;
      background: var(--bg-muted); border: 1px solid var(--border);
      border-radius: 20px; font-size: 13px; cursor: pointer;
      transition: all 100ms;
    }
    .user-chip:hover { border-color: var(--accent-border); }
    .user-avatar {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--brand); color: var(--brand-fg);
      display: grid; place-items: center; font-size: 11px; font-weight: 700;
      font-family: var(--font-mono); flex-shrink: 0;
    }
    .user-chip-name { color: var(--fg); font-weight: 500; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ─── LAYOUT ─── */
    #root { min-height: 100dvh; display: grid; grid-template-rows: auto 2px 1fr; }
    .page { width: 100%; max-width: 1280px; margin: 0 auto; padding: 28px 24px 60px; }
    .page-sm { max-width: 520px; }
    .page-md { max-width: 760px; }

    /* ─── CARDS ─── */
    .card {
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--radius-xl); box-shadow: var(--shadow-xs); overflow: hidden;
    }
    .card-header {
      padding: 18px 22px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .card-title { font-family: var(--font-serif); font-size: 16px; font-weight: 600; color: var(--fg); }
    .card-body { padding: 22px; }
    .card-footer {
      padding: 14px 22px; border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; justify-content: flex-end;
    }

    /* ─── PANEL CARD ─── */
    .panel-card {
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden;
    }
    .panel-head {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      font-size: 11px; font-weight: 600; letter-spacing: .06em;
      text-transform: uppercase; color: var(--fg-subtle); font-family: var(--font-mono);
    }
    .panel-list-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .panel-list-item:last-child { border-bottom: none; }
    .panel-list-label { color: var(--fg-muted); }
    .panel-list-value { font-weight: 500; color: var(--fg); font-family: var(--font-mono); }

    /* ─── FORM ─── */
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field-label { font-size: 13px; font-weight: 500; color: var(--fg-muted); }
    .required { color: var(--error); }
    .input-wrap { position: relative; }
    .input-icon { position: absolute; inset-inline-start: 12px; top: 50%; transform: translateY(-50%); color: var(--fg-subtle); font-size: 13px; pointer-events: none; }
    .field-input {
      width: 100%; height: 42px; padding: 0 14px;
      background: var(--bg); border: 1px solid var(--border-strong);
      border-radius: var(--radius-md); font-size: 14px; color: var(--fg);
      font-family: var(--font-body); outline: none;
      transition: border-color 150ms, box-shadow 150ms;
    }
    .field-input.has-icon { padding-inline-start: 38px; }
    .field-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent); }
    .field-input.invalid { border-color: var(--error); }
    .field-error { font-size: 12px; color: var(--error); display: none; }
    .field-error.visible { display: block; }
    .field-hint { font-size: 12px; color: var(--fg-subtle); }
    select.field-input { cursor: pointer; }

    /* ─── BUTTONS ─── */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 0 16px; height: 38px; border-radius: var(--radius-md);
      font-size: 14px; font-weight: 500; font-family: var(--font-body);
      border: none; cursor: pointer; transition: all 150ms; white-space: nowrap;
      text-decoration: none;
    }
    .btn-sm { height: 32px; padding: 0 12px; font-size: 13px; }
    .btn-lg { height: 46px; padding: 0 22px; font-size: 15px; }
    .btn-full { width: 100%; justify-content: center; }
    .btn-primary { background: var(--fg); color: var(--bg); }
    .btn-primary:hover { opacity: .85; }
    .btn-accent { background: var(--accent); color: white; }
    .btn-accent:hover { background: var(--accent-hover); }
    .btn-ghost { background: transparent; color: var(--fg-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg-muted); color: var(--fg); }
    .btn-error { background: var(--error); color: white; }
    .btn-error:hover { opacity: .9; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ─── BADGES ─── */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 20px;
      font-size: 11px; font-weight: 600; font-family: var(--font-mono);
    }
    .badge-default { background: var(--bg-muted); color: var(--fg-muted); }
    .badge-accent { background: var(--accent-subtle); color: var(--accent); border: 1px solid var(--accent-border); }
    .badge-success { background: var(--success-subtle); color: var(--success); border: 1px solid var(--success-border); }
    .badge-error { background: var(--error-subtle); color: var(--error); border: 1px solid var(--error-border); }
    .badge-warn { background: var(--warning-subtle); color: var(--warning); }

    /* ─── CALLOUT ─── */
    .callout {
      display: flex; gap: 10px; padding: 12px 14px;
      border-radius: var(--radius-md); font-size: 13px; line-height: 1.6;
    }
    .callout.info { background: var(--accent-subtle); color: var(--accent); border: 1px solid var(--accent-border); }
    .callout.warn { background: var(--warning-subtle); color: var(--warning); }
    .callout.success { background: var(--success-subtle); color: var(--success); border: 1px solid var(--success-border); }
    .callout.error { background: var(--error-subtle); color: var(--error); border: 1px solid var(--error-border); }

    /* ─── LOGIN PAGE ─── */
    .login-wrap {
      min-height: 100dvh; display: grid;
      grid-template-columns: 1fr; align-items: center; justify-items: center;
      padding: 24px; background: var(--bg-subtle);
    }
    @media (min-width: 1024px) {
      .login-wrap { grid-template-columns: 1fr 1fr; padding: 0; }
    }
    .login-hero {
      display: none; height: 100dvh;
      background: linear-gradient(145deg, var(--emerald-900) 0%, var(--emerald-700) 60%, var(--emerald-500) 100%);
      align-items: center; justify-content: center;
      padding: 60px; position: relative; overflow: hidden;
    }
    @media (min-width: 1024px) { .login-hero { display: flex; } }
    .hero-pattern {
      position: absolute; inset: 0; opacity: .08;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .hero-content { position: relative; color: white; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 14px; background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.25); border-radius: 20px;
      font-size: 12px; letter-spacing: .05em; font-family: var(--font-mono);
      margin-bottom: 24px;
    }
    .hero-title { font-family: var(--font-serif); font-size: clamp(28px,3.5vw,44px); line-height: 1.2; margin-bottom: 16px; }
    .hero-desc { font-size: 16px; opacity: .8; line-height: 1.7; max-width: 420px; margin-bottom: 36px; }
    .hero-features { display: flex; flex-direction: column; gap: 14px; }
    .hero-feature { display: flex; align-items: center; gap: 12px; font-size: 14px; opacity: .9; }
    .hero-feature-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: rgba(255,255,255,.2); display: grid; place-items: center; flex-shrink: 0;
    }

    .login-box { width: 100%; max-width: 420px; }
    .login-header { margin-bottom: 32px; text-align: center; }
    .login-logo {
      width: 52px; height: 52px; background: var(--brand); border-radius: var(--radius-lg);
      display: grid; place-items: center; color: var(--brand-fg);
      font-size: 24px; margin: 0 auto 16px;
    }
    .login-title { font-family: var(--font-serif); font-size: 26px; font-weight: 600; margin-bottom: 6px; }
    .login-sub { font-size: 14px; color: var(--fg-muted); }

    /* ─── PAGE HEADER ─── */
    .page-header { margin-bottom: 24px; }
    .page-header-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--fg-subtle); }
    .breadcrumb span { color: var(--fg-muted); }
    .breadcrumb .sep { color: var(--fg-subtle); }
    .page-title { font-family: var(--font-serif); font-size: clamp(22px,3vw,30px); font-weight: 600; color: var(--fg); margin-bottom: 6px; }
    .page-desc { font-size: 14px; color: var(--fg-muted); max-width: 560px; }

    /* ─── TOPIC GRID ─── */
    .topic-grid {
      display: grid; gap: 14px;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    }
    .topic-card {
      background: var(--bg-elevated); border: 1.5px solid var(--border);
      border-radius: var(--radius-lg); padding: 20px;
      cursor: pointer; transition: all 200ms var(--ease);
      display: flex; flex-direction: column; gap: 10px;
      position: relative; overflow: hidden;
    }
    .topic-card::before {
      content: ''; position: absolute; inset: 0;
      background: var(--accent); opacity: 0; transition: opacity 200ms;
    }
    .topic-card:hover { border-color: var(--accent-border); transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .topic-card:hover::before { opacity: .03; }
    .topic-card.locked { opacity: .45; cursor: not-allowed; }
    .topic-card.locked:hover { transform: none; box-shadow: none; border-color: var(--border); }
    .topic-card-icon {
      width: 40px; height: 40px; border-radius: var(--radius-md);
      background: var(--accent-subtle); color: var(--accent);
      display: grid; place-items: center; font-size: 18px; flex-shrink: 0;
    }
    .topic-card.locked .topic-card-icon { background: var(--bg-muted); color: var(--fg-subtle); }
    .topic-card-name { font-family: var(--font-serif); font-size: 15px; font-weight: 600; color: var(--fg); }
    .topic-card-id { font-size: 11px; color: var(--fg-subtle); font-family: var(--font-mono); }
    .topic-card-arrow { margin-inline-start: auto; color: var(--fg-subtle); font-size: 13px; }

    /* ─── QUIZ LAYOUT ─── */
    .quiz-layout { display: grid; gap: 24px; }
    @media (min-width: 1024px) { .quiz-layout { grid-template-columns: 280px 1fr; } }
    .quiz-sidebar { display: none; }
    @media (min-width: 1024px) {
      .quiz-sidebar { display: block; position: sticky; top: calc(58px + 20px); height: fit-content; }
    }

    /* ─── QUESTION ─── */
    .question-card {
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--radius-xl); overflow: hidden;
      animation: fadeUp .25s ease both;
    }
    .question-head {
      padding: 20px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .question-num { font-family: var(--font-mono); font-size: 12px; color: var(--fg-subtle); }
    .question-body { padding: 24px; }
    .question-text { font-size: 17px; line-height: 1.7; font-weight: 500; color: var(--fg); margin-bottom: 22px; }
    .options-list { display: flex; flex-direction: column; gap: 10px; }
    .option-btn {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 18px; border-radius: var(--radius-lg);
      border: 1.5px solid var(--border); background: var(--bg);
      cursor: pointer; text-align: start; font-size: 14px;
      color: var(--fg); font-family: var(--font-body); line-height: 1.5;
      transition: all 150ms; width: 100%;
    }
    .option-btn:hover { border-color: var(--accent); background: var(--accent-subtle); }
    .option-btn.selected { border-color: var(--accent); background: var(--accent-subtle); }
    .option-btn.correct { border-color: var(--success); background: var(--success-subtle); color: var(--success); }
    .option-btn.wrong { border-color: var(--error); background: var(--error-subtle); color: var(--error); }
    .option-letter {
      width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid currentColor;
      display: grid; place-items: center; font-size: 12px; font-weight: 700;
      font-family: var(--font-mono); flex-shrink: 0; opacity: .7;
    }
    .question-nav {
      padding: 16px 24px; border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }

    /* ─── SUBMIT BAR ─── */
    .submit-bar {
      position: fixed; bottom: 0; inset-inline: 0; z-index: 40;
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter: blur(16px); border-top: 1px solid var(--border);
      padding: 12px 24px; display: flex; align-items: center; justify-content: space-between;
      gap: 12px; transform: translateY(100%); transition: transform 300ms var(--ease-out);
    }
    .submit-bar.visible { transform: translateY(0); }

    /* ─── PROGRESS DOTS ─── */
    .q-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .q-dot {
      width: 24px; height: 24px; border-radius: 6px;
      background: var(--bg-muted); border: 1.5px solid var(--border);
      font-size: 10px; font-family: var(--font-mono); font-weight: 500;
      color: var(--fg-subtle); display: grid; place-items: center;
      cursor: pointer; transition: all 100ms;
    }
    .q-dot.answered { background: var(--accent-subtle); border-color: var(--accent-border); color: var(--accent); }
    .q-dot.current { background: var(--accent); border-color: var(--accent); color: white; }

    /* ─── RESULTS ─── */
    .results-layout { display: grid; gap: 24px; }
    @media (min-width: 900px) { .results-layout { grid-template-columns: 300px 1fr; } }
    .score-display {
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: 28px 22px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .score-ring-svg { width: 140px; height: 140px; transform: rotate(-90deg); }
    .score-ring-bg { fill: none; stroke: var(--border); stroke-width: 10; }
    .score-ring-arc { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1.2s var(--ease-out); }
    .score-ring-arc.pass { stroke: var(--success); }
    .score-ring-arc.fail { stroke: var(--error); }
    .score-ring-wrap { position: relative; }
    .score-ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .score-pct { font-family: var(--font-mono); font-size: 28px; font-weight: 700; }
    .score-pct.pass { color: var(--success); }
    .score-pct.fail { color: var(--error); }
    .score-label { font-size: 11px; color: var(--fg-subtle); font-family: var(--font-mono); }
    .score-verdict { font-family: var(--font-serif); font-size: 18px; font-weight: 600; }
    .score-detail { font-size: 13px; color: var(--fg-muted); }
    .score-stats { display: flex; gap: 12px; width: 100%; }
    .stat-box { flex: 1; background: var(--bg-muted); border-radius: var(--radius-md); padding: 12px 8px; text-align: center; }
    .stat-num { font-family: var(--font-mono); font-size: 20px; font-weight: 700; }
    .stat-lbl { font-size: 11px; color: var(--fg-muted); }

    /* ─── REVIEW CARDS ─── */
    .review-card {
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 18px;
      margin-bottom: 10px; animation: fadeUp .2s ease both;
    }
    .review-card.correct { border-inline-start: 3px solid var(--success); }
    .review-card.incorrect { border-inline-start: 3px solid var(--error); }
    .review-card.skipped { border-inline-start: 3px solid var(--fg-subtle); }
    .review-card-head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
    .review-icon { width: 24px; height: 24px; border-radius: 50%; display: grid; place-items: center; font-size: 10px; flex-shrink: 0; margin-top: 2px; }
    .review-icon.correct { background: var(--success-subtle); color: var(--success); }
    .review-icon.incorrect { background: var(--error-subtle); color: var(--error); }
    .review-icon.skipped { background: var(--bg-muted); color: var(--fg-subtle); }
    .review-q { font-size: 14px; line-height: 1.6; }
    .review-answers { display: flex; flex-direction: column; gap: 6px; padding-inline-start: 36px; }
    .review-answer-row { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 6px 10px; border-radius: var(--radius); }
    .review-answer-row.user-correct { background: var(--success-subtle); color: var(--success); }
    .review-answer-row.user-wrong { background: var(--error-subtle); color: var(--error); }
    .review-answer-row.correct-ans { background: var(--success-subtle); color: var(--success); opacity: .8; }
    .review-answer-row.skipped-row { background: var(--bg-muted); color: var(--fg-subtle); }
    .review-tag { font-size: 10px; font-weight: 700; font-family: var(--font-mono); letter-spacing: .04em; opacity: .7; flex-shrink: 0; }

    /* ─── LOADING ─── */
    .loader-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 80px 24px; text-align: center; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    .loader-title { font-family: var(--font-serif); font-size: 18px; font-weight: 500; }
    .loader-sub { font-size: 14px; color: var(--fg-muted); max-width: 320px; }

    /* ─── SKELETON ─── */
    .skel { background: linear-gradient(90deg, var(--bg-muted) 25%, var(--border) 50%, var(--bg-muted) 75%); background-size: 600px 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius); }

    /* ─── STATE ─── */
    .state-box { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 60px 24px; text-align: center; }
    .state-icon { width: 56px; height: 56px; border-radius: var(--radius-xl); display: grid; place-items: center; font-size: 24px; }
    .state-icon.error { background: var(--error-subtle); color: var(--error); }
    .state-icon.success { background: var(--success-subtle); color: var(--success); }
    .state-icon.warn { background: var(--warning-subtle); color: var(--warning); }
    .state-title { font-family: var(--font-serif); font-size: 20px; font-weight: 600; }
    .state-desc { font-size: 14px; color: var(--fg-muted); max-width: 360px; }

    /* ─── MODAL ─── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,.5); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--radius-2xl); box-shadow: var(--shadow-xl);
      width: 100%; max-width: 480px; overflow: hidden;
      animation: modalIn .2s ease both;
    }
    .modal-header {
      padding: 20px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-family: var(--font-serif); font-size: 17px; font-weight: 600; }
    .modal-body { padding: 24px; display: flex; flex-direction: column; gap: 14px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

    /* ─── ADMIN LAYOUT ─── */
    .admin-shell { display: grid; min-height: 100dvh; grid-template-columns: 240px 1fr; }
    .admin-nav {
      background: var(--bg-elevated); border-inline-end: 1px solid var(--border);
      padding: 24px 0; display: flex; flex-direction: column; gap: 4px;
      position: sticky; top: 0; height: 100dvh; overflow-y: auto;
    }
    .admin-nav-logo { padding: 0 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
    .admin-nav-section { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--fg-subtle); padding: 8px 20px 4px; font-family: var(--font-mono); }
    .admin-nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 20px; font-size: 14px; color: var(--fg-muted);
      cursor: pointer; transition: all 100ms; border-inline-start: 3px solid transparent;
      text-decoration: none;
    }
    .admin-nav-item:hover { background: var(--bg-muted); color: var(--fg); }
    .admin-nav-item.active { background: var(--accent-subtle); color: var(--accent); border-inline-start-color: var(--accent); font-weight: 500; }
    .admin-content { padding: 32px; overflow: auto; }

    /* ─── TABLE ─── */
    .table-wrap { overflow-x: auto; border-radius: var(--radius-lg); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: var(--bg-muted); padding: 10px 14px; text-align: start; font-weight: 600; color: var(--fg-muted); font-size: 11px; letter-spacing: .04em; text-transform: uppercase; font-family: var(--font-mono); border-bottom: 1px solid var(--border); }
    td { padding: 12px 14px; border-bottom: 1px solid var(--border); color: var(--fg); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg-subtle); }

    /* ─── EXPIRY INDICATOR ─── */
    .expiry-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-inline-end: 6px; }
    .expiry-dot.active { background: var(--success); }
    .expiry-dot.expired { background: var(--error); }
    .expiry-dot.warn { background: var(--warning); }

    /* ─── TAG CHIPS ─── */
    .tag-list { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-family: var(--font-mono); background: var(--accent-subtle); color: var(--accent); border: 1px solid var(--accent-border); }

    /* ─── DROPDOWN ─── */
    .dropdown { position: relative; }
    .dropdown-menu {
      position: absolute; top: calc(100% + 6px); inset-inline-end: 0; z-index: 60;
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
      min-width: 180px; overflow: hidden; display: none;
    }
    .dropdown-menu.open { display: block; animation: fadeIn .1s ease; }
    .dropdown-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; font-size: 13px; color: var(--fg-muted);
      cursor: pointer; transition: background 100ms;
    }
    .dropdown-item:hover { background: var(--bg-muted); color: var(--fg); }
    .dropdown-item.danger:hover { background: var(--error-subtle); color: var(--error); }
    .dropdown-divider { height: 1px; background: var(--border); margin: 4px 0; }

    /* ─── MULTI SELECT ─── */
    .multi-select { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px; border: 1.5px solid var(--border-strong); border-radius: var(--radius-md); background: var(--bg); min-height: 52px; cursor: pointer; }
    .multi-select-placeholder { color: var(--fg-subtle); font-size: 14px; padding: 2px; }
    .multi-tag { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; background: var(--accent-subtle); color: var(--accent); border: 1px solid var(--accent-border); border-radius: 12px; font-size: 12px; font-family: var(--font-mono); }
    .multi-tag button { background: none; border: none; cursor: pointer; color: inherit; font-size: 11px; line-height: 1; padding: 0; }
    .multi-select-dropdown { position: absolute; top: 100%; inset-inline: 0; z-index: 50; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); max-height: 240px; overflow-y: auto; display: none; }
    .multi-select-dropdown.open { display: block; }
    .multi-opt { display: flex; align-items: center; gap: 10px; padding: 9px 12px; font-size: 13px; cursor: pointer; transition: background 100ms; }
    .multi-opt:hover { background: var(--bg-muted); }
    .multi-opt.selected { background: var(--accent-subtle); color: var(--accent); }
    .multi-opt-check { width: 16px; height: 16px; border: 1.5px solid var(--border-strong); border-radius: 4px; display: grid; place-items: center; flex-shrink: 0; font-size: 10px; }
    .multi-opt.selected .multi-opt-check { background: var(--accent); border-color: var(--accent); color: white; }

    /* ─── STEP TRACKER ─── */
    .step-track { display: flex; align-items: center; gap: 0; margin-inline-start: auto; }
    .step-node { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid var(--border-strong); display: grid; place-items: center; font-size: 10px; font-weight: 600; color: var(--fg-subtle); font-family: var(--font-mono); background: var(--bg); }
    .step-node.active { border-color: var(--accent); background: var(--accent); color: white; }
    .step-node.done { border-color: var(--success); background: var(--success); color: white; }
    .step-connector { width: 28px; height: 1px; background: var(--border); }

    /* ─── COUNT SELECTOR ─── */
    .count-selector { display: flex; gap: 8px; flex-wrap: wrap; }
    .count-opt { height: 40px; min-width: 64px; padding: 0 16px; border-radius: var(--radius-md); background: var(--bg-muted); border: 1.5px solid var(--border); font-size: 15px; font-weight: 600; font-family: var(--font-mono); color: var(--fg-muted); cursor: pointer; transition: all 150ms; }
    .count-opt:hover { border-color: var(--accent-border); color: var(--accent); }
    .count-opt.active { background: var(--accent); border-color: var(--accent); color: white; }

    /* ─── TOOLTIP ─── */
    .has-tooltip { position: relative; }
    .tooltip { position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: var(--fg); color: var(--bg); font-size: 12px; padding: 5px 9px; border-radius: var(--radius); white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 150ms; font-family: var(--font-mono); }
    .has-tooltip:hover .tooltip { opacity: 1; }

    /* ─── STATS GRID ─── */
    .stats-grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); }
    .stat-card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; }
    .stat-card-num { font-family: var(--font-mono); font-size: 28px; font-weight: 700; color: var(--fg); margin-bottom: 4px; }
    .stat-card-label { font-size: 13px; color: var(--fg-muted); }

    /* ─── SECTION HEAD ─── */
    .section-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .section-head-title { font-family: var(--font-serif); font-size: 17px; font-weight: 600; flex-shrink: 0; }
    .section-head-line { flex: 1; height: 1px; background: var(--border); }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      .admin-shell { grid-template-columns: 1fr; }
      .admin-nav { display: none; }
      .topbar-inner { padding: 0 16px; }
      .page { padding: 20px 16px 60px; }
    }

    /* ─── UTILS ─── */
    .flex { display: flex; }
    .flex-center { display: flex; align-items: center; justify-content: center; }
    .flex-between { display: flex; align-items: center; justify-content: space-between; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .gap-4 { gap: 16px; }
    .gap-5 { gap: 20px; }
    .gap-6 { gap: 24px; }
    .mt-4 { margin-top: 16px; }
    .mt-6 { margin-top: 24px; }
    .mb-4 { margin-bottom: 16px; }
    .text-muted { color: var(--fg-muted); }
    .text-mono { font-family: var(--font-mono); }
    .text-sm { font-size: 13px; }
    .text-xs { font-size: 11px; }
    .fw-600 { font-weight: 600; }
    .grid { display: grid; }
    .grid-2 { grid-template-columns: 1fr 1fr; }
    .grid-3 { grid-template-columns: 1fr 1fr 1fr; }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--fg-subtle); }

    /* ─── PRINT ─── */
    @media print {
      .topbar, .submit-bar, .admin-nav { display: none; }
    }

    /* ─── NOTIFICATION TOAST ─── */
    .toast-container { position: fixed; bottom: 80px; inset-inline-end: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
    .toast {
      background: var(--bg-elevated); border: 1px solid var(--border);

      display: flex; align-items: flex-start; gap: 10px;
      animation: slideIn .3s ease; pointer-events: all;
    }
    .toast.success { border-inline-start: 3px solid var(--success); }
    .toast.error { border-inline-start: 3px solid var(--error); }
    .toast.info { border-inline-start: 3px solid var(--accent); }
  </style>
</head>

function toast(msg, type='info', ms=3500){
  const c=$('toast-container'), el=document.createElement('div');
  el.className=`toast ${type}`;
  const ic={success:'fa-check-circle',error:'fa-circle-exclamation',info:'fa-circle-info',warn:'fa-triangle-exclamation'}[type]||'fa-circle-info';
  el.innerHTML=`<i class="fa-solid ${ic}"></i><div>${msg}</div>`;
  c.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300);},ms);
}

/* ── API wrapper ── */
async function api(method, path, body, noAuth=false){
  const headers={'Content-Type':'application/json'};
  if (!noAuth && authToken) headers['Authorization']=`Bearer ${authToken}`;
  const opts={method,headers};
  if (body) opts.body=JSON.stringify(body);
  const controller=new AbortController();
  const timeout=setTimeout(()=>controller.abort(),30000);
  try {
    const r=await fetch(path,{...opts,signal:controller.signal});
    clearTimeout(timeout);
    const data=await r.json().catch(()=>({}));
    return {ok:r.ok, status:r.status, data};
  } catch(e){
    clearTimeout(timeout);
    if (e.name==='AbortError') throw new Error('Request timed out. Check your connection.');
    throw new Error('Network error. Check your connection.');
  }
}

  h.setAttribute('data-theme',dark?'light':'dark');
}

function toggleLang(){
  lang=lang==='en'?'ur':'en';
  const h=document.documentElement;
  h.setAttribute('data-lang',lang);
  h.setAttribute('dir',lang==='ur'?'rtl':'ltr');
  h.setAttribute('lang',lang);

  $('brand-sub-text').textContent=t('brand_sub');

  else if (quiz) renderQuiz(qIdx);

}

async function submitLogin(){
  const email=$('l-email')?.value.trim();
  const pass=$('l-pass')?.value;
  const errEl=$('login-err'), btn=$('login-btn');
  errEl.textContent=''; errEl.classList.remove('visible');

  btn.disabled=true; btn.innerHTML='<div class="spinner" style="width:16px;height:16px;border-width:2px"></div>';
  try {
    const {ok,status,data} = await api('POST','/api/auth/login',{email,password:pass},true);
    if(!ok){
      const msg = status===403?t('err_expired'):status===401?t('err_invalid'):data.error||t('err_generic');
      errEl.textContent=msg; errEl.classList.add('visible');
      btn.disabled=false; btn.innerHTML=`<i class="fa-solid fa-arrow-right-to-bracket"></i> ${t('login_btn')}`;
      return;
    }
    authToken=data.token; currentUser=data.user;
    sessionStorage.setItem('psc_token',authToken);
    sessionStorage.setItem('psc_user',JSON.stringify(currentUser));
    $("main-content").style.padding='';
    renderChip();
    if(currentUser.role==='admin') renderAdmin(_loginOpts.adminRedirect||'dashboard');
    else renderTopics();
  } catch(e){
    errEl.textContent=e.message; errEl.classList.add('visible');
    btn.disabled=false; btn.innerHTML=`<i class="fa-solid fa-arrow-right-to-bracket"></i> ${t('login_btn')}`;
  }
}

        </div>

        </button>

function pickCount(n){
  qCount=n;
  document.querySelectorAll('.count-opt').forEach(b=>b.classList.toggle('active',+b.dataset.c===n));
}

/* ═══════════════════════════════════════════════════════════════════════
   GENERATE
═══════════════════════════════════════════════════════════════════════ */
async function doGenerate(){
  setP(60);
  const nm=lang==='ur'?profession.label_ur:profession.label_en;
  const concepts=profession.concepts.join(', ');
  const ql=profession.lang==='ur'?'Urdu':'English';
  setV(`<div class="page" style="animation:fadeUp .2s ease both">
    <div class="loader-wrap">
      <div class="spinner" style="width:48px;height:48px;border-width:4px"></div>
      <div class="loader-title">${t('generating')}</div>
      <div class="loader-sub">${t('generating_sub')}</div>
      <div style="font-size:12px;color:var(--fg-subtle);font-family:var(--font-mono);margin-top:8px">${profession.id} · ${qCount} questions</div>
    </div>
  </div>`);
  try {
    const controller=new AbortController();
    const to=setTimeout(()=>controller.abort(),90000);
    let res;
    try {
      res=await fetch('/api/generate',{method:'POST',signal:controller.signal,
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${authToken}`},
        body:JSON.stringify({topic:`${profession.label_en} for AJK PSC`,count:qCount,
          concepts,lang:ql,professionId:profession.id})});
    } finally { clearTimeout(to); }
    if (!res.ok){
      const d=await res.json().catch(()=>({}));
      throw new Error(d.error||`Server error ${res.status}`);
    }
    const data=await res.json();
    if (!data.questions?.length) throw new Error('No questions returned by AI.');
    quiz=data.questions; answers={}; qIdx=0;
    startTime=Date.now();
    if(timerID) clearInterval(timerID);
    timerID=setInterval(updateBar,1000);
    setP(70); renderQuiz(0);
  } catch(e){
    const isAbort=e.name==='AbortError';
    setV(`<div class="page"><div class="state-box">
      <div class="state-icon error"><i class="fa-solid fa-triangle-exclamation"></i></div>
      <div class="state-title">${isAbort?'Timed Out':'Generation Failed'}</div>
      <div class="state-desc">${isAbort?'AI took too long. Try fewer questions.':e.message}</div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button class="btn btn-accent" onclick="doGenerate()"><i class="fa-solid fa-rotate-right"></i> Try Again</button>
        <button class="btn btn-ghost" onclick="renderConfigure()"><i class="fa-solid fa-arrow-left"></i> ${t('back')}</button>
      </div>
    </div></div>`);
  }
}

/* ═══════════════════════════════════════════════════════════════════════
   QUIZ
═══════════════════════════════════════════════════════════════════════ */
function renderQuiz(idx){
  qIdx=idx;
  const q=quiz[idx], total=quiz.length, answered=Object.keys(answers).length;
  const isRTL=profession.lang==='ur';
  updateBar(answered,total); showBar();
  setP(70+(answered/total)*20);
  const opts=q.options.map((o,i)=>{
    const sel=answers[idx]===o;
    return `<button class="option-btn ${sel?'selected':''}" data-answer="${encodeURIComponent(o)}" onclick="pickAnswer(${idx},this)">
        <div class="option-letter">${'ABCD'[i]}</div>
        <span style="${isRTL?'direction:rtl':''}">${o}</span>
      </button>`;
  }).join('');
  const dots=quiz.map((_,i)=>`<div class="q-dot ${i===idx?'current':answers[i]!==undefined?'answered':''}" onclick="renderQuiz(${i})">${i+1}</div>`).join('');
  setV(`<div class="page page-md" style="animation:fadeUp .2s ease both">
    <div class="question-card">
      <div class="question-head">
        <span class="question-num">${t('q_of',{n:idx+1,total})}</span>
        <span class="badge badge-${answered===total?'success':'default'}">${answered}/${total} ${t('answered')}</span>
      </div>
      <div class="question-body">
        <div class="question-text" style="${isRTL?'direction:rtl;text-align:right':''}">${q.question}</div>
        <div class="options-list">${opts}</div>
      </div>
      <div class="question-nav">
        <button class="btn btn-ghost" onclick="renderQuiz(${idx-1})" ${idx===0?'disabled':''}>
          <i class="fa-solid fa-arrow-left"></i> ${t('back')}
        </button>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost btn-sm" onclick="openQNav()"><i class="fa-solid fa-grip"></i></button>
          <button class="btn ${idx<total-1?'btn-ghost':'btn-accent'}" onclick="${idx<total-1?`renderQuiz(${idx+1})`:'openSubmitModal()'}">
            ${idx<total-1?`${t('next')} <i class="fa-solid fa-arrow-right"></i>`:`<i class="fa-solid fa-flag-checkered"></i> ${t('submit_quiz')}`}
          </button>
        </div>
      </div>
    </div>
    <div style="margin-top:16px">
      <div class="section-head">
        <span class="section-head-title" style="font-size:13px;color:var(--fg-muted)">${t('answered_of',{n:answered,total})}</span>
        <div class="section-head-line"></div>
      </div>
      <div class="q-grid">${dots}</div>
    </div>
  </div>`);
}

function pickAnswer(idx, btn){
  const answer=decodeURIComponent(btn.dataset.answer||'');
  answers[idx]=answer;
  btn.closest('.options-list').querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  const dot=document.querySelectorAll('.q-dot')[idx];
  if(dot){dot.classList.remove('current');dot.classList.add('answered');}
  updateBar();
  setTimeout(()=>{ if(idx<quiz.length-1) renderQuiz(idx+1); else openSubmitModal(); },400);
}

function updateBar(){
  const answered=Object.keys(answers).length, total=quiz?.length||0;
  const el=$('sb-answered'); if(el) el.textContent=t('answered_of',{n:answered,total});
  const tel=$('sb-time');
  if(tel&&startTime){
    const e=Math.floor((Date.now()-startTime)/1000);
    tel.textContent=`${String(Math.floor(e/60)).padStart(2,'0')}:${String(e%60).padStart(2,'0')}`;
  }
}

function openQNav(){
  const total=quiz.length, answered=Object.keys(answers).length;
  const grid=quiz.map((_,i)=>`<div class="q-dot ${i===qIdx?'current':answers[i]!==undefined?'answered':''}"
    onclick="closeModal();renderQuiz(${i})" style="width:36px;height:36px;font-size:12px;cursor:pointer">${i+1}</div>`).join('');
  modal('Questions',`<div style="font-size:13px;color:var(--fg-muted);margin-bottom:12px">${answered}/${total} answered</div>
    <div class="q-grid" style="gap:8px">${grid}</div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>`);
}

function openSubmitModal(){
  const total=quiz.length, unanswered=total-Object.keys(answers).length;
  if(unanswered>0){
    modal(t('submit_quiz'),
      `<div class="callout warn"><i class="fa-solid fa-triangle-exclamation"></i>
       <div><div style="font-weight:600;margin-bottom:4px">${t('unanswered',{n:unanswered})}</div>
       <div style="font-size:13px">${t('unanswered_tip')}</div></div></div>`,
      `<button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
       <button class="btn btn-accent" onclick="closeModal();submitQuiz()">${t('submit_anyway')}</button>`);
  } else { submitQuiz(); }
}

function submitQuiz(){ closeModal(); if(timerID)clearInterval(timerID); renderResults(); }

/* ═══════════════════════════════════════════════════════════════════════
   RESULTS
═══════════════════════════════════════════════════════════════════════ */
async function renderResults(){
  hideBar(); setP(95);
  const total=quiz.length;
  let score=0;
  const items=quiz.map((q,i)=>{
    const sel=answers[i]; const isC=sel===q.correctAnswer; const sk=sel===undefined;
    if(isC)score++;
    return {question:q.question,options:q.options,correctAnswer:q.correctAnswer,selectedAnswer:sel||null,isCorrect:isC,skipped:sk};
  });
  const elapsed=startTime?Math.floor((Date.now()-startTime)/1000):0;
  const timeStr=`${Math.floor(elapsed/60)}m ${elapsed%60}s`;
  const pct=(score/total)*100, pass=pct>=60;
  const wrong=items.filter(x=>!x.isCorrect&&!x.skipped).length;
  const skip=items.filter(x=>x.skipped).length;
  const circ=2*Math.PI*54, offset=circ-(pct/100)*circ;
  const nm=lang==='ur'?profession.label_ur:profession.label_en;

  // Save result to API (non-blocking)
  api('POST','/api/results',{
    profession:profession.id,professionLabel:profession.label_en,
    score,total,percentage:pct,pass,wrong,skipped:skip,timeTaken:timeStr,
    answers:items.map(({question,correctAnswer,selectedAnswer,isCorrect,skipped})=>
      ({question,correctAnswer,selectedAnswer,isCorrect,skipped}))
  }).catch(e=>console.warn('Result save failed:',e.message));

  setP(100);

  const reviewHTML=items.map((item,i)=>{
    const cls=item.isCorrect?'correct':item.skipped?'skipped':'incorrect';
    const icon=item.isCorrect?'fa-check':item.skipped?'fa-minus':'fa-xmark';
    let ans='';
    if(item.skipped)
      ans=`<div class="review-answer-row skipped-row"><span class="review-tag">SKIPPED</span></div>
           <div class="review-answer-row correct-ans"><span class="review-tag">${t('correct_answer').toUpperCase()}</span><span>${item.correctAnswer}</span></div>`;
    else if(item.isCorrect)
      ans=`<div class="review-answer-row user-correct"><i class="fa-solid fa-check" style="font-size:10px"></i><span class="review-tag">${t('your_answer').toUpperCase()}</span><span>${item.selectedAnswer}</span></div>`;
    else
      ans=`<div class="review-answer-row user-wrong"><i class="fa-solid fa-xmark" style="font-size:10px"></i><span class="review-tag">${t('your_answer').toUpperCase()}</span><span>${item.selectedAnswer}</span></div>
           <div class="review-answer-row correct-ans"><i class="fa-solid fa-check" style="font-size:10px"></i><span class="review-tag">${t('correct_answer').toUpperCase()}</span><span>${item.correctAnswer}</span></div>`;
    return `<div class="review-card ${cls}" style="animation-delay:${i*.02}s">
      <div class="review-card-head">
        <div class="review-icon ${cls}"><i class="fa-solid ${icon}"></i></div>
        <div class="review-q"><span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle)">${i+1}. </span>${item.question}</div>
      </div>
      <div class="review-answers">${ans}</div>
    </div>`;
  }).join('');

  setV(`<div class="page" style="animation:fadeUp .25s ease both">
    <div class="page-header">
      <div class="page-header-meta">
        <div class="breadcrumb">
          <span style="cursor:pointer" onclick="renderTopics()">${t('choose_topic')}</span>
          <span class="sep">/</span><span>${nm}</span><span class="sep">/</span><span>${t('result')}</span>
        </div>
        <button class="btn btn-ghost btn-sm" style="margin-inline-start:auto" onclick="resetQuiz()">
          <i class="fa-solid fa-rotate-right"></i> ${t('new_assessment')}
        </button>
      </div>
      <div class="page-title">${pass?t('pass_title'):t('fail_title')}</div>
      <p class="page-desc">${currentUser.name} · ${nm}</p>
    </div>
    <div class="results-layout">
      <div style="display:flex;flex-direction:column;gap:16px">
        <div class="score-display">
          <div class="score-ring-wrap">
            <svg class="score-ring-svg" viewBox="0 0 120 120">
              <circle class="score-ring-bg" cx="60" cy="60" r="54"/>
              <circle class="score-ring-arc ${pass?'pass':'fail'}" cx="60" cy="60" r="54" id="ring-arc"
                      style="stroke-dasharray:${circ};stroke-dashoffset:${circ}"/>
            </svg>
            <div class="score-ring-center">
              <span class="score-pct ${pass?'pass':'fail'}" id="pct-el">0%</span>
              <span class="score-label">${t('score')}</span>
            </div>
          </div>
          <div class="score-verdict">${pass?t('verdict_pass'):t('verdict_fail')}</div>
          <div class="score-detail">${pct.toFixed(1)}% · ${t('threshold')}</div>
          <div class="score-stats">
            <div class="stat-box"><div class="stat-num" style="color:var(--success)">${score}</div><div class="stat-lbl">${t('correct')}</div></div>
            <div class="stat-box"><div class="stat-num" style="color:var(--error)">${wrong}</div><div class="stat-lbl">${t('incorrect')}</div></div>
            <div class="stat-box"><div class="stat-num" style="color:var(--fg-subtle)">${skip}</div><div class="stat-lbl">${t('skipped')}</div></div>
          </div>
        </div>
        <div class="panel-card">
          <div class="panel-head">${t('candidate')}</div>
          <div class="panel-list-item"><span class="panel-list-label">${t('name')}</span><span class="panel-list-value">${currentUser.name}</span></div>
          <div class="panel-list-item"><span class="panel-list-label">${t('email')}</span><span class="panel-list-value" style="font-size:12px">${currentUser.email}</span></div>
          <div class="panel-list-item"><span class="panel-list-label">${t('questions')}</span><span class="panel-list-value">${total}</span></div>
          <div class="panel-list-item"><span class="panel-list-label">${t('score')}</span><span class="panel-list-value">${score}/${total}</span></div>
          <div class="panel-list-item"><span class="panel-list-label">${t('time')}</span><span class="panel-list-value">${timeStr}</span></div>
          <div class="panel-list-item"><span class="panel-list-label">${t('result')}</span><span class="badge ${pass?'badge-success':'badge-error'}">${pass?t('pass'):t('fail')}</span></div>
        </div>
        <button class="btn btn-accent btn-full btn-lg" onclick="resetQuiz()">
          <i class="fa-solid fa-rotate-right"></i> ${t('new_assessment')}
        </button>
      </div>
      <div>
        <div class="section-head">
          <span class="section-head-title">${t('review')}</span>
          <div class="section-head-line"></div>
          <span class="badge badge-default">${total}</span>
        </div>
        ${reviewHTML}
      </div>
    </div>
  </div>`);

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const arc=$('ring-arc'); if(arc) arc.style.strokeDashoffset=offset;
    const pe=$('pct-el'); if(pe){
      let cur=0;const tgt=pct;
      const ti=setInterval(()=>{cur=Math.min(cur+tgt/60,tgt);pe.textContent=Math.round(cur)+'%';if(cur>=tgt)clearInterval(ti);},20);
    }
  }));
}

function resetQuiz(){ quiz=null;answers={};qIdx=0;startTime=null; if(timerID)clearInterval(timerID); renderTopics(); }

        const st=exp<today?'expired':days<=7?'soon':'active';

        const tags=(u.topics||[]).slice(0,2).map(id=>`<span class="tag">${id}</span>`).join('');
        const more=(u.topics||[]).length>2?`<span class="badge badge-default">+${u.topics.length-2}</span>`:'';
        return `<tr>
          <td style="font-weight:500">${u.name||'-'}</td>
          <td style="font-size:12px;font-family:var(--font-mono)">${u.email||'-'}</td>
          <td>${u.phone||'-'}</td>
          <td style="font-family:var(--font-mono);font-size:12px">${u.expiryDate||'-'}</td>
          <td><span class="expiry-dot ${st}"></span><span class="badge badge-${st==='active'?'success':st==='soon'?'warn':'error'}">${stLabel}</span></td>
          <td><div class="tag-list">${tags}${more}</div></td>
          <td><div style="display:flex;gap:6px">
            <button class="btn btn-ghost btn-sm" onclick='openUserModal(${JSON.stringify(u)})'>
              <i class="fa-solid fa-pencil"></i>
            </button>
            <button class="btn btn-ghost btn-sm" style="color:var(--error)" onclick="deleteUser('${u.uid}',${JSON.stringify(u.name||u.email)})">
              <i class="fa-solid fa-trash"></i>
            </button>
          </div></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;
  } catch(e){ toast('Failed to load users: '+e.message,'error'); }
}

function openUserModal(user=null){
  const isEdit=!!user;
  const topicOpts=PROFESSIONS.map(p=>`<option value="${p.id}" ${user&&(user.topics||[]).includes(p.id)?'selected':''}>
    ${p.label_en} (${p.id})</option>`).join('');
  modal(isEdit?t('edit_user'):t('add_user'),
    `<div style="display:flex;flex-direction:column;gap:14px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="field"><label class="field-label">${t('user_name')} <span class="required">*</span></label>
          <input id="u-name" type="text" class="field-input" value="${user?.name||''}" placeholder="Full Name"></div>
        <div class="field"><label class="field-label">${t('user_email')} <span class="required">*</span></label>
          <input id="u-email" type="email" class="field-input" value="${user?.email||''}" placeholder="email@example.com"></div>
        <div class="field"><label class="field-label">${t('user_pass')} ${isEdit?'(blank = keep)':''}  ${isEdit?'':' <span class="required">*</span>'}</label>
          <input id="u-pass" type="text" class="field-input" value="" placeholder="Password"></div>
        <div class="field"><label class="field-label">${t('user_phone')}</label>
          <input id="u-phone" type="text" class="field-input" value="${user?.phone||''}" placeholder="+92..."></div>
        <div class="field"><label class="field-label">${t('user_start')}</label>
          <input id="u-start" type="date" class="field-input" value="${user?.startDate||new Date().toISOString().slice(0,10)}"></div>
        <div class="field"><label class="field-label">${t('user_expiry')} <span class="required">*</span></label>
          <input id="u-expiry" type="date" class="field-input" value="${user?.expiryDate||''}" required></div>
      </div>
      <div class="field"><label class="field-label">${t('user_topics')} <span class="required">*</span></label>
        <select id="u-topics" multiple class="field-input" style="height:140px">${topicOpts}</select>
        <span class="field-hint">Hold Ctrl/Cmd to select multiple</span></div>
      <div class="field"><label class="field-label">${t('user_notes')}</label>
        <input id="u-notes" type="text" class="field-input" value="${user?.additionalNotes||''}" placeholder="Notes…"></div>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
     <button class="btn btn-accent" onclick="saveUser(${isEdit?`'${user.uid}'`:'null'})">
       <i class="fa-solid fa-floppy-disk"></i> ${t('save')}
     </button>`);
}

async function saveUser(uid){
  const name=$('u-name')?.value.trim();
  const email=$('u-email')?.value.trim().toLowerCase();
  const pass=$('u-pass')?.value.trim();
  const phone=$('u-phone')?.value.trim();
  const startDate=$('u-start')?.value;
  const expiryDate=$('u-expiry')?.value;
  const topics=Array.from($('u-topics').selectedOptions).map(o=>o.value);
  const additionalNotes=$('u-notes')?.value.trim();
  if(!name||!email||!expiryDate||!topics.length){toast('Fill all required fields','error');return;}
  const body={name,email,phone,startDate,expiryDate,topics,additionalNotes};
  if(pass) body.password=pass;
  else if(!uid){toast('Password required for new users','error');return;}
  try {
    const {ok,data}=uid?await api('PUT',`/api/users/${uid}`,body):await api('POST','/api/users',body);
    if(!ok){toast(data.error||'Save failed','error');return;}
    toast(uid?'User updated':'User created','success');
    closeModal(); renderAdmin('users');
  } catch(e){ toast(e.message,'error'); }
}

function deleteUser(uid, name){
  modal(t('confirm_delete'),
    `<div class="callout error"><i class="fa-solid fa-triangle-exclamation"></i>
     <div>Delete <strong>${name}</strong>? This cannot be undone.</div></div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
     <button class="btn btn-error" onclick="confirmDelete('${uid}')"><i class="fa-solid fa-trash"></i> ${t('delete')}</button>`);
}
async function confirmDelete(uid){
  try {
    const {ok,data}=await api('DELETE',`/api/users/${uid}`);
    if(!ok){toast(data.error||'Delete failed','error');return;}
    toast('User deleted','success'); closeModal(); renderAdmin('users');
  } catch(e){ toast(e.message,'error'); }
}

/* ─ Results ─ */
function adminResultsHTML(){
  return `<div style="animation:fadeUp .25s ease both">
    <div style="margin-bottom:24px">
      <h1 style="font-family:var(--font-serif);font-size:26px;font-weight:600;margin-bottom:4px">${t('admin_results')}</h1>
      <p style="color:var(--fg-muted);font-size:14px">All candidate assessment results</p>
    </div>
    <div id="results-table"><div style="padding:20px;color:var(--fg-muted);font-size:13px">Loading…</div></div>
  </div>`;
}
async function loadResults(){
  try {
    const {ok,data}=await api('GET','/api/results?limit=200');
    const el=$('results-table');if(!el)return;
    if(!ok||!data.length){el.innerHTML=`<div style="padding:20px;color:var(--fg-muted);font-size:13px">${t('no_results')}</div>`;return;}
    el.innerHTML=`<div class="table-wrap"><table>
      <thead><tr><th>${t('name')}</th><th>${t('email')}</th><th>Topic</th>
        <th>${t('score')}</th><th>%</th><th>${t('time')}</th><th>${t('result')}</th><th>Date</th></tr></thead>
      <tbody>${data.map(r=>`<tr>
        <td style="font-weight:500">${r.userName||'-'}</td>
        <td style="font-size:12px;font-family:var(--font-mono)">${r.userEmail||'-'}</td>
        <td><span class="badge badge-default">${r.profession||'-'}</span></td>
        <td style="font-family:var(--font-mono)">${r.score||0}/${r.total||0}</td>
        <td style="font-family:var(--font-mono)">${(r.percentage||0).toFixed(1)}%</td>
        <td style="font-size:12px">${r.timeTaken||'-'}</td>
        <td><span class="badge ${r.pass?'badge-success':'badge-error'}">${r.pass?t('pass'):t('fail')}</span></td>
        <td style="font-size:12px;color:var(--fg-muted)">${r.createdAt?new Date(r.createdAt).toLocaleDateString():'-'}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  } catch(e){ toast('Failed to load results: '+e.message,'error'); }
}

/* ═══════════════════════════════════════════════════════════════════════
   ROUTING
═══════════════════════════════════════════════════════════════════════ */
function parseHash(){
  const h=window.location.hash.replace('#','');
  if(h.startsWith('admin')){return{route:'admin',tab:h.split('/')[1]||'dashboard'};}
  return{route:null};
}

/* ═══════════════════════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════════════════════ */
function boot(){
  setP(5);
  const {route,tab}=parseHash();
  if(currentUser&&authToken){
    renderChip();
    $('main-content').style.padding='';
    if(currentUser.role==='admin') renderAdmin(route==='admin'?tab:'dashboard');
    else renderTopics();
  } else {
    renderLogin(route==='admin'?{adminRedirect:tab}:{});
  }
}

window.addEventListener('load', boot);
  </script>
</body>
</html>
