<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ProQuiz AI — Intelligent Assessment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ── DESIGN TOKENS ── */
        :root {
            /* Colors */
            --ink:            #0d0d12;
            --ink-secondary:  #3c3c4e;
            --ink-tertiary:   #7a7a94;
            --ink-disabled:   #b0b0c4;

            --surface:        #ffffff;
            --surface-subtle: #f7f7fb;
            --surface-muted:  #eeeeF5;
            --surface-invert: #0d0d12;

            --accent:         #4f35e8;
            --accent-hover:   #3e27c4;
            --accent-light:   #ece9fd;
            --accent-glow:    rgba(79, 53, 232, 0.14);

            --success:        #0ea871;
            --success-light:  #d0f5e8;
            --danger:         #e84444;
            --danger-light:   #fde8e8;
            --warning:        #f09c15;
            --warning-light:  #fef3d6;

            --border:         rgba(0, 0, 0, 0.07);
            --border-medium:  rgba(0, 0, 0, 0.11);
            --border-focus:   rgba(79, 53, 232, 0.45);

            /* Typography */
            --font-body:      'Plus Jakarta Sans', system-ui, sans-serif;
            --font-serif:     'Instrument Serif', Georgia, serif;

            /* Spacing */
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;
            --space-10: 40px;
            --space-12: 48px;

            /* Radius */
            --r-sm:  8px;
            --r-md:  12px;
            --r-lg:  18px;
            --r-xl:  24px;
            --r-pill: 9999px;

            /* Shadows */
            --shadow-xs: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 6px 20px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.11), 0 4px 16px rgba(0,0,0,0.05);
            --shadow-accent: 0 6px 20px rgba(79, 53, 232, 0.28);

            /* Layout */
            --app-width: 600px;
            --header-h: 60px;
        }

        /* ── RESET ── */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        body {
            font-family: var(--font-body);
            background: var(--surface-subtle);
            color: var(--ink);
            min-height: 100dvh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 0;
            overflow-x: hidden;
        }

        /* Ambient gradient bg */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse 70% 50% at 15% -5%, rgba(79,53,232,0.055) 0%, transparent 65%),
                radial-gradient(ellipse 50% 40% at 90% 108%, rgba(79,53,232,0.035) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── APP SHELL ── */
        #app-shell {
            width: 100%;
            max-width: var(--app-width);
            min-height: 100dvh;
            background: var(--surface);
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 680px) {
            body {
                padding: 40px 20px;
                align-items: flex-start;
            }
            #app-shell {
                min-height: auto;
                border-radius: var(--r-xl);
                box-shadow: var(--shadow-lg);
                overflow: hidden;
            }
        }

        @media (min-width: 1024px) {
            body { padding: 48px 24px; }
        }

        /* ── HEADER ── */
        .app-header {
            height: var(--header-h);
            padding: 0 var(--space-6);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 20;
            gap: var(--space-3);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            flex-shrink: 0;
        }

        .logo-mark {
            width: 34px;
            height: 34px;
            background: var(--ink);
            border-radius: var(--r-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            flex-shrink: 0;
        }

        .logo-name {
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 16px;
            letter-spacing: -0.4px;
            color: var(--ink);
        }

        .logo-name em {
            font-style: normal;
            color: var(--accent);
        }

        .header-tag {
            font-size: 11px;
            font-weight: 500;
            color: var(--ink-tertiary);
            background: var(--surface-subtle);
            border: 1px solid var(--border);
            padding: 3px 10px;
            border-radius: var(--r-pill);
            letter-spacing: 0.2px;
            white-space: nowrap;
        }

        /* ── PROGRESS BAR ── */
        #progress-bar-wrap {
            height: 2px;
            background: var(--surface-muted);
        }

        #progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #8470ff);
            width: 0%;
            transition: width 0.65s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ── MAIN CONTENT ── */
        #view-content {
            flex: 1;
            padding: var(--space-8) var(--space-6) var(--space-10);
            overflow-y: auto;
        }

        @media (max-width: 400px) {
            #view-content { padding: var(--space-6) var(--space-5) var(--space-10); }
            .app-header { padding: 0 var(--space-5); }
        }

        /* ── LOADER OVERLAY ── */
        #loader-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: var(--space-5);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        #loader-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .loader-ring {
            width: 40px;
            height: 40px;
            border: 2.5px solid var(--surface-muted);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }

        #loader-text {
            font-size: 13.5px;
            color: var(--ink-secondary);
            font-weight: 400;
            max-width: 220px;
            text-align: center;
            line-height: 1.6;
        }

        /* ── ANIMATIONS ── */
        @keyframes spin { to { transform: rotate(360deg); } }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-3px); }
            80% { transform: translateX(3px); }
        }

        @keyframes checkPop {
            0%   { transform: scale(0) rotate(-12deg); }
            65%  { transform: scale(1.18) rotate(4deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        @keyframes highlightRing {
            0%   { box-shadow: 0 0 0 0 rgba(79,53,232,0.45); }
            70%  { box-shadow: 0 0 0 7px rgba(79,53,232,0); }
            100% { box-shadow: 0 0 0 0 rgba(79,53,232,0); }
        }

        .slide-up { animation: slideUp 0.32s cubic-bezier(0.4, 0, 0.2, 1) both; }
        .stagger-1 { animation-delay: 0.05s; }
        .stagger-2 { animation-delay: 0.1s; }
        .stagger-3 { animation-delay: 0.16s; }
        .stagger-4 { animation-delay: 0.22s; }

        /* ── TYPOGRAPHY ── */
        .display-title {
            font-family: var(--font-serif);
            font-style: italic;
            font-size: clamp(24px, 5vw, 30px);
            line-height: 1.15;
            letter-spacing: -0.3px;
            color: var(--ink);
        }

        .section-title {
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 18px;
            letter-spacing: -0.3px;
            color: var(--ink);
        }

        .body-text {
            font-size: 14px;
            line-height: 1.65;
            color: var(--ink-secondary);
            font-weight: 400;
        }

        .eyebrow {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: var(--accent);
        }

        /* ── DIVIDER ── */
        .divider {
            height: 1px;
            background: var(--border);
            margin: var(--space-6) 0;
        }

        /* ── FORM ELEMENTS ── */
        .form-stack {
            display: flex;
            flex-direction: column;
            gap: var(--space-4);
        }

        .form-header { margin-bottom: var(--space-2); }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
        }

        .field-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--ink-secondary);
            letter-spacing: -0.1px;
        }

        .field-input {
            width: 100%;
            padding: 13px var(--space-4);
            border: 1.5px solid var(--surface-muted);
            border-radius: var(--r-md);
            font-family: var(--font-body);
            font-size: 15px;
            color: var(--ink);
            background: var(--surface);
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
            -webkit-appearance: none;
        }

        .field-input::placeholder {
            color: var(--ink-disabled);
            font-weight: 400;
        }

        .field-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .field-input.error {
            border-color: var(--danger);
            box-shadow: 0 0 0 4px rgba(232, 68, 68, 0.1);
        }

        /* ── BUTTONS ── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            padding: 13px var(--space-6);
            border-radius: var(--r-md);
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            white-space: nowrap;
            letter-spacing: -0.1px;
            line-height: 1;
        }

        .btn:active { transform: scale(0.97); }

        .btn-primary {
            background: var(--ink);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .btn-primary:hover {
            background: #1d1d2a;
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0) scale(0.97);
        }

        .btn-accent {
            background: var(--accent);
            color: white;
            box-shadow: var(--shadow-accent);
        }

        .btn-accent:hover {
            background: var(--accent-hover);
            box-shadow: 0 8px 28px rgba(79, 53, 232, 0.38);
            transform: translateY(-1px);
        }

        .btn-ghost {
            background: transparent;
            color: var(--ink-secondary);
            border: 1.5px solid var(--border-medium);
        }

        .btn-ghost:hover {
            background: var(--surface-subtle);
            color: var(--ink);
            border-color: rgba(0,0,0,0.16);
        }

        .btn-full { width: 100%; }

        .btn-lg {
            padding: 15px var(--space-8);
            font-size: 15px;
            border-radius: var(--r-lg);
        }

        .form-actions {
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
            margin-top: var(--space-2);
        }

        @media (min-width: 460px) {
            .form-actions {
                flex-direction: row-reverse;
            }
            .form-actions .btn-primary,
            .form-actions .btn-accent {
                flex: 1;
            }
        }

        /* ── STEP INDICATOR ── */
        .step-indicator {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            margin-bottom: var(--space-6);
        }

        .step-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--surface-muted);
            transition: all 0.3s ease;
        }

        .step-dot.active {
            width: 22px;
            border-radius: 3px;
            background: var(--accent);
        }

        .step-dot.done {
            background: var(--success);
        }

        /* ── QUIZ CARD ── */
        .quiz-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--r-lg);
            padding: var(--space-5);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .quiz-card.answered {
            border-color: rgba(79, 53, 232, 0.18);
        }

        .quiz-card.unanswered-highlight {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
            animation: highlightRing 1s ease-out;
        }

        .quiz-number-row {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            margin-bottom: var(--space-3);
        }

        .quiz-number-badge {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            background: var(--accent-light);
            color: var(--accent);
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .quiz-number-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            color: var(--accent);
        }

        .answer-unanswered-label {
            display: none;
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            background: var(--accent-light);
            padding: 2px 8px;
            border-radius: var(--r-pill);
            margin-left: auto;
        }

        .quiz-card.unanswered-highlight .answer-unanswered-label {
            display: inline-flex;
        }

        .quiz-question {
            font-size: 15px;
            font-weight: 500;
            line-height: 1.55;
            color: var(--ink);
            margin-bottom: var(--space-4);
        }

        /* ── OPTION BUTTONS ── */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
        }

        .option-btn {
            width: 100%;
            text-align: left;
            background: var(--surface-subtle);
            border: 1.5px solid transparent;
            border-radius: var(--r-md);
            padding: 12px var(--space-4);
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 400;
            color: var(--ink-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: var(--space-3);
            transition: all 0.14s cubic-bezier(0.4, 0, 0.2, 1);
            line-height: 1.45;
        }

        .option-btn:hover {
            background: var(--accent-light);
            border-color: rgba(79, 53, 232, 0.22);
            color: var(--ink);
            transform: translateX(2px);
        }

        .option-btn:active { transform: scale(0.99); }

        .option-btn.selected {
            background: var(--accent-light);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 500;
        }

        .option-indicator {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid currentColor;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.35;
            transition: all 0.14s ease;
        }

        .option-btn.selected .option-indicator {
            background: var(--accent);
            border-color: var(--accent);
            opacity: 1;
        }

        .option-check {
            display: none;
            font-size: 8px;
            color: white;
        }

        .option-btn.selected .option-check {
            display: block;
            animation: checkPop 0.22s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .option-btn.selected .option-dot { display: none; }
        .option-text { flex: 1; }

        /* ── QUIZ HEADER BAR ── */
        .quiz-header-bar {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: var(--space-4);
            margin-bottom: var(--space-6);
            padding-bottom: var(--space-5);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .candidate-chip {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            background: var(--surface-subtle);
            border: 1px solid var(--border);
            padding: 4px 10px 4px 5px;
            border-radius: var(--r-pill);
            font-size: 12px;
            color: var(--ink-secondary);
            font-weight: 500;
            margin-top: var(--space-2);
        }

        .candidate-avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            font-size: 8px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── PROGRESS TRACKER ── */
        .quiz-progress-tracker {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            margin-bottom: var(--space-6);
            padding: 12px var(--space-4);
            background: var(--surface-subtle);
            border-radius: var(--r-md);
            border: 1px solid var(--border);
        }

        .progress-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--ink-tertiary);
            white-space: nowrap;
        }

        .progress-track {
            flex: 1;
            height: 4px;
            background: var(--surface-muted);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #8470ff);
            border-radius: 2px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-count {
            font-size: 12px;
            font-weight: 700;
            color: var(--accent);
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }

        /* ── SUBMIT FOOTER ── */
        .submit-footer {
            position: sticky;
            bottom: 0;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid var(--border);
            padding: var(--space-4) var(--space-6);
            padding-bottom: max(var(--space-4), env(safe-area-inset-bottom));
        }

        .submit-inner {
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }

        .submit-hint {
            flex: 1;
            font-size: 12.5px;
            color: var(--ink-tertiary);
            line-height: 1.4;
            font-weight: 400;
        }

        .submit-hint strong {
            color: var(--ink-secondary);
            font-weight: 600;
        }

        /* ── INCOMPLETE MODAL ── */
        #incomplete-modal {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: var(--space-4);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        @media (min-width: 680px) {
            #incomplete-modal { align-items: center; }
        }

        #incomplete-modal.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.38);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        .modal-sheet {
            background: var(--surface);
            border-radius: var(--r-xl);
            padding: var(--space-8) var(--space-6);
            max-width: 400px;
            width: 100%;
            position: relative;
            z-index: 1;
            box-shadow: 0 24px 60px rgba(0,0,0,0.18);
            transform: translateY(18px);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #incomplete-modal.active .modal-sheet {
            transform: translateY(0);
        }

        .modal-icon {
            width: 48px;
            height: 48px;
            background: var(--warning-light);
            border-radius: var(--r-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: var(--space-4);
        }

        .modal-title {
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 17px;
            color: var(--ink);
            margin-bottom: var(--space-2);
            letter-spacing: -0.2px;
        }

        .modal-body {
            font-size: 14px;
            color: var(--ink-secondary);
            line-height: 1.6;
            margin-bottom: var(--space-5);
        }

        .modal-actions {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
        }

        /* ── RESULTS ── */
        .result-hero {
            text-align: center;
            padding: var(--space-8) var(--space-4) var(--space-6);
            position: relative;
        }

        .score-ring-wrap {
            position: relative;
            width: 128px;
            height: 128px;
            margin: 0 auto var(--space-5);
        }

        .score-ring-svg {
            width: 128px;
            height: 128px;
            transform: rotate(-90deg);
        }

        .score-ring-bg {
            fill: none;
            stroke: var(--surface-muted);
            stroke-width: 7;
        }

        .score-ring-fill {
            fill: none;
            stroke-width: 7;
            stroke-linecap: round;
            stroke-dasharray: 330;
            stroke-dashoffset: 330;
            transition: stroke-dashoffset 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .score-ring-fill.pass { stroke: var(--success); }
        .score-ring-fill.fail { stroke: var(--danger); }

        .score-center {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .score-number {
            font-family: var(--font-body);
            font-weight: 800;
            font-size: 32px;
            line-height: 1;
            letter-spacing: -1.5px;
        }

        .score-number.pass { color: var(--success); }
        .score-number.fail { color: var(--danger); }

        .score-denom {
            font-size: 11px;
            color: var(--ink-tertiary);
            font-weight: 500;
            margin-top: 2px;
        }

        .result-label {
            font-family: var(--font-serif);
            font-style: italic;
            font-size: 26px;
            color: var(--ink);
            margin-bottom: var(--space-1);
            letter-spacing: -0.2px;
        }

        .result-subtitle {
            font-size: 13.5px;
            color: var(--ink-tertiary);
            font-weight: 400;
        }

        .result-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: var(--space-3);
            margin-top: var(--space-5);
        }

        .stat-chip {
            background: var(--surface-subtle);
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            padding: 13px var(--space-2);
            text-align: center;
        }

        .stat-chip-value {
            font-family: var(--font-body);
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -0.5px;
            color: var(--ink);
            display: block;
            line-height: 1;
        }

        .stat-chip-label {
            font-size: 11px;
            color: var(--ink-tertiary);
            font-weight: 500;
            margin-top: var(--space-1);
        }

        /* ── REVIEW ── */
        .review-section { margin-top: var(--space-2); }

        .review-header {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.7px;
            text-transform: uppercase;
            color: var(--ink-tertiary);
            margin-bottom: var(--space-4);
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }

        .review-header::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .review-item {
            border: 1.5px solid var(--border);
            border-radius: var(--r-lg);
            padding: var(--space-4);
            margin-bottom: var(--space-3);
            animation: slideUp 0.28s both;
        }

        .review-item.correct {
            border-color: rgba(14, 168, 113, 0.22);
            background: rgba(14, 168, 113, 0.025);
        }

        .review-item.incorrect {
            border-color: rgba(232, 68, 68, 0.18);
            background: rgba(232, 68, 68, 0.025);
        }

        .review-item-header {
            display: flex;
            align-items: flex-start;
            gap: var(--space-3);
            margin-bottom: var(--space-3);
        }

        .review-status-icon {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .review-status-icon.correct { background: var(--success-light); color: var(--success); }
        .review-status-icon.incorrect { background: var(--danger-light); color: var(--danger); }

        .review-question-text {
            font-size: 13.5px;
            line-height: 1.5;
            color: var(--ink);
            font-weight: 400;
        }

        .review-answers {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            padding-left: 34px;
        }

        .review-answer-chip {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            padding: 6px var(--space-3);
            border-radius: var(--r-sm);
            font-size: 12.5px;
            font-weight: 400;
        }

        .review-answer-chip.user-correct { background: var(--success-light); color: #065f46; }
        .review-answer-chip.user-wrong { background: var(--danger-light); color: #991b1b; text-decoration: line-through; }
        .review-answer-chip.correct-answer {
            background: rgba(14,168,113,0.07);
            color: #065f46;
            border: 1px solid rgba(14,168,113,0.22);
        }

        .review-answer-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            opacity: 0.65;
            white-space: nowrap;
        }

        /* ── TOPIC CARDS ── */
        .topic-suggestions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-2);
            margin-top: var(--space-4);
        }

        @media (min-width: 500px) {
            .topic-suggestions { grid-template-columns: repeat(3, 1fr); }
        }

        .topic-chip {
            background: var(--surface-subtle);
            border: 1.5px solid var(--border);
            border-radius: var(--r-md);
            padding: 10px var(--space-3);
            font-size: 13px;
            font-weight: 500;
            color: var(--ink-secondary);
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: left;
            font-family: var(--font-body);
            line-height: 1.3;
        }

        .topic-chip:hover {
            border-color: var(--accent);
            background: var(--accent-light);
            color: var(--accent);
            transform: translateY(-1px);
        }

        .topic-chip-icon {
            display: block;
            font-size: 17px;
            margin-bottom: var(--space-1);
        }

        /* ── ERROR STATE ── */
        .error-state {
            text-align: center;
            padding: var(--space-12) var(--space-4);
            animation: slideUp 0.3s both;
        }

        .error-icon-wrap {
            width: 60px;
            height: 60px;
            background: var(--danger-light);
            border-radius: var(--r-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--space-5);
            font-size: 24px;
        }

        /* ── COUNT SELECTOR ── */
        .count-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-2);
        }

        .count-opt {
            padding: 11px var(--space-2);
            border: 1.5px solid var(--surface-muted);
            border-radius: var(--r-md);
            background: var(--surface-subtle);
            font-family: var(--font-body);
            font-size: 15px;
            font-weight: 700;
            color: var(--ink-tertiary);
            cursor: pointer;
            transition: all 0.14s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            letter-spacing: -0.3px;
        }

        .count-opt:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-light);
        }

        .count-opt.selected {
            border-color: var(--accent);
            background: var(--accent);
            color: white;
            box-shadow: var(--shadow-accent);
        }

        .count-opt:active { transform: scale(0.95); }

        /* ── TOPIC INPUT WRAP ── */
        .topic-input-wrap {
            position: relative;
        }

        .topic-input-icon {
            position: absolute;
            left: var(--space-4);
            top: 50%;
            transform: translateY(-50%);
            color: var(--ink-disabled);
            font-size: 14px;
            pointer-events: none;
        }

        .topic-input-wrap .field-input {
            padding-left: 40px;
        }

        /* ── PATTERN BG ── */
        .pattern-bg {
            position: absolute;
            top: 0;
            right: 0;
            width: 180px;
            height: 180px;
            opacity: 0.03;
            background-image: radial-gradient(circle, #4f35e8 1.5px, transparent 1.5px);
            background-size: 16px 16px;
            pointer-events: none;
        }

        /* ── INFO ROW ── */
        .info-row {
            display: flex;
            align-items: flex-start;
            gap: var(--space-3);
            padding: var(--space-4);
            background: var(--surface-subtle);
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            font-size: 13px;
            color: var(--ink-secondary);
            line-height: 1.5;
        }

        .info-row-icon {
            color: var(--accent);
            font-size: 14px;
            margin-top: 1px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<div id="app-shell">

    <!-- Header -->
    <header class="app-header">
        <div class="logo">
            <div class="logo-mark">
                <i class="fa-solid fa-brain"></i>
            </div>
            <div class="logo-name">Pro<em>Quiz</em></div>
        </div>
        <div class="header-tag" id="header-status">Assessment Platform</div>
    </header>

    <!-- Progress bar -->
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>

    <!-- Loader overlay -->
    <div id="loader-overlay">
        <div class="loader-ring"></div>
        <p id="loader-text">Connecting…</p>
    </div>

    <!-- Main content -->
    <div id="view-content"></div>

    <!-- Submit footer (quiz only) -->
    <div id="submit-footer" class="submit-footer" style="display:none">
        <div class="submit-inner">
            <div class="submit-hint" id="submit-hint-text">
                Answer all questions to submit
            </div>
            <button class="btn btn-accent" id="submit-btn" onclick="handleSubmitAttempt()">
                Submit &nbsp;<i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

</div>

<!-- Incomplete modal -->
<div id="incomplete-modal">
    <div class="modal-backdrop" onclick="closeModal()"></div>
    <div class="modal-sheet">
        <div class="modal-icon">⚠️</div>
        <div class="modal-title">Some questions unanswered</div>
        <div class="modal-body" id="modal-body-text">
            You've left <strong id="modal-unanswered-count">N</strong> question(s) unanswered. Would you like to review them or submit anyway?
        </div>
        <div class="modal-actions">
            <button class="btn btn-accent btn-full btn-lg" onclick="scrollToUnanswered()">
                <i class="fa-solid fa-arrow-down"></i>&nbsp; Show unanswered questions
            </button>
            <button class="btn btn-ghost btn-full btn-lg" onclick="forceSubmit()">
                Submit anyway
            </button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDADoTzuz0ZzP1m7OxQ_3uZgD00NHu2bV8",
        authDomain: "rapidval-web.firebaseapp.com",
        projectId: "rapidval-web",
        storageBucket: "rapidval-web.firebasestorage.app",
        messagingSenderId: "993303053268",
        appId: "1:993303053268:web:d43a7b8217200cd46a4c41",
    };
    const appId = 'rapidval-web';

    let app, auth, db;
    let currentUser = null;
    let userData = { name: '', email: '', phone: '' };
    let selectedCount = 30;
    let currentQuiz = null;
    let userAnswers = {};

    const $content    = document.getElementById('view-content');
    const $loader     = document.getElementById('loader-overlay');
    const $loaderText = document.getElementById('loader-text');
    const $progressBar = document.getElementById('progress-bar');
    const $submitFooter = document.getElementById('submit-footer');
    const $submitHint  = document.getElementById('submit-hint-text');
    const $headerStatus = document.getElementById('header-status');
    const $modal       = document.getElementById('incomplete-modal');

    function setProgress(pct) { $progressBar.style.width = pct + '%'; }
    function showLoader(text = 'Loading…') { $loaderText.textContent = text; $loader.classList.add('active'); }
    function hideLoader() { $loader.classList.remove('active'); }
    function setHeader(text) { $headerStatus.textContent = text; }

    // ── FIREBASE ──
    async function initFirebase() {
        showLoader('Securing connection…');
        try {
            app  = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db   = getFirestore(app);
            await signInAnonymously(auth);
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    hideLoader();
                    setProgress(10);
                    renderRegistration();
                }
            });
        } catch (err) {
            hideLoader();
            renderError("Failed to connect to secure services. Please check your connection.");
            console.error(err);
        }
    }

    // ── ERROR ──
    function renderError(msg) {
        $submitFooter.style.display = 'none';
        $content.innerHTML = `
            <div class="error-state">
                <div class="error-icon-wrap"><i class="fa-solid fa-triangle-exclamation" style="color:var(--danger)"></i></div>
                <div class="section-title" style="margin-bottom:8px">Something went wrong</div>
                <p class="body-text" style="margin-bottom:24px">${msg}</p>
                <button onclick="window.location.reload()" class="btn btn-primary btn-lg">
                    <i class="fa-solid fa-rotate-right"></i>&nbsp; Reload
                </button>
            </div>`;
    }

    // ── REGISTRATION ──
    function renderRegistration() {
        $submitFooter.style.display = 'none';
        setHeader('Step 1 of 3');
        $content.innerHTML = `
            <div class="slide-up" style="position:relative;overflow:hidden">
                <div class="pattern-bg"></div>
                <div class="step-indicator">
                    <div class="step-dot active"></div>
                    <div class="step-dot"></div>
                    <div class="step-dot"></div>
                </div>
                <div class="form-header">
                    <div class="eyebrow" style="margin-bottom:10px">Candidate Registration</div>
                    <div class="display-title" style="margin-bottom:10px">Let's get you set up</div>
                    <p class="body-text">Enter your details to begin the AI-powered assessment.</p>
                </div>
                <div class="divider"></div>
                <div class="form-stack" id="reg-form">
                    <div class="field-group slide-up stagger-1">
                        <label class="field-label">Full Name</label>
                        <input type="text" id="name" class="field-input" placeholder="Jane Smith" autocomplete="name" required>
                    </div>
                    <div class="field-group slide-up stagger-2">
                        <label class="field-label">Email Address</label>
                        <input type="email" id="email" class="field-input" placeholder="jane@company.com" autocomplete="email" required>
                    </div>
                    <div class="field-group slide-up stagger-3">
                        <label class="field-label">Phone Number</label>
                        <input type="tel" id="phone" class="field-input" placeholder="+1 (555) 000-0000" autocomplete="tel" required>
                    </div>
                    <div class="form-actions slide-up stagger-4">
                        <button onclick="submitRegistration()" class="btn btn-primary btn-lg btn-full">
                            Continue &nbsp;<i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>
                </div>
            </div>`;

        $content.querySelectorAll('.field-input').forEach((input, i, arr) => {
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (i < arr.length - 1) arr[i + 1].focus();
                    else submitRegistration();
                }
            });
        });
    }

    window.submitRegistration = function() {
        const name  = document.getElementById('name')?.value.trim();
        const email = document.getElementById('email')?.value.trim();
        const phone = document.getElementById('phone')?.value.trim();
        if (!name || !email || !phone) {
            ['name','email','phone'].forEach(id => {
                const el = document.getElementById(id);
                if (!el.value.trim()) el.classList.add('error');
            });
            const first = ['name','email','phone'].find(id => !document.getElementById(id).value.trim());
            if (first) {
                document.getElementById(first).style.animation = 'shake 0.4s ease';
                setTimeout(() => document.getElementById(first).style.animation = '', 500);
                document.getElementById(first).focus();
            }
            return;
        }
        userData = { name, email, phone };
        setProgress(33);
        renderTopicSelection();
    };

    // ── TOPIC SELECTION ──
    function renderTopicSelection() {
        $submitFooter.style.display = 'none';
        setHeader('Step 2 of 3');
        const suggestions = [
            { icon: '⚛️', label: 'React & Next.js' },
            { icon: '🐍', label: 'Python Basics' },
            { icon: '📊', label: 'Data Structures' },
            { icon: '☁️', label: 'Cloud Architecture' },
            { icon: '🔐', label: 'Cybersecurity' },
            { icon: '🧠', label: 'Machine Learning' },
        ];
        $content.innerHTML = `
            <div class="slide-up" style="position:relative;overflow:hidden">
                <div class="pattern-bg"></div>
                <div class="step-indicator">
                    <div class="step-dot done"></div>
                    <div class="step-dot active"></div>
                    <div class="step-dot"></div>
                </div>
                <div class="form-header">
                    <div class="eyebrow" style="margin-bottom:10px">Assessment Subject</div>
                    <div class="display-title" style="margin-bottom:10px">What's your topic?</div>
                    <p class="body-text">Enter any subject — from niche to broad. Our AI will craft a tailored quiz.</p>
                </div>
                <div class="divider"></div>
                <div class="form-stack">
                    <div class="field-group slide-up stagger-1">
                        <label class="field-label">Topic</label>
                        <div class="topic-input-wrap">
                            <i class="fa-solid fa-magnifying-glass topic-input-icon"></i>
                            <input type="text" id="topic" class="field-input" placeholder="e.g. Advanced JavaScript Patterns" required>
                        </div>
                    </div>
                    <div class="field-group slide-up stagger-2">
                        <label class="field-label">Number of Questions</label>
                        <div class="count-grid" id="count-selector">
                            <button type="button" class="count-opt" data-count="5" onclick="selectCount(5)">5</button>
                            <button type="button" class="count-opt" data-count="15" onclick="selectCount(15)">15</button>
                            <button type="button" class="count-opt selected" data-count="30" onclick="selectCount(30)">30</button>
                            <button type="button" class="count-opt" data-count="50" onclick="selectCount(50)">50</button>
                        </div>
                    </div>
                    <div class="slide-up stagger-3">
                        <div class="eyebrow" style="margin-bottom:10px;color:var(--ink-tertiary)">Quick picks</div>
                        <div class="topic-suggestions">
                            ${suggestions.map(s => `
                                <button class="topic-chip" onclick="document.getElementById('topic').value='${s.label}'; document.getElementById('topic').focus();">
                                    <span class="topic-chip-icon">${s.icon}</span>${s.label}
                                </button>`).join('')}
                        </div>
                    </div>
                    <div class="form-actions slide-up stagger-4">
                        <button onclick="submitTopic()" class="btn btn-accent btn-lg" style="flex:1">
                            <i class="fa-solid fa-wand-magic-sparkles"></i>&nbsp; Generate Quiz
                        </button>
                        <button onclick="renderRegistration()" class="btn btn-ghost btn-lg">
                            <i class="fa-solid fa-arrow-left"></i>&nbsp; Back
                        </button>
                    </div>
                </div>
            </div>`;

        document.getElementById('topic').addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); submitTopic(); }
        });
    }

    window.selectCount = function(n) {
        selectedCount = n;
        document.querySelectorAll('.count-opt').forEach(btn => {
            btn.classList.toggle('selected', parseInt(btn.dataset.count) === n);
        });
    };

    window.submitTopic = async function() {
        const topic = document.getElementById('topic')?.value.trim();
        if (!topic) {
            const t = document.getElementById('topic');
            t.classList.add('error');
            t.style.animation = 'shake 0.4s ease';
            setTimeout(() => t.style.animation = '', 500);
            t.focus();
            return;
        }
        showLoader(`Generating ${selectedCount} questions… This may take a moment.`);
        try {
            const quizData = await generateQuiz(topic);
            currentQuiz = quizData.questions;
            userAnswers = {};
            hideLoader();
            setProgress(66);
            renderQuiz();
        } catch (err) {
            hideLoader();
            renderError(`Generation failed: ${err.message}`);
        }
    };

    // ── QUIZ GENERATION ──
    async function generateQuiz(topic) {
        let retries = 0;
        const maxRetries = 3;
        const delays = [1000, 2000, 4000];
        while (retries <= maxRetries) {
            try {
                const resp = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic, count: selectedCount })
                });
                if (resp.status === 429) throw new Error('QUOTA_EXCEEDED');
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();
                if (!data.questions) throw new Error("Invalid response structure.");
                return data;
            } catch (err) {
                if (retries < maxRetries) {
                    await new Promise(r => setTimeout(r, delays[retries]));
                    retries++;
                    continue;
                }
                throw new Error("Unable to generate assessment. Please try again.");
            }
        }
    }

    // ── QUIZ RENDER ──
    function renderQuiz() {
        setHeader('Assessment');
        const total    = currentQuiz.length;
        const answered = Object.keys(userAnswers).length;
        const initials = userData.name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();

        let html = `
            <div id="quiz-container">
                <div class="quiz-header-bar slide-up">
                    <div>
                        <div class="section-title" style="margin-bottom:6px">Assessment</div>
                        <div class="candidate-chip">
                            <div class="candidate-avatar">${initials}</div>
                            ${userData.name}
                        </div>
                    </div>
                </div>
                <div class="quiz-progress-tracker slide-up stagger-1">
                    <span class="progress-label">Progress</span>
                    <div class="progress-track">
                        <div class="progress-fill" id="quiz-fill" style="width:${(answered/total)*100}%"></div>
                    </div>
                    <span class="progress-count" id="quiz-count">${answered}/${total}</span>
                </div>
                <div class="form-stack" id="questions-list">`;

        currentQuiz.forEach((q, index) => {
            const isAnswered = userAnswers[index] !== undefined;
            html += `
                <div class="quiz-card ${isAnswered ? 'answered' : ''} slide-up"
                     id="question-${index}"
                     style="animation-delay: ${Math.min(index * 0.04, 0.4)}s">
                    <div class="quiz-number-row">
                        <div class="quiz-number-badge">${index + 1}</div>
                        <span class="quiz-number-label">Question ${index + 1}</span>
                        <span class="answer-unanswered-label">Unanswered</span>
                    </div>
                    <div class="quiz-question">${q.question}</div>
                    <div class="options-list">`;
            q.options.forEach((opt, optIdx) => {
                const sel = userAnswers[index] === opt;
                html += `
                    <button class="option-btn ${sel ? 'selected' : ''}"
                            data-qindex="${index}" data-oindex="${optIdx}">
                        <div class="option-indicator">
                            <span class="option-dot"></span>
                            <i class="fa-solid fa-check option-check"></i>
                        </div>
                        <span class="option-text">${opt}</span>
                    </button>`;
            });
            html += `</div></div>`;
        });

        html += `</div></div>`;
        $content.innerHTML = html;

        document.getElementById('questions-list').addEventListener('click', function(e) {
            const btn = e.target.closest('.option-btn');
            if (!btn) return;
            const qIndex = parseInt(btn.dataset.qindex, 10);
            const oIndex = parseInt(btn.dataset.oindex, 10);
            if (isNaN(qIndex) || isNaN(oIndex)) return;
            selectOption(qIndex, currentQuiz[qIndex].options[oIndex]);
        });

        $submitFooter.style.display = 'flex';
        updateSubmitHint();
    }

    function updateSubmitHint() {
        const total     = currentQuiz ? currentQuiz.length : 0;
        const answered  = Object.keys(userAnswers).length;
        const remaining = total - answered;
        if (remaining === 0) {
            $submitHint.innerHTML = `<strong>All ${total} answered</strong> — ready to submit!`;
        } else {
            $submitHint.innerHTML = `<strong>${answered}/${total}</strong> answered &nbsp;·&nbsp; ${remaining} remaining`;
        }
    }

    window.selectOption = function(qIndex, optionText) {
        userAnswers[qIndex] = optionText;
        const card = document.getElementById(`question-${qIndex}`);
        if (card) {
            card.classList.add('answered');
            card.classList.remove('unanswered-highlight');
            card.querySelectorAll('.option-btn').forEach(btn => {
                const isSelected = btn.querySelector('.option-text').textContent === optionText;
                btn.classList.toggle('selected', isSelected);
            });
        }
        const total    = currentQuiz.length;
        const answered = Object.keys(userAnswers).length;
        const pct      = (answered / total) * 100;
        const fill     = document.getElementById('quiz-fill');
        const count    = document.getElementById('quiz-count');
        if (fill) fill.style.width = pct + '%';
        if (count) count.textContent = `${answered}/${total}`;
        updateSubmitHint();
    };

    // ── SUBMIT FLOW ──
    window.handleSubmitAttempt = function() {
        const total    = currentQuiz.length;
        const answered = Object.keys(userAnswers).length;
        if (answered < total) {
            const left = total - answered;
            document.getElementById('modal-unanswered-count').textContent = left;
            document.getElementById('modal-body-text').innerHTML =
                `You've left <strong>${left} question${left > 1 ? 's' : ''}</strong> unanswered. Would you like to review them, or submit with partial answers?`;
            $modal.classList.add('active');
        } else {
            doSubmit();
        }
    };

    window.closeModal = function() { $modal.classList.remove('active'); };

    window.scrollToUnanswered = function() {
        closeModal();
        setTimeout(() => {
            const total = currentQuiz.length;
            let firstEl = null;
            for (let i = 0; i < total; i++) {
                if (userAnswers[i] === undefined) {
                    const card = document.getElementById(`question-${i}`);
                    if (card) {
                        card.classList.add('unanswered-highlight');
                        if (!firstEl) firstEl = card;
                        setTimeout(() => card.classList.remove('unanswered-highlight'), 3000);
                    }
                }
            }
            if (firstEl) firstEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 250);
    };

    window.forceSubmit = function() { closeModal(); setTimeout(() => doSubmit(), 200); };

    async function doSubmit() {
        let score = 0;
        const details = currentQuiz.map((q, i) => {
            const isCorrect = userAnswers[i] === q.correctAnswer;
            if (isCorrect) score++;
            return {
                question: q.question,
                selectedAnswer: userAnswers[i] ?? null,
                correctAnswer: q.correctAnswer,
                isCorrect,
                skipped: userAnswers[i] === undefined
            };
        });

        const total    = currentQuiz.length;
        const answered = Object.keys(userAnswers).length;
        const resultData = {
            candidateInfo: userData,
            score,
            totalQuestions: total,
            answeredQuestions: answered,
            percentage: Math.round((score / total) * 100),
            details,
            timestamp: serverTimestamp(),
            userId: currentUser ? currentUser.uid : 'anonymous'
        };

        $submitFooter.style.display = 'none';
        showLoader('Saving your results…');

        try {
            if (!currentUser) throw new Error("Auth lost");
            const ref = collection(db, 'artifacts', appId, 'public', 'data', 'global_quiz_results');
            await addDoc(ref, resultData);
            hideLoader();
            setProgress(100);
            renderResults(resultData);
        } catch (err) {
            hideLoader();
            console.error(err);
            renderResults(resultData);
        }
    }

    // ── RESULTS ──
    function renderResults(data) {
        setHeader('Results');
        const isPass      = data.percentage >= 60;
        const colorClass  = isPass ? 'pass' : 'fail';
        const circumference = 330;
        const offset      = circumference - (data.percentage / 100) * circumference;
        const skipped     = data.details.filter(d => d.skipped).length;

        let html = `
            <div class="slide-up">
                <div class="result-hero">
                    <div class="score-ring-wrap">
                        <svg class="score-ring-svg" viewBox="0 0 128 128">
                            <circle class="score-ring-bg" cx="64" cy="64" r="52.5"></circle>
                            <circle class="score-ring-fill ${colorClass}" cx="64" cy="64" r="52.5" id="ring-fill"
                                style="stroke-dashoffset:${circumference}"></circle>
                        </svg>
                        <div class="score-center">
                            <span class="score-number ${colorClass}" id="animated-score">0</span>
                            <span class="score-denom">/ ${data.totalQuestions}</span>
                        </div>
                    </div>
                    <div class="result-label">${isPass ? '🎉 Well Done!' : '📝 Keep Practicing'}</div>
                    <div class="result-subtitle">${data.percentage.toFixed(2)}% score &nbsp;·&nbsp; ${isPass ? 'Passed' : 'Below passing threshold'}</div>
                    <div class="result-stats">
                        <div class="stat-chip">
                            <span class="stat-chip-value" style="color:var(--success)">${data.score}</span>
                            <div class="stat-chip-label">Correct</div>
                        </div>
                        <div class="stat-chip">
                            <span class="stat-chip-value" style="color:var(--danger)">${data.answeredQuestions - data.score}</span>
                            <div class="stat-chip-label">Incorrect</div>
                        </div>
                        <div class="stat-chip">
                            <span class="stat-chip-value" style="color:var(--ink-tertiary)">${skipped}</span>
                            <div class="stat-chip-label">Skipped</div>
                        </div>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="review-section">
                    <div class="review-header">Detailed Review</div>`;

        data.details.forEach((item, i) => {
            const statusCls = item.isCorrect ? 'correct' : 'incorrect';
            const icon      = item.isCorrect ? 'fa-check' : (item.skipped ? 'fa-minus' : 'fa-xmark');
            html += `
                <div class="review-item ${statusCls}" style="animation-delay:${i * 0.04}s">
                    <div class="review-item-header">
                        <div class="review-status-icon ${statusCls}">
                            <i class="fa-solid ${icon}"></i>
                        </div>
                        <div class="review-question-text"><strong>${i + 1}.</strong> ${item.question}</div>
                    </div>
                    <div class="review-answers">
                        ${item.skipped ? `
                            <div class="review-answer-chip" style="background:var(--surface-subtle);color:var(--ink-tertiary)">
                                <span class="review-answer-label">Skipped</span> — No answer selected
                            </div>
                            <div class="review-answer-chip correct-answer">
                                <span class="review-answer-label">Answer:</span> ${item.correctAnswer}
                            </div>`
                        : item.isCorrect ? `
                            <div class="review-answer-chip user-correct">
                                <i class="fa-solid fa-check" style="font-size:9px"></i>
                                <span class="review-answer-label">Your answer:</span> ${item.selectedAnswer}
                            </div>`
                        : `
                            <div class="review-answer-chip user-wrong">
                                <i class="fa-solid fa-xmark" style="font-size:9px"></i>
                                <span class="review-answer-label">Your answer:</span> ${item.selectedAnswer}
                            </div>
                            <div class="review-answer-chip correct-answer">
                                <i class="fa-solid fa-check" style="font-size:9px;opacity:0.6"></i>
                                <span class="review-answer-label">Correct:</span> ${item.correctAnswer}
                            </div>`}
                    </div>
                </div>`;
        });

        html += `</div>
                <div style="margin-top:24px">
                    <button onclick="resetApp()" class="btn btn-primary btn-lg btn-full">
                        <i class="fa-solid fa-rotate-right"></i>&nbsp; New Assessment
                    </button>
                </div>
            </div>`;

        $content.innerHTML = html;

        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                const ring = document.getElementById('ring-fill');
                if (ring) ring.style.strokeDashoffset = offset;

                const scoreEl = document.getElementById('animated-score');
                if (scoreEl) {
                    let current = 0;
                    const target   = data.score;
                    const duration = 1100;
                    const steps    = 60;
                    const interval = duration / steps;
                    const inc      = target / steps;
                    const timer    = setInterval(() => {
                        current = Math.min(current + inc, target);
                        scoreEl.textContent = Math.round(current);
                        if (current >= target) clearInterval(timer);
                    }, interval);
                }
            });
        });
    }

    window.resetApp = function() {
        currentQuiz  = null;
        userAnswers  = {};
        selectedCount = 30;
        setProgress(33);
        renderTopicSelection();
    };

    window.onload = initFirebase;
</script>
</body>
</html>
