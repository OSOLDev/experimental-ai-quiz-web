                }
                currentTopic = topic;
                setBadge("Generating…");
                renderQuizShimmer(topic);
                try {
                    const data = await generateQuiz(topic);
                    currentQuiz = data.questions;
                    userAnswers = {};
                    setProgress(66);
                    setBadge("In progress");
                    renderQuiz();
                } catch (err) {
                    renderError(
                        "Quiz generation failed. Please try again.",
                        err.message,
                    );
                }
            };

            /* ── SHIMMER LOADING ── */
            function renderQuizShimmer(topic) {
                hideSubmitBar();
                const cards = Array.from(
                    { length: 4 },
                    (_, i) => `
    <div class="quiz-shimmer-card" style="animation:fadeUp .25s ${i * 0.06}s ease both">
      <div class="shimmer shimmer-line w-1-3" style="height:10px;margin-bottom:var(--s3)"></div>
      <div class="shimmer shimmer-line" style="height:16px;margin-bottom:var(--s2)"></div>
      <div class="shimmer shimmer-line w-3-4" style="height:16px;margin-bottom:var(--s5)"></div>
      <div class="shimmer shimmer-option"></div>
      <div class="shimmer shimmer-option"></div>
      <div class="shimmer shimmer-option"></div>
      <div class="shimmer shimmer-option"></div>
    </div>`,
                ).join("");

                setView(`
    <div class="page-layout">
      <div class="content-area">
        <div class="page-header">
          <div class="page-header-meta">
            <div class="breadcrumb">
              <span>Assessment</span>
              <span class="sep">/</span>
              <span style="color:var(--fg)">${topic}</span>
            </div>
          </div>
          <div class="loader-inline">
            <div class="spinner"></div>
            <span>Generating ${selectedCount} questions on <strong>${topic}</strong>…</span>
          </div>
        </div>
        <div class="quiz-shimmer">${cards}</div>
      </div>
    </div>`);
            }

            /* ── QUIZ GENERATION ── */
            async function generateQuiz(topic) {
                let retries = 0;
                while (retries <= 3) {
                    try {
                        const r = await fetch("/api/generate", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                topic,
                                count: selectedCount,
                            }),
                        });
                        if (r.status === 429) throw new Error("QUOTA_EXCEEDED");
                        if (!r.ok) throw new Error(`HTTP ${r.status}`);
                        const data = await r.json();
                        if (!data.questions)
                            throw new Error("Invalid response");
                        return data;
                    } catch (err) {
                        if (retries < 3) {
                            await sleep([1000, 2000, 4000][retries]);
                            retries++;
                            continue;
                        }
                        throw new Error(
                            "Unable to generate assessment after multiple attempts.",
                        );
                    }
                }
            }

            const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

            /* ── QUIZ RENDER ── */
            function renderQuiz() {
                const total = currentQuiz.length;
                const answered = Object.keys(userAnswers).length;
                const initials = userData.name
                    .split(" ")
                    .map((n) => n[0])
                    .join("")
                    .slice(0, 2)
                    .toUpperCase();
                const pct = (answered / total) * 100;

                let qs = currentQuiz
                    .map((q, i) => {
                        const sel = userAnswers[i] !== undefined;
                        const opts = q.options
                            .map(
                                (opt, j) => `
      <button class="opt-row ${userAnswers[i] === opt ? "selected" : ""}"
              data-qindex="${i}" data-oindex="${j}">
        <div class="opt-radio">
          <div class="opt-radio-inner"></div>
        </div>
        <span class="opt-text">${opt}</span>
      </button>`,
                            )
                            .join("");

                        return `
      <div class="q-card ${sel ? "answered" : ""}" id="q-${i}"
           style="animation-delay:${Math.min(i * 0.03, 0.35)}s">
        <div class="q-card-head">
          <div class="q-number-row">
            <div class="q-num">${i + 1}</div>
            <span class="q-label">Q&nbsp;${i + 1}</span>
          </div>
          <div style="display:flex;gap:var(--s2);align-items:center">
            ${sel ? `<span class="q-status-badge answered-badge"><i class="fa-solid fa-check" style="font-size:8px"></i> Answered</span>` : ""}
            <span class="q-status-badge unanswered-badge"><i class="fa-solid fa-clock" style="font-size:8px"></i> Unanswered</span>
          </div>
        </div>
        <div class="q-text">${q.question}</div>
        <div class="q-options">${opts}</div>
      </div>`;
                    })
                    .join("");

                setView(`
    <div class="page-layout">
      <div class="content-area">
        <div class="quiz-topbar" style="animation:fadeUp .25s ease both">
          <div>
            <div style="display:flex;align-items:center;gap:var(--s3);margin-bottom:var(--s2)">
              <span class="page-title" style="font-size:18px;margin:0">Assessment</span>
              <span class="badge badge-default">${currentTopic}</span>
            </div>
            <div class="candidate-pill">
              <div class="candidate-avatar">${initials}</div>
              ${userData.name}
            </div>
          </div>
          <div class="quiz-progress-inline">
            <div class="progress-bar-wrap">
              <div class="progress-bar-track">
                <div class="progress-bar-fill" id="q-progress-bar" style="width:${pct}%"></div>
              </div>
              <span class="progress-text" id="q-progress-text">${answered}/${total}</span>
            </div>
          </div>
        </div>
        <div class="questions-list" id="questions-list">${qs}</div>
        <div style="height:120px"></div>
      </div>
    </div>`);

                document
                    .getElementById("questions-list")
                    .addEventListener("click", (e) => {
                        const btn = e.target.closest(".opt-row");
                        if (!btn) return;
                        const qi = parseInt(btn.dataset.qindex, 10);
                        const oi = parseInt(btn.dataset.oindex, 10);
                        if (!isNaN(qi) && !isNaN(oi))
                            selectOption(qi, currentQuiz[qi].options[oi]);
                    });

                showSubmitBar();
                updateSubmitBar();
            }

            window.selectOption = function (qi, opt) {
                userAnswers[qi] = opt;
                const card = document.getElementById(`q-${qi}`);
                if (card) {
                    card.classList.add("answered");
                    card.classList.remove("highlight-unanswered");
                    card.querySelectorAll(".opt-row").forEach((b) => {
                        const isSelected =
                            b.querySelector(".opt-text").textContent === opt;
                        b.classList.toggle("selected", isSelected);
                    });
                    // Update answered badge
                    const existing = card.querySelector(".answered-badge");
                    if (!existing) {
                        const wrap = card.querySelector(
                            ".q-card-head > div:last-child",
                        );
                        if (wrap) {
                            const badge = document.createElement("span");
                            badge.className = "q-status-badge answered-badge";
                            badge.innerHTML =
                                '<i class="fa-solid fa-check" style="font-size:8px"></i> Answered';
                            badge.style.animation = "fadeIn .2s ease both";
                            wrap.prepend(badge);
                        }
                    }
                    // Update q-num
                    card.querySelector(".q-num")?.classList.add("answered");
                }
                updateSubmitBar();
                updateProgressBar();
            };

            function updateSubmitBar() {
                const total = currentQuiz.length;
                const answered = Object.keys(userAnswers).length;
                const remaining = total - answered;
                document.getElementById("stat-answered").textContent = answered;
                document.getElementById("stat-remaining").textContent =
                    remaining;
                document.getElementById("stat-total").textContent = total;
                document.getElementById("btn-review-unanswered").style.display =
                    remaining > 0 ? "inline-flex" : "none";
            }

            function updateProgressBar() {
                const total = currentQuiz.length;
                const answered = Object.keys(userAnswers).length;
                const pct = (answered / total) * 100;
                const bar = document.getElementById("q-progress-bar");
                const text = document.getElementById("q-progress-text");
                if (bar) bar.style.width = pct + "%";
                if (text) text.textContent = `${answered}/${total}`;
                setProgress(66 + pct * 0.28);
            }

            /* ── SUBMIT FLOW ── */
            window.handleSubmitAttempt = function () {
                const total = currentQuiz.length;
                const answered = Object.keys(userAnswers).length;
                if (answered < total) {
                    const left = total - answered;
                    document.getElementById("modal-desc").innerHTML =
                        `<strong>${left} question${left > 1 ? "s" : ""}</strong> ${left > 1 ? "are" : "is"} unanswered. You can review them or submit with the answers you've provided.`;
                    openModal();
                } else {
                    doSubmit();
                }
            };

            window.handleModalBackdrop = function (e) {
                if (e.target === document.getElementById("modal-overlay"))
                    closeModal_();
            };

            window.closeModal = closeModal_;

            window.scrollToUnanswered = function () {
                closeModal_();
                window.handleScrollUnanswered();
            };

            window.handleScrollUnanswered = function () {
                const total = currentQuiz.length;
                let first = null;
                for (let i = 0; i < total; i++) {
                    if (userAnswers[i] === undefined) {
                        const c = document.getElementById(`q-${i}`);
                        if (c) {
                            c.classList.add("highlight-unanswered");
                            setTimeout(
                                () =>
                                    c.classList.remove("highlight-unanswered"),
                                2800,
                            );
                            if (!first) first = c;
                        }
                    }
                }
                if (first)
                    first.scrollIntoView({
                        behavior: "smooth",
                        block: "center",
                    });
            };

            window.forceSubmit = function () {
                closeModal_();
                setTimeout(doSubmit, 180);
            };

            async function doSubmit() {
                let score = 0;
                const details = currentQuiz.map((q, i) => {
                    const correct = userAnswers[i] === q.correctAnswer;
                    if (correct) score++;
                    return {
                        question: q.question,
                        selectedAnswer: userAnswers[i] ?? null,
                        correctAnswer: q.correctAnswer,
                        isCorrect: correct,
                        skipped: userAnswers[i] === undefined,
                    };
                });

                const total = currentQuiz.length;
                const answered = Object.keys(userAnswers).length;
                const pct = Math.round((score / total) * 100);
                const result = {
                    candidateInfo: userData,
                    score,
                    totalQuestions: total,
                    answeredQuestions: answered,
                    percentage: pct,
                    details,
                    timestamp: serverTimestamp(),
                    userId: currentUser?.uid ?? "anon",
                    topic: currentTopic,
                };

                hideSubmitBar();
                setBadge("Saving results…");
                setView(`
    <div class="page-layout">
      <div class="state-container">
        <div class="loader-inline">
          <div class="spinner"></div>
          <span>Saving your results…</span>
        </div>
      </div>
    </div>`);
                setProgress(95);

                try {
                    const ref = collection(
                        db,
                        "artifacts",
                        APP_ID,
                        "public",
                        "data",
                        "global_quiz_results",
                    );
                    await addDoc(ref, result);
                } catch (err) {
                    console.warn("Firestore save failed:", err);
                }

                setProgress(100);
                setBadge("Complete");
                renderResults(result);
            }

            /* ── RESULTS ── */
            function renderResults(data) {
                const pass = data.percentage >= 60;
                const circ = 339.29;
                const offset = circ - (data.percentage / 100) * circ;
                const skipped = data.details.filter((d) => d.skipped).length;
                const wrong = data.answeredQuestions - data.score;

                const reviewItems = data.details
                    .map((item, i) => {
                        const cls = item.isCorrect ? "correct" : "incorrect";
                        const iconCls = item.isCorrect
                            ? "correct"
                            : item.skipped
                              ? "skipped"
                              : "incorrect";
                        const icon = item.isCorrect
                            ? "fa-check"
                            : item.skipped
                              ? "fa-minus"
                              : "fa-xmark";
                        let answerHtml = "";
                        if (item.skipped) {
                            answerHtml = `
        <div class="review-answer-row skipped-row"><span class="review-answer-tag">Skipped</span></div>
        <div class="review-answer-row correct-ans">
          <span class="review-answer-tag">Correct</span>
          <span>${item.correctAnswer}</span>
        </div>`;
                        } else if (item.isCorrect) {
                            answerHtml = `
        <div class="review-answer-row user-correct">
          <i class="fa-solid fa-check" style="font-size:9px"></i>
          <span class="review-answer-tag">Your answer</span>
          <span>${item.selectedAnswer}</span>
        </div>`;
                        } else {
                            answerHtml = `
        <div class="review-answer-row user-wrong">
          <i class="fa-solid fa-xmark" style="font-size:9px"></i>
          <span class="review-answer-tag">Your answer</span>
          <span>${item.selectedAnswer}</span>
        </div>
        <div class="review-answer-row correct-ans">
          <i class="fa-solid fa-check" style="font-size:9px;opacity:.7"></i>
          <span class="review-answer-tag">Correct</span>
          <span>${item.correctAnswer}</span>
        </div>`;
                        }
                        return `
      <div class="review-card ${cls}" style="animation-delay:${i * 0.025}s">
        <div class="review-card-head">
          <div class="review-icon ${iconCls}"><i class="fa-solid ${icon}"></i></div>
          <div class="review-q-text"><strong style="font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle)">${i + 1}.</strong> ${item.question}</div>
        </div>
        <div class="review-answers">${answerHtml}</div>
      </div>`;
                    })
                    .join("");

                setView(`
    <div class="page-layout">
      <div class="content-area">
        <div class="page-header" style="animation:fadeUp .25s ease both">
          <div class="page-header-meta">
            <div class="breadcrumb">
              <span>Results</span>
              <span class="sep">/</span>
              <span style="color:var(--fg)">${currentTopic}</span>
            </div>
            <div style="margin-left:auto;display:flex;gap:var(--s2)">
              <button class="btn btn-default btn-sm" onclick="resetApp()">
                <i class="fa-solid fa-rotate-right"></i> New assessment
              </button>
            </div>
          </div>
          <div class="page-title">${pass ? "Assessment passed" : "Assessment complete"}</div>
          <div class="page-desc">${userData.name} · ${currentTopic}</div>
        </div>

        <div class="results-layout">
          <!-- Score column -->
          <div style="display:grid;gap:var(--s4)">
            <div class="score-display" style="animation:fadeUp .3s .05s ease both">
              <div class="score-ring-container">
                <svg class="score-ring-svg" viewBox="0 0 120 120">
                  <circle class="score-ring-bg" cx="60" cy="60" r="54"/>
                  <circle class="score-ring-arc ${pass ? "pass" : "fail"}" cx="60" cy="60" r="54"
                          id="ring-arc" style="stroke-dashoffset:${circ}"/>
                </svg>
                <div class="score-ring-center">
                  <span class="score-pct ${pass ? "pass" : "fail"}" id="score-pct-el">0%</span>
                  <span class="score-pct-label">score</span>
                </div>
              </div>
              <div class="score-verdict">${pass ? "✓ Passed" : "✗ Did not pass"}</div>
              <div class="score-detail">${data.percentage.toFixed(1)}% · Passing threshold 60%</div>
              <div class="score-stats">
                <div class="stat-box">
                  <span class="stat-box-num" style="color:var(--success)">${data.score}</span>
                  <div class="stat-box-label">Correct</div>
                </div>
                <div class="stat-box">
                  <span class="stat-box-num" style="color:var(--error)">${wrong}</span>
                  <div class="stat-box-label">Incorrect</div>
                </div>
                <div class="stat-box">
                  <span class="stat-box-num" style="color:var(--fg-subtle)">${skipped}</span>
                  <div class="stat-box-label">Skipped</div>
                </div>
              </div>
            </div>

            <!-- Candidate info -->
            <div class="panel-card" style="animation:fadeUp .3s .1s ease both">
              <div class="panel-card-head">
                Candidate details
              </div>
              <div class="panel-list">
                <div class="panel-list-item">
                  <span class="panel-list-label">Name</span>
                  <span class="panel-list-value" style="font-family:var(--font-sans)">${data.candidateInfo.name}</span>
                </div>
                <div class="panel-list-item">
                  <span class="panel-list-label">Email</span>
                  <span class="panel-list-value" style="font-family:var(--font-sans);font-size:12px">${data.candidateInfo.email}</span>
                </div>
                <div class="panel-list-item">
                  <span class="panel-list-label">Questions</span>
                  <span class="panel-list-value">${data.totalQuestions}</span>
                </div>
                <div class="panel-list-item">
                  <span class="panel-list-label">Answered</span>
                  <span class="panel-list-value">${data.answeredQuestions}</span>
                </div>
                <div class="panel-list-item">
                  <span class="panel-list-label">Score</span>
                  <span class="panel-list-value">${data.score} / ${data.totalQuestions}</span>
                </div>
                <div class="panel-list-item">
                  <span class="panel-list-label">Result</span>
                  <span class="badge ${pass ? "badge-success" : "badge-error"}">${pass ? "Pass" : "Fail"}</span>
                </div>
              </div>
            </div>

            <button class="btn btn-primary btn-lg btn-full" onclick="resetApp()" style="animation:fadeUp .3s .15s ease both">
              <i class="fa-solid fa-rotate-right"></i> Start new assessment
            </button>
          </div>

          <!-- Review column -->
          <div style="animation:fadeUp .3s .1s ease both">
            <div class="section-head">
              <span class="section-head-title">Detailed review</span>
              <div class="section-head-line"></div>
              <span class="badge badge-default">${data.totalQuestions} questions</span>
            </div>
            <div class="review-list">${reviewItems}</div>
          </div>
        </div>
      </div>
    </div>`);

                // Animate ring
                requestAnimationFrame(() =>
                    requestAnimationFrame(() => {
                        const arc = document.getElementById("ring-arc");
                        if (arc) arc.style.strokeDashoffset = offset;

                        const pctEl = document.getElementById("score-pct-el");
                        if (pctEl) {
                            let current = 0;
                            const target = data.percentage;
                            const timer = setInterval(() => {
                                current = Math.min(
                                    current + target / 60,
                                    target,
                                );
                                pctEl.textContent = Math.round(current) + "%";
                                if (current >= target) clearInterval(timer);
                            }, 1200 / 60);
                        }
                    }),
                );
            }

            window.resetApp = function () {
                currentQuiz = null;
                userAnswers = {};
                selectedCount = 30;
                setProgress(33);
                setBadge("Step 2 / 3");
                renderTopicSelection();
            };

            /* ── BOOT ── */
            window.addEventListener("load", boot);
        </script>
    </body>
</html>
