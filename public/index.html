<!doctype html>
<html lang="en" dir="ltr" data-theme="light" data-lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AJK PSC Exam Prep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@700;800&display=swap"
    rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" rel="stylesheet" />
  <style>
    /*
   * AJK PSC EXAM PREP — Design System v3
   * Built on shadcn/ui foundations: HSL tokens, Geist Sans, mobile-first
   * Mobile-first: base styles target phones; desktops opt in via min-width queries
   */

    /* ═══ shadcn/ui HSL TOKEN FOUNDATION ═══ */
    :root {
      --background: 0 0% 100%;
      --foreground: 240 10% 3.9%;
      --card: 0 0% 100%;
      --card-foreground: 240 10% 3.9%;
      --popover: 0 0% 100%;
      --popover-foreground: 240 10% 3.9%;
      --primary: 142.1 76.2% 36.3%;
      --primary-foreground: 355.7 100% 97.3%;
      --secondary: 240 4.8% 95.9%;
      --secondary-foreground: 240 5.9% 10%;
      --muted: 240 4.8% 95.9%;
      --muted-foreground: 240 3.8% 46.1%;
      --accent: 240 4.8% 95.9%;
      --accent-foreground: 240 5.9% 10%;
      --destructive: 0 84.2% 60.2%;
      --destructive-foreground: 0 0% 98%;
      --border: 240 5.9% 90%;
      --input: 240 5.9% 90%;
      --ring: 142.1 76.2% 36.3%;
      --radius: 0.5rem;

      /* Brand green (primary) explicit references */
      --brand: hsl(142.1 76.2% 36.3%);
      --brand-fg: hsl(355.7 100% 97.3%);
      --brand-light: hsl(142.1 70% 45%);
      --brand-subtle: hsl(142.1 76.2% 96%);
      --brand-border: hsl(142.1 60% 80%);

      /* Semantic shorthand (maps to shadcn tokens) */
      --bg: hsl(var(--background));
      --bg-subtle: hsl(240 4.8% 97%);
      --bg-muted: hsl(var(--muted));
      --bg-elevated: hsl(var(--card));
      --fg: hsl(var(--foreground));
      --fg-muted: hsl(var(--muted-foreground));
      --fg-subtle: hsl(240 3.8% 64%);
      --border-color: hsl(var(--border));
      --border-strong: hsl(240 5.9% 82%);

      --success: hsl(142.1 76.2% 36.3%);
      --success-subtle: hsl(142.1 76.2% 96%);
      --success-border: hsl(142.1 60% 80%);
      --error: hsl(var(--destructive));
      --error-subtle: hsl(0 84.2% 97%);
      --error-border: hsl(0 84.2% 88%);
      --warning: hsl(38 92% 50%);
      --warning-subtle: hsl(38 92% 97%);
      --warning-border: hsl(38 92% 82%);

      /* Shadows — shadcn uses very subtle shadows */
      --shadow-xs: 0 1px 2px 0 hsl(0 0% 0% / 0.04);
      --shadow-sm: 0 1px 3px 0 hsl(0 0% 0% / 0.07), 0 1px 2px -1px hsl(0 0% 0% / 0.05);
      --shadow-md: 0 4px 6px -1px hsl(0 0% 0% / 0.08), 0 2px 4px -2px hsl(0 0% 0% / 0.05);
      --shadow-lg: 0 10px 15px -3px hsl(0 0% 0% / 0.08), 0 4px 6px -4px hsl(0 0% 0% / 0.05);
      --shadow-xl: 0 20px 25px -5px hsl(0 0% 0% / 0.08), 0 8px 10px -6px hsl(0 0% 0% / 0.04);

      /* Radii (shadcn default = 0.5rem) */
      --radius-sm: calc(var(--radius) - 4px);
      --radius: 0.5rem;
      --radius-md: calc(var(--radius) + 2px);
      --radius-lg: calc(var(--radius) + 4px);
      --radius-xl: calc(var(--radius) + 8px);
      --radius-2xl: calc(var(--radius) + 16px);

      /* Typography — Geist is shadcn's default face */
      --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
      --font-mono: "JetBrains Mono", "Fira Code", ui-monospace, monospace;
      --font-serif: "Instrument Serif", Georgia, serif;

      /* Layout */
      --topbar-h: 56px;
      --sidebar-w: 240px;
      --mob-nav-h: 60px;
      --page-max: 1280px;
      --p-x: 16px;
      /* mobile horizontal page padding */

      /* Easing */
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --ease-out: cubic-bezier(0, 0, 0.2, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);

      /* ── Compatibility aliases for JS inline styles ──
       All old var() names used in existing JS resolve here unchanged. */
      --bg: hsl(var(--background));
      --fg: hsl(var(--foreground));
      --fg-muted: hsl(var(--muted-foreground));
      --fg-subtle: hsl(240 3.8% 60%);
      --bg-elevated: hsl(var(--card));
      --bg-muted: hsl(var(--muted));
      --bg-subtle: hsl(240 4.8% 97%);
      --accent-subtle: var(--brand-subtle);
      --accent-border: var(--brand-border);
      --accent: var(--brand);
      --accent-hover: hsl(142.1 76.2% 30%);
      --font-serif: "Instrument Serif", Georgia, serif;
      --font-body: "Inter", ui-sans-serif, system-ui, sans-serif;
      --font-mono: "JetBrains Mono", "Fira Code", ui-monospace, monospace;
    }

    /* ═══ DARK MODE ═══ */
    [data-theme="dark"] {
      --background: 240 10% 3.9%;
      --foreground: 0 0% 98%;
      --card: 240 10% 3.9%;
      --card-foreground: 0 0% 98%;
      --popover: 240 10% 3.9%;
      --popover-foreground: 0 0% 98%;
      --primary: 142.1 70.6% 45.3%;
      --primary-foreground: 144.9 80.4% 10%;
      --secondary: 240 3.7% 15.9%;
      --secondary-foreground: 0 0% 98%;
      --muted: 240 3.7% 15.9%;
      --muted-foreground: 240 5% 64.9%;
      --accent: 240 3.7% 15.9%;
      --accent-foreground: 0 0% 98%;
      --destructive: 0 72.2% 50.6%;
      --destructive-foreground: 0 0% 98%;
      --border: 240 3.7% 15.9%;
      --input: 240 3.7% 15.9%;
      --ring: 142.4 71.8% 29.2%;

      /* dark mode compatibility aliases */
      --bg: hsl(var(--background));
      --fg: hsl(var(--foreground));
      --fg-muted: hsl(var(--muted-foreground));
      --fg-subtle: hsl(240 5% 50%);
      --bg-elevated: hsl(var(--card));
      --bg-muted: hsl(var(--muted));
      --bg-subtle: hsl(240 10% 5%);
      --accent-subtle: var(--brand-subtle);
      --accent-border: var(--brand-border);
      --accent: var(--brand);
      --accent-hover: hsl(142.1 70.6% 38%);

      --bg-subtle: hsl(240 10% 5%);
      --fg-subtle: hsl(240 5% 50%);
      --border-strong: hsl(240 3.7% 22%);

      --brand: hsl(142.1 70.6% 45.3%);
      --brand-fg: hsl(144.9 80.4% 10%);
      --brand-subtle: hsl(142.1 70% 10%);
      --brand-border: hsl(142.1 50% 20%);

      --success: hsl(142.1 70.6% 45.3%);
      --success-subtle: hsl(142 70% 8%);
      --success-border: hsl(142 50% 18%);
      --error: hsl(0 72.2% 50.6%);
      --error-subtle: hsl(0 72% 8%);
      --error-border: hsl(0 50% 18%);
      --warning: hsl(38 92% 50%);
      --warning-subtle: hsl(38 80% 8%);
      --warning-border: hsl(38 60% 18%);
    }

    /* ═══ RTL / URDU ═══ */
    [data-lang="ur"] {
      direction: rtl;
      font-family: "Noto Nastaliq Urdu", "Jameel Noori Nastaleeq", var(--font-sans);
    }

    [data-lang="ur"] .font-mono {
      font-family: var(--font-mono);
    }

    /* ═══ RESET ═══ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      /* Prevent horizontal scroll on mobile */
      overflow-x: hidden;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-subtle);
      color: var(--fg);
      min-height: 100dvh;
      line-height: 1.5;
      font-size: 14px;
      /* Reserve bottom space for mobile nav */
      padding-bottom: env(safe-area-inset-bottom);
      overflow-x: hidden;
    }

    /* ═══ KEYFRAMES ═══ */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -600px 0;
      }

      100% {
        background-position: 600px 0;
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .5;
      }
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(.97) translateY(6px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes slideInRight {
      from {
        transform: translateX(110%);
      }

      to {
        transform: translateX(0);
      }
    }

    @keyframes slideInUp {
      from {
        transform: translateY(100%);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes mobNavSlideUp {
      from {
        transform: translateY(100%);
      }

      to {
        transform: translateY(0);
      }
    }

    /* ═══════════════════════════════════════════════════════════════════
     TOPBAR — mobile-first
  ═══════════════════════════════════════════════════════════════════ */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: hsl(var(--background) / 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid hsl(var(--border));
      height: var(--topbar-h);
      display: flex;
      align-items: center;
    }

    .topbar-inner {
      width: 100%;
      max-width: var(--page-max);
      margin: 0 auto;
      padding: 0 var(--p-x);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    @media (min-width: 768px) {
      .topbar-inner {
        padding: 0 24px;
        gap: 12px;
      }
    }

    /* Brand */
    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      background: var(--brand);
      border-radius: var(--radius-md);
      display: grid;
      place-items: center;
      color: var(--brand-fg);
      font-size: 15px;
      flex-shrink: 0;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
    }

    .brand-name {
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 600;
      color: var(--fg);
      line-height: 1.2;
      letter-spacing: -0.01em;
    }

    .brand-sub {
      font-size: 10px;
      color: var(--fg-subtle);
      letter-spacing: .05em;
      font-family: var(--font-mono);
      text-transform: uppercase;
      /* Hide sub on very small screens */
      display: none;
    }

    @media (min-width: 360px) {
      .brand-sub {
        display: block;
      }
    }

    .topbar-center {
      flex: 1;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    @media (min-width: 768px) {
      .topbar-right {
        gap: 6px;
      }
    }

    .progress-rail {
      height: 2px;
      background: hsl(var(--border));
    }

    .progress-fill {
      height: 100%;
      background: var(--brand);
      transition: width .5s var(--ease-out);
      width: 0%;
    }

    /* Icon & lang buttons */
    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: var(--radius-md);
      background: transparent;
      border: 1px solid hsl(var(--border));
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 13px;
      color: var(--fg-muted);
      transition: background 120ms, color 120ms;
      flex-shrink: 0;
      touch-action: manipulation;
    }

    .icon-btn:hover,
    .icon-btn:active {
      background: hsl(var(--muted));
      color: var(--fg);
    }

    .lang-btn {
      height: 34px;
      padding: 0 10px;
      border-radius: var(--radius-md);
      background: transparent;
      border: 1px solid hsl(var(--border));
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 500;
      color: var(--fg-muted);
      font-family: var(--font-mono);
      transition: all 120ms;
      white-space: nowrap;
      touch-action: manipulation;
    }

    .lang-btn:hover {
      background: hsl(var(--muted));
      color: var(--fg);
    }

    .lang-btn.active {
      background: var(--brand-subtle);
      color: var(--brand);
      border-color: var(--brand-border);
    }

    /* User chip */
    .user-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 8px 3px 3px;
      background: hsl(var(--muted));
      border: 1px solid hsl(var(--border));
      border-radius: 100px;
      font-size: 12px;
      cursor: pointer;
      transition: all 120ms;
      white-space: nowrap;
      touch-action: manipulation;
    }

    .user-chip:hover {
      border-color: var(--brand-border);
    }

    .user-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--brand);
      color: var(--brand-fg);
      display: grid;
      place-items: center;
      font-size: 10px;
      font-weight: 700;
      font-family: var(--font-mono);
      flex-shrink: 0;
    }

    .user-chip-name {
      color: var(--fg);
      font-weight: 500;
      max-width: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
    }

    @media (min-width: 480px) {
      .user-chip-name {
        max-width: 120px;
      }
    }

    /* ═══════════════════════════════════════════════════════════════════
     ROOT LAYOUT
  ═══════════════════════════════════════════════════════════════════ */
    #root {
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 2px 1fr;
    }

    /* Page container — mobile-first */
    .page {
      width: 100%;
      max-width: var(--page-max);
      margin: 0 auto;
      padding: 20px var(--p-x) 80px;
      /* 80px bottom for mobile nav */
    }

    @media (min-width: 768px) {
      .page {
        padding: 28px 24px 64px;
      }
    }

    @media (min-width: 1024px) {
      .page {
        padding: 32px 32px 64px;
      }
    }

    .page-sm {
      max-width: 520px;
    }

    .page-md {
      max-width: 768px;
    }

    /* ═══════════════════════════════════════════════════════════════════
     SHADCN/UI CARDS
  ═══════════════════════════════════════════════════════════════════ */
    .card {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xs);
      overflow: hidden;
    }

    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid hsl(var(--border));
      display: flex;
      align-items: center;
      gap: 10px;
    }

    @media (min-width: 768px) {
      .card-header {
        padding: 18px 24px;
      }
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--fg);
      line-height: 1.3;
    }

    .card-body {
      padding: 16px 20px;
    }

    @media (min-width: 768px) {
      .card-body {
        padding: 20px 24px;
      }
    }

    .card-footer {
      padding: 12px 20px;
      border-top: 1px solid hsl(var(--border));
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    /* Panel card */
    .panel-card {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .panel-head {
      padding: 10px 16px;
      border-bottom: 1px solid hsl(var(--border));
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--fg-subtle);
      font-family: var(--font-mono);
      background: hsl(var(--muted));
    }

    .panel-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid hsl(var(--border));
      font-size: 13px;
      gap: 12px;
    }

    .panel-list-item:last-child {
      border-bottom: none;
    }

    .panel-list-label {
      color: var(--fg-muted);
      flex-shrink: 0;
      font-size: 13px;
    }

    .panel-list-value {
      font-weight: 500;
      color: var(--fg);
      font-family: var(--font-mono);
      font-size: 12px;
      text-align: end;
      word-break: break-all;
    }

    /* ═══════════════════════════════════════════════════════════════════
     FORMS — shadcn/ui style
  ═══════════════════════════════════════════════════════════════════ */
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--fg);
      line-height: 1;
    }

    .required {
      color: var(--error);
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      inset-inline-start: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--fg-subtle);
      font-size: 13px;
      pointer-events: none;
    }

    /* shadcn input: h-10 = 40px, rounded-md, border border-input */
    .field-input {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      background: hsl(var(--background));
      border: 1px solid hsl(var(--input));
      border-radius: var(--radius-md);
      font-size: 14px;
      color: var(--fg);
      font-family: var(--font-sans);
      outline: none;
      transition: border-color 150ms, box-shadow 150ms;
      /* Prevent iOS zoom on focus (font-size must be ≥ 16px effective, or use touch-action) */
      touch-action: manipulation;
      -webkit-appearance: none;
      appearance: none;
    }

    /* Prevent iOS auto-zoom: bump to 16px on mobile */
    @media (max-width: 767px) {
      .field-input {
        font-size: 16px;
      }
    }

    .field-input.has-icon {
      padding-inline-start: 38px;
    }

    .field-input:focus {
      outline: none;
      border-color: hsl(var(--ring));
      box-shadow: 0 0 0 2px hsl(var(--ring) / 0.2);
    }

    .field-input.invalid {
      border-color: var(--error);
    }

    .field-error {
      font-size: 12px;
      color: var(--error);
      display: none;
    }

    .field-error.visible {
      display: block;
    }

    .field-hint {
      font-size: 12px;
      color: var(--fg-muted);
    }

    select.field-input {
      cursor: pointer;
    }

    /* ═══════════════════════════════════════════════════════════════════
     BUTTONS — shadcn/ui variants
  ═══════════════════════════════════════════════════════════════════ */
    /* Base: inline-flex, items-center, rounded-md, h-10, px-4 py-2 */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 16px;
      height: 40px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 500;
      font-family: var(--font-sans);
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 140ms var(--ease);
      white-space: nowrap;
      text-decoration: none;
      line-height: 1;
      touch-action: manipulation;
      /* Ensure tap targets are at least 44px on mobile */
      min-height: 40px;
    }

    .btn-sm {
      height: 36px;
      padding: 0 12px;
      font-size: 13px;
      border-radius: var(--radius);
      min-height: 36px;
    }

    .btn-lg {
      height: 48px;
      padding: 0 24px;
      font-size: 15px;
      border-radius: var(--radius-lg);
      min-height: 48px;
    }

    .btn-full {
      width: 100%;
      justify-content: center;
    }

    /* shadcn default variant */
    .btn-primary {
      background: hsl(var(--primary));
      color: hsl(var(--primary-foreground));
      border-color: hsl(var(--primary));
    }

    .btn-primary:hover {
      background: hsl(var(--primary) / 0.88);
    }

    /* shadcn "default" but we call it accent (green) */
    .btn-accent {
      background: var(--brand);
      color: var(--brand-fg);
      border-color: var(--brand);
    }

    .btn-accent:hover {
      background: hsl(142.1 76.2% 30%);
    }

    /* shadcn outline */
    .btn-ghost {
      background: transparent;
      color: var(--fg);
      border: 1px solid hsl(var(--border));
    }

    .btn-ghost:hover {
      background: hsl(var(--accent));
      color: hsl(var(--accent-foreground));
    }

    /* shadcn destructive */
    .btn-error {
      background: hsl(var(--destructive));
      color: hsl(var(--destructive-foreground));
      border-color: hsl(var(--destructive));
    }

    .btn-error:hover {
      opacity: .9;
    }

    .btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* ═══════════════════════════════════════════════════════════════════
     BADGES — shadcn badge
  ═══════════════════════════════════════════════════════════════════ */
    /* shadcn badge: inline-flex, rounded-full, border, px-2.5, py-0.5, text-xs, font-semibold */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 600;
      font-family: var(--font-mono);
      border: 1px solid transparent;
      line-height: 1.4;
      white-space: nowrap;
    }

    .badge-default {
      background: hsl(var(--secondary));
      color: hsl(var(--secondary-foreground));
      border-color: hsl(var(--border));
    }

    .badge-accent {
      background: var(--brand-subtle);
      color: var(--brand);
      border-color: var(--brand-border);
    }

    .badge-success {
      background: var(--success-subtle);
      color: var(--success);
      border-color: var(--success-border);
    }

    .badge-error {
      background: var(--error-subtle);
      color: var(--error);
      border-color: var(--error-border);
    }

    .badge-warn {
      background: var(--warning-subtle);
      color: var(--warning);
      border-color: var(--warning-border);
    }

    /* ═══════════════════════════════════════════════════════════════════
     CALLOUT
  ═══════════════════════════════════════════════════════════════════ */
    .callout {
      display: flex;
      gap: 10px;
      padding: 12px 14px;
      border-radius: var(--radius-md);
      font-size: 13px;
      line-height: 1.6;
      border: 1px solid transparent;
      align-items: flex-start;
    }

    .callout.info {
      background: var(--brand-subtle);
      color: var(--brand);
      border-color: var(--brand-border);
    }

    .callout.warn {
      background: var(--warning-subtle);
      color: var(--warning);
      border-color: var(--warning-border);
    }

    .callout.success {
      background: var(--success-subtle);
      color: var(--success);
      border-color: var(--success-border);
    }

    .callout.error {
      background: var(--error-subtle);
      color: var(--error);
      border-color: var(--error-border);
    }

    /* ═══════════════════════════════════════════════════════════════════
     LOGIN PAGE — mobile-first
  ═══════════════════════════════════════════════════════════════════ */
    .login-wrap {
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px var(--p-x) 24px;
      background: var(--bg-subtle);
    }

    @media (min-width: 1024px) {
      .login-wrap {
        display: grid;
        grid-template-columns: 1fr 1fr;
        align-items: stretch;
        padding: 0;
      }
    }

    .login-hero {
      display: none;
    }

    @media (min-width: 1024px) {
      .login-hero {
        display: flex;
        height: 100dvh;
        position: sticky;
        top: 0;
        background: linear-gradient(155deg, hsl(142.1 76.2% 15%) 0%, hsl(142.1 76.2% 22%) 50%, hsl(142.1 70% 30%) 100%);
        align-items: center;
        justify-content: center;
        padding: 56px;
        overflow: hidden;
      }
    }

    .hero-pattern {
      position: absolute;
      inset: 0;
      opacity: .05;
      background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='1' fill-rule='evenodd'%3E%3Cpath d='M0 40L40 0H20L0 20M40 40V20L20 40'/%3E%3C/g%3E%3C/svg%3E");
    }

    .hero-content {
      position: relative;
      color: white;
      max-width: 420px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 4px 12px;
      background: rgba(255, 255, 255, .12);
      border: 1px solid rgba(255, 255, 255, .2);
      border-radius: 9999px;
      font-size: 10px;
      letter-spacing: .07em;
      font-family: var(--font-mono);
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .hero-title {
      font-size: clamp(26px, 3vw, 40px);
      font-weight: 600;
      line-height: 1.2;
      margin-bottom: 16px;
      letter-spacing: -0.01em;
    }

    .hero-desc {
      font-size: 15px;
      opacity: .8;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    .hero-features {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .hero-feature {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      opacity: .9;
    }

    .hero-feature-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(255, 255, 255, .18);
      display: grid;
      place-items: center;
      flex-shrink: 0;
      font-size: 13px;
    }

    /* Login box */
    .login-box {
      width: 100%;
      max-width: 400px;
    }

    @media (min-width: 1024px) {
      .login-box-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 24px;
        min-height: 100dvh;
      }
    }

    .login-header {
      margin-bottom: 28px;
      text-align: center;
    }

    .login-logo {
      width: 52px;
      height: 52px;
      background: var(--brand);
      border-radius: var(--radius-xl);
      display: grid;
      place-items: center;
      color: var(--brand-fg);
      font-size: 22px;
      margin: 0 auto 16px;
    }

    .login-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--fg);
      letter-spacing: -0.01em;
    }

    .login-sub {
      font-size: 14px;
      color: var(--fg-muted);
    }

    /* ═══════════════════════════════════════════════════════════════════
     PAGE HEADER
  ═══════════════════════════════════════════════════════════════════ */
    .page-header {
      margin-bottom: 24px;
    }

    .page-title {
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 700;
      color: var(--fg);
      margin-bottom: 4px;
      line-height: 1.25;
      letter-spacing: -0.01em;
    }

    .page-desc {
      font-size: 14px;
      color: var(--fg-muted);
      max-width: 560px;
      line-height: 1.65;
    }

    /* ═══════════════════════════════════════════════════════════════════
     TOPIC GRID — mobile-first, 1 col → 2 → 3
  ═══════════════════════════════════════════════════════════════════ */
    .topic-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
    }

    @media (min-width: 480px) {
      .topic-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }
    }

    @media (min-width: 860px) {
      .topic-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 1200px) {
      .topic-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .topic-card {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius-lg);
      padding: 16px;
      cursor: pointer;
      transition: all 160ms var(--ease);
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      touch-action: manipulation;
    }

    @media (min-width: 768px) {
      .topic-card {
        flex-direction: column;
        align-items: flex-start;
        padding: 18px;
        gap: 10px;
      }
    }

    .topic-card:hover {
      border-color: var(--brand);
      box-shadow: var(--shadow-md);
    }

    .topic-card:active {
      transform: scale(.98);
    }

    .topic-card.locked {
      opacity: .4;
      cursor: not-allowed;
    }

    .topic-card.locked:hover {
      border-color: hsl(var(--border));
      box-shadow: none;
    }

    .topic-card-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-md);
      background: var(--brand-subtle);
      color: var(--brand);
      display: grid;
      place-items: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .topic-card.locked .topic-card-icon {
      background: hsl(var(--muted));
      color: var(--fg-subtle);
    }

    .topic-card-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--fg);
      line-height: 1.4;
      flex: 1;
    }

    .topic-card-id {
      font-size: 10px;
      color: var(--fg-subtle);
      font-family: var(--font-mono);
      letter-spacing: .04em;
      display: none;
    }

    @media (min-width: 768px) {
      .topic-card-id {
        display: block;
      }
    }

    .topic-card-arrow {
      margin-inline-start: auto;
      color: var(--fg-subtle);
      font-size: 12px;
      flex-shrink: 0;
    }

    @media (min-width: 768px) {
      .topic-card-arrow {
        display: none;
      }
    }

    /* ═══════════════════════════════════════════════════════════════════
     QUIZ LAYOUT — mobile-first (no sidebar on mobile)
  ═══════════════════════════════════════════════════════════════════ */
    .quiz-layout {
      display: block;
    }

    @media (min-width: 1024px) {
      .quiz-layout {
        display: grid;
        grid-template-columns: 256px 1fr;
        gap: 24px;
        align-items: start;
      }
    }

    .quiz-sidebar {
      display: none;
    }

    @media (min-width: 1024px) {
      .quiz-sidebar {
        display: block;
        position: sticky;
        top: calc(var(--topbar-h) + 16px);
        height: fit-content;
      }
    }

    /* ═══════════════════════════════════════════════════════════════════
     QUESTION CARD — mobile-first
  ═══════════════════════════════════════════════════════════════════ */
    .question-card {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius-xl);
      overflow: hidden;
      animation: fadeUp .2s var(--ease) both;
      box-shadow: var(--shadow-sm);
    }

    .question-head {
      padding: 12px 16px;
      border-bottom: 1px solid hsl(var(--border));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      background: hsl(var(--muted));
    }

    @media (min-width: 768px) {
      .question-head {
        padding: 14px 20px;
      }
    }

    .question-num {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--fg-subtle);
      letter-spacing: .04em;
    }

    .question-body {
      padding: 16px;
    }

    @media (min-width: 768px) {
      .question-body {
        padding: 24px;
      }
    }

    .question-text {
      font-size: 16px;
      line-height: 1.7;
      font-weight: 500;
      color: var(--fg);
      margin-bottom: 18px;
    }

    @media (min-width: 768px) {
      .question-text {
        font-size: 17px;
        margin-bottom: 22px;
      }
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .option-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: var(--radius-md);
      border: 1px solid hsl(var(--border));
      background: hsl(var(--background));
      cursor: pointer;
      text-align: start;
      font-size: 14px;
      color: var(--fg);
      font-family: var(--font-sans);
      line-height: 1.5;
      transition: all 130ms;
      width: 100%;
      touch-action: manipulation;
      /* Big tap targets on mobile */
      min-height: 48px;
    }

    .option-btn:hover {
      border-color: var(--brand);
      background: var(--brand-subtle);
    }

    .option-btn:active {
      transform: scale(.99);
    }

    .option-btn.selected {
      border-color: var(--brand);
      background: var(--brand-subtle);
      box-shadow: 0 0 0 2px hsl(var(--ring) / 0.15);
    }

    .option-btn.correct {
      border-color: var(--success);
      background: var(--success-subtle);
      color: var(--success);
    }

    .option-btn.wrong {
      border-color: var(--error);
      background: var(--error-subtle);
      color: var(--error);
    }

    .option-letter {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 700;
      font-family: var(--font-mono);
      flex-shrink: 0;
      opacity: .6;
    }
    .md p { margin: 0; }
    .md ul, .md ol { margin: 6px 0 0 18px; }
    .md code { font-family: var(--font-mono); background: var(--bg-muted); padding: 0 4px; border-radius: 4px; }
    .md pre { background: var(--bg-muted); padding: 8px; border-radius: 6px; overflow-x: auto; }
    .option-text { display: inline-block; }

    .question-nav {
      padding: 12px 16px;
      border-top: 1px solid hsl(var(--border));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    @media (min-width: 768px) {
      .question-nav {
        padding: 14px 20px;
      }
    }

    /* ─── MOBILE QUESTION NAVIGATOR (replaces sidebar) ─── */
    .mob-q-nav {
      margin-top: 12px;
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    @media (min-width: 1024px) {
      .mob-q-nav {
        display: none;
      }
    }

    .mob-q-nav-head {
      padding: 10px 14px;
      background: hsl(var(--muted));
      border-bottom: 1px solid hsl(var(--border));
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      font-weight: 600;
      color: var(--fg-muted);
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
    }

    .mob-q-nav-body {
      padding: 12px;
      display: none;
    }

    .mob-q-nav-body.open {
      display: block;
    }

    /* ─── SUBMIT BAR ─── */
    .submit-bar {
      position: fixed;
      bottom: 0;
      inset-inline: 0;
      z-index: 40;
      background: hsl(var(--background) / 0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid hsl(var(--border));
      padding: 10px var(--p-x);
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      transform: translateY(100%);
      transition: transform 280ms var(--ease-out);
    }

    .submit-bar.visible {
      transform: translateY(0);
    }

    /* ─── PROGRESS DOTS ─── */
    .q-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .q-dot {
      width: 28px;
      height: 28px;
      border-radius: var(--radius);
      background: hsl(var(--muted));
      border: 1px solid hsl(var(--border));
      font-size: 10px;
      font-family: var(--font-mono);
      font-weight: 600;
      color: var(--fg-subtle);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: all 100ms;
      touch-action: manipulation;
      /* Ensure minimum tap target */
      min-width: 28px;
      min-height: 28px;
    }

    .q-dot.answered {
      background: var(--brand-subtle);
      border-color: var(--brand-border);
      color: var(--brand);
    }

    .q-dot.current {
      background: var(--brand);
      border-color: var(--brand);
      color: white;
    }

    /* ═══════════════════════════════════════════════════════════════════
     RESULTS — mobile-first: completely different layouts
  ═══════════════════════════════════════════════════════════════════ */
    
    /* Mobile Results Layout */
    .results-mobile-header {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius-xl);
      padding: 20px 16px;
      margin-bottom: 12px;
      text-align: center;
      width: 100%;
      box-sizing: border-box;
    }

    .results-mobile-score {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    .results-mobile-score-circle {
      width: 100px;
      height: 100px;
      position: relative;
      flex-shrink: 0;
    }

    .results-mobile-score-circle svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .results-mobile-score-circle .score-ring-bg {
      fill: none;
      stroke: hsl(var(--border));
      stroke-width: 8;
    }

    .results-mobile-score-circle .score-ring-arc {
      fill: none;
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 1.2s var(--ease-spring);
    }

    .results-mobile-score-circle .score-ring-arc.pass {
      stroke: var(--success);
    }

    .results-mobile-score-circle .score-ring-arc.fail {
      stroke: var(--error);
    }

    .results-mobile-score-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .results-mobile-score-pct {
      font-family: var(--font-mono);
      font-size: 22px;
      font-weight: 700;
    }

    .results-mobile-score-pct.pass {
      color: var(--success);
    }

    .results-mobile-score-pct.fail {
      color: var(--error);
    }

    .results-mobile-score-label {
      font-size: 9px;
      color: var(--fg-subtle);
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .results-mobile-verdict {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .results-mobile-verdict.pass {
      color: var(--success);
    }

    .results-mobile-verdict.fail {
      color: var(--error);
    }

    .results-mobile-detail {
      font-size: 12px;
      color: var(--fg-muted);
    }

    .results-mobile-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 16px;
    }

    .results-mobile-stat {
      background: hsl(var(--muted));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius-md);
      padding: 12px 8px;
      text-align: center;
    }

    .results-mobile-stat-num {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 700;
    }

    .results-mobile-stat-lbl {
      font-size: 10px;
      color: var(--fg-muted);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    /* Mobile Results Info Card */
    .results-mobile-info {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 12px;
    }

    .results-mobile-info-head {
      padding: 10px 14px;
      background: hsl(var(--muted));
      border-bottom: 1px solid hsl(var(--border));
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--fg-subtle);
      font-family: var(--font-mono);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .results-mobile-info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid hsl(var(--border));
      font-size: 13px;
    }

    .results-mobile-info-row:last-child {
      border-bottom: none;
    }

    .results-mobile-info-label {
      color: var(--fg-muted);
      font-size: 12px;
    }

    .results-mobile-info-value {
      font-weight: 500;
      color: var(--fg);
      text-align: right;
      max-width: 60%;
      word-break: break-word;
    }

    .results-mobile-info-value.mono {
      font-family: var(--font-mono);
      font-size: 11px;
    }

    /* Mobile Review Section */
    .results-mobile-review {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 12px;
    }

    .results-mobile-review-head {
      padding: 12px 14px;
      background: hsl(var(--muted));
      border-bottom: 1px solid hsl(var(--border));
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
    }

    .results-mobile-review-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--fg);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .results-mobile-review-count {
      font-size: 11px;
      font-weight: 700;
      font-family: var(--font-mono);
      background: hsl(var(--background));
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid hsl(var(--border));
    }

    .results-mobile-review-chevron {
      font-size: 10px;
      color: var(--fg-subtle);
      transition: transform 200ms;
    }

    .results-mobile-review-chevron.open {
      transform: rotate(180deg);
    }

    .results-mobile-review-body {
      display: none;
      padding: 12px;
    }

    .results-mobile-review-body.open {
      display: block;
    }

    .results-mobile-review-card {
      background: hsl(var(--background));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius-md);
      padding: 12px;
      margin-bottom: 8px;
    }

    .results-mobile-review-card:last-child {
      margin-bottom: 0;
    }

    .results-mobile-review-card.correct {
      border-left: 3px solid var(--success);
    }

    .results-mobile-review-card.incorrect {
      border-left: 3px solid var(--error);
    }

    .results-mobile-review-card.skipped {
      border-left: 3px solid var(--fg-subtle);
    }

    .results-mobile-review-card-head {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
    }

    .results-mobile-review-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 8px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .results-mobile-review-icon.correct {
      background: var(--success-subtle);
      color: var(--success);
    }

    .results-mobile-review-icon.incorrect {
      background: var(--error-subtle);
      color: var(--error);
    }

    .results-mobile-review-icon.skipped {
      background: hsl(var(--muted));
      color: var(--fg-subtle);
    }

    .results-mobile-review-q {
      font-size: 13px;
      line-height: 1.5;
      color: var(--fg);
      flex: 1;
    }

    /* Mobile Results Layout fix - prevent horizontal overflow */
    .results-mobile-layout {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    .results-mobile-review-answers {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-left: 28px;
      max-width: 100%;
      overflow: hidden;
    }

    .results-mobile-review-answer {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      word-break: break-word;
      overflow-wrap: break-word;
    }

    .results-mobile-review-answer.user-correct {
      background: var(--success-subtle);
      color: var(--success);
    }

    .results-mobile-review-answer.user-wrong {
      background: var(--error-subtle);
      color: var(--error);
    }

    .results-mobile-review-answer.correct-ans {
      background: var(--success-subtle);
      color: var(--success);
      opacity: 0.9;
    }

    .results-mobile-review-answer.skipped {
      background: hsl(var(--muted));
      color: var(--fg-subtle);
    }

    .results-mobile-review-tag {
      font-size: 9px;
      font-weight: 700;
      font-family: var(--font-mono);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      opacity: 0.7;
      flex-shrink: 0;
    }

    /* Mobile Action Buttons */
    .results-mobile-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
    }

    /* Desktop Results Layout */
    @media (min-width: 860px) {
      .results-layout {
        display: grid !important;
        grid-template-columns: 300px 1fr;
        gap: 20px;
      }

      .results-mobile-layout,
      .results-mobile-header,
      .results-mobile-info,
      .results-mobile-review,
      .results-mobile-actions {
        display: none !important;
      }

      .results-desktop-sidebar {
        display: flex;
        flex-direction: column;
        gap: 16px;
        position: sticky;
        top: calc(var(--topbar-h) + 16px);
      }
    }

    /* Hide desktop layout on mobile */
    @media (max-width: 859px) {
      .results-layout {
        display: none !important;
      }
    }

    .score-display {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius-xl);
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow-sm);
    }

    .score-ring-svg {
      width: 130px;
      height: 130px;
      transform: rotate(-90deg);
    }

    .score-ring-bg {
      fill: none;
      stroke: hsl(var(--border));
      stroke-width: 8;
    }

    .score-ring-arc {
      fill: none;
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 1.2s var(--ease-spring);
    }

    .score-ring-arc.pass {
      stroke: var(--success);
    }

    .score-ring-arc.fail {
      stroke: var(--error);
    }

    .score-ring-wrap {
      position: relative;
    }

    .score-ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .score-pct {
      font-family: var(--font-mono);
      font-size: 28px;
      font-weight: 700;
    }

    .score-pct.pass {
      color: var(--success);
    }

    .score-pct.fail {
      color: var(--error);
    }

    .score-label {
      font-size: 10px;
      color: var(--fg-subtle);
      font-family: var(--font-mono);
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .score-verdict {
      font-size: 18px;
      font-weight: 700;
    }

    .score-detail {
      font-size: 13px;
      color: var(--fg-muted);
    }

    .score-stats {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    .stat-box {
      flex: 1;
      background: hsl(var(--muted));
      border-radius: var(--radius-md);
      padding: 10px 6px;
      text-align: center;
      border: 1px solid hsl(var(--border));
    }

    .stat-num {
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 700;
    }

    .stat-lbl {
      font-size: 11px;
      color: var(--fg-muted);
      margin-top: 2px;
    }

    /* ─── REVIEW CARDS ─── */
    .review-card {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      margin-bottom: 8px;
      animation: fadeUp .2s ease both;
    }

    .review-card.correct {
      border-inline-start: 3px solid var(--success);
    }

    .review-card.incorrect {
      border-inline-start: 3px solid var(--error);
    }

    .review-card.skipped {
      border-inline-start: 3px solid var(--fg-subtle);
    }

    .review-card-head {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .review-icon {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 9px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .review-icon.correct {
      background: var(--success-subtle);
      color: var(--success);
    }

    .review-icon.incorrect {
      background: var(--error-subtle);
      color: var(--error);
    }

    .review-icon.skipped {
      background: hsl(var(--muted));
      color: var(--fg-subtle);
    }

    .review-q {
      font-size: 13px;
      line-height: 1.65;
    }

    .review-answers {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding-inline-start: 32px;
    }

    .review-answer-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: var(--radius-sm);
    }

    .review-answer-row.user-correct {
      background: var(--success-subtle);
      color: var(--success);
    }

    .review-answer-row.user-wrong {
      background: var(--error-subtle);
      color: var(--error);
    }

    .review-answer-row.correct-ans {
      background: var(--success-subtle);
      color: var(--success);
      opacity: .8;
    }

    .review-answer-row.skipped-row {
      background: hsl(var(--muted));
      color: var(--fg-subtle);
    }

    .review-tag {
      font-size: 10px;
      font-weight: 700;
      font-family: var(--font-mono);
      letter-spacing: .04em;
      opacity: .7;
      flex-shrink: 0;
    }

    /* ═══════════════════════════════════════════════════════════════════
     LOADING & STATE
  ═══════════════════════════════════════════════════════════════════ */
    .loader-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 64px 20px;
      text-align: center;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2.5px solid hsl(var(--border));
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    .loader-title {
      font-size: 18px;
      font-weight: 600;
    }

    .loader-sub {
      font-size: 14px;
      color: var(--fg-muted);
      max-width: 300px;
      line-height: 1.6;
    }

    .skel {
      background: linear-gradient(90deg, hsl(var(--muted)) 25%, hsl(var(--border)) 50%, hsl(var(--muted)) 75%);
      background-size: 600px 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius);
    }

    .state-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 56px 20px;
      text-align: center;
    }

    .state-icon {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-xl);
      display: grid;
      place-items: center;
      font-size: 22px;
    }

    .state-icon.error {
      background: var(--error-subtle);
      color: var(--error);
    }

    .state-icon.success {
      background: var(--success-subtle);
      color: var(--success);
    }

    .state-icon.warn {
      background: var(--warning-subtle);
      color: var(--warning);
    }

    .state-title {
      font-size: 20px;
      font-weight: 700;
    }

    .state-desc {
      font-size: 14px;
      color: var(--fg-muted);
      max-width: 360px;
      line-height: 1.65;
    }

    /* ═══════════════════════════════════════════════════════════════════
     MODAL — sheets on mobile
  ═══════════════════════════════════════════════════════════════════ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: hsl(0 0% 0% / 0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: none;
      align-items: flex-end;
      /* sheet from bottom on mobile */
      justify-content: center;
      padding: 0;
    }

    @media (min-width: 640px) {
      .modal-overlay {
        align-items: center;
        padding: 20px;
      }
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal-box {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius-2xl) var(--radius-2xl) 0 0;
      /* sheet style */
      box-shadow: var(--shadow-xl);
      width: 100%;
      max-width: 100%;
      overflow: hidden;
      animation: slideInUp .25s var(--ease-out) both;
      max-height: 92dvh;
      overflow-y: auto;
      /* Safe area for iOS home bar */
      padding-bottom: env(safe-area-inset-bottom);
    }

    @media (min-width: 640px) {
      .modal-box {
        border-radius: var(--radius-2xl);
        max-width: 480px;
        animation: modalIn .2s var(--ease) both;
        max-height: calc(100dvh - 40px);
        padding-bottom: 0;
      }
    }

    /* Drag handle indicator on mobile */
    .modal-box::before {
      content: '';
      display: block;
      width: 36px;
      height: 4px;
      background: hsl(var(--border));
      border-radius: 2px;
      margin: 12px auto 0;
    }

    @media (min-width: 640px) {
      .modal-box::before {
        display: none;
      }
    }

    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid hsl(var(--border));
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 700;
    }

    .modal-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal-footer {
      padding: 14px 20px;
      border-top: 1px solid hsl(var(--border));
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    /* Stack modal buttons on very small screens */
    @media (max-width: 400px) {
      .modal-footer {
        flex-direction: column-reverse;
      }

      .modal-footer .btn {
        width: 100%;
      }
    }

    /* ═══════════════════════════════════════════════════════════════════
     ADMIN LAYOUT — full sidebar on desktop, mobile bottom nav
  ═══════════════════════════════════════════════════════════════════ */
    .admin-shell {
      display: block;
      min-height: 100dvh;
      /* Reserve bottom for mobile admin nav */
      padding-bottom: var(--mob-nav-h);
    }

    @media (min-width: 769px) {
      .admin-shell {
        display: grid;
        grid-template-columns: var(--sidebar-w) 1fr;
        padding-bottom: 0;
      }
    }

    /* Desktop sidebar */
    .admin-nav {
      display: none;
    }

    @media (min-width: 769px) {
      .admin-nav {
        display: flex;
        background: hsl(var(--card));
        border-inline-end: 1px solid hsl(var(--border));
        padding: 16px 0;
        flex-direction: column;
        position: sticky;
        top: 0;
        height: 100dvh;
        overflow-y: auto;
      }
    }

    .admin-nav-logo {
      padding: 0 16px 16px;
      border-bottom: 1px solid hsl(var(--border));
      margin-bottom: 12px;
    }

    .admin-nav-section {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--fg-subtle);
      padding: 8px 16px 4px;
      font-family: var(--font-mono);
    }

    .admin-nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      font-size: 13.5px;
      color: var(--fg-muted);
      cursor: pointer;
      transition: all 100ms;
      border-inline-start: 2px solid transparent;
      text-decoration: none;
      font-weight: 400;
      touch-action: manipulation;
    }

    .admin-nav-item:hover {
      background: hsl(var(--accent));
      color: hsl(var(--accent-foreground));
    }

    .admin-nav-item.active {
      background: var(--brand-subtle);
      color: var(--brand);
      border-inline-start-color: var(--brand);
      font-weight: 500;
    }

    /* ── MOBILE ADMIN BOTTOM NAV ── */
    .admin-mob-nav {
      display: flex;
      position: fixed;
      bottom: 0;
      inset-inline: 0;
      z-index: 50;
      background: hsl(var(--card));
      border-top: 1px solid hsl(var(--border));
      height: var(--mob-nav-h);
      padding-bottom: env(safe-area-inset-bottom);
      align-items: stretch;
      animation: mobNavSlideUp .2s var(--ease-out) both;
    }

    @media (min-width: 769px) {
      .admin-mob-nav {
        display: none;
      }
    }

    .admin-mob-nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 8px 4px;
      cursor: pointer;
      touch-action: manipulation;
      color: var(--fg-muted);
      text-decoration: none;
      transition: color 120ms, background 120ms;
      font-size: 10px;
      font-weight: 500;
      border: none;
      background: transparent;
      font-family: var(--font-sans);
    }

    .admin-mob-nav-item:active {
      background: hsl(var(--muted));
    }

    .admin-mob-nav-item.active {
      color: var(--brand);
    }

    .admin-mob-nav-item i {
      font-size: 18px;
      line-height: 1;
    }

    .admin-content {
      padding: 16px;
      min-height: calc(100dvh - var(--mob-nav-h));
      overflow: hidden;
    }

    @media (min-width: 769px) {
      .admin-content {
        padding: 28px 32px;
        min-height: 100dvh;
      }
    }

    /* ═══════════════════════════════════════════════════════════════════
     TABLE — scrolls on mobile
  ═══════════════════════════════════════════════════════════════════ */
    .table-wrap {
      overflow-x: auto;
      border-radius: var(--radius-lg);
      border: 1px solid hsl(var(--border));
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      background: hsl(var(--muted));
      padding: 9px 12px;
      text-align: start;
      font-weight: 600;
      color: var(--fg-muted);
      font-size: 10px;
      letter-spacing: .06em;
      text-transform: uppercase;
      font-family: var(--font-mono);
      border-bottom: 1px solid hsl(var(--border));
      white-space: nowrap;
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid hsl(var(--border));
      color: var(--fg);
      vertical-align: middle;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: hsl(var(--muted) / 0.5);
    }

    /* ─── EXPIRY ─── */
    .expiry-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
      margin-inline-end: 5px;
    }

    .expiry-dot.active {
      background: var(--success);
    }

    .expiry-dot.expired {
      background: var(--error);
    }

    .expiry-dot.warn {
      background: var(--warning);
    }

    /* ─── TAG CHIPS ─── */
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 7px;
      border-radius: 9999px;
      font-size: 10px;
      font-family: var(--font-mono);
      background: var(--brand-subtle);
      color: var(--brand);
      border: 1px solid var(--brand-border);
    }

    /* ─── DROPDOWN ─── */
    .dropdown {
      position: relative;
    }

    .dropdown-menu {
      position: absolute;
      top: calc(100% + 6px);
      inset-inline-end: 0;
      z-index: 60;
      background: hsl(var(--popover));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      min-width: 180px;
      overflow: hidden;
      display: none;
    }

    .dropdown-menu.open {
      display: block;
      animation: fadeIn .1s ease;
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--fg-muted);
      cursor: pointer;
      transition: background 100ms;
      touch-action: manipulation;
    }

    .dropdown-item:hover {
      background: hsl(var(--accent));
      color: hsl(var(--accent-foreground));
    }

    .dropdown-item.danger:hover {
      background: var(--error-subtle);
      color: var(--error);
    }

    .dropdown-divider {
      height: 1px;
      background: hsl(var(--border));
      margin: 4px 0;
    }

    /* ─── MULTI SELECT ─── */
    .multi-select {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px;
      border: 1px solid hsl(var(--input));
      border-radius: var(--radius-md);
      background: hsl(var(--background));
      min-height: 50px;
      cursor: pointer;
    }

    .multi-select-placeholder {
      color: var(--fg-subtle);
      font-size: 14px;
      padding: 2px;
    }

    .multi-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 8px;
      background: var(--brand-subtle);
      color: var(--brand);
      border: 1px solid var(--brand-border);
      border-radius: 9999px;
      font-size: 12px;
      font-family: var(--font-mono);
    }

    .multi-tag button {
      background: none;
      border: none;
      cursor: pointer;
      color: inherit;
      font-size: 11px;
      line-height: 1;
      padding: 0;
    }

    .multi-select-dropdown {
      position: absolute;
      top: 100%;
      inset-inline: 0;
      z-index: 50;
      background: hsl(var(--popover));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      max-height: 220px;
      overflow-y: auto;
      display: none;
      -webkit-overflow-scrolling: touch;
    }

    .multi-select-dropdown.open {
      display: block;
    }

    .multi-opt {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      font-size: 13px;
      cursor: pointer;
      transition: background 100ms;
      touch-action: manipulation;
    }

    .multi-opt:hover {
      background: hsl(var(--accent));
    }

    .multi-opt.selected {
      background: var(--brand-subtle);
      color: var(--brand);
    }

    .multi-opt-check {
      width: 16px;
      height: 16px;
      border: 1.5px solid hsl(var(--border));
      border-radius: 4px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      font-size: 10px;
    }

    .multi-opt.selected .multi-opt-check {
      background: var(--brand);
      border-color: var(--brand);
      color: white;
    }

    /* ─── STEP TRACKER ─── */
    .step-track {
      display: flex;
      align-items: center;
      gap: 0;
      margin-inline-start: auto;
    }

    .step-node {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1.5px solid hsl(var(--border));
      display: grid;
      place-items: center;
      font-size: 10px;
      font-weight: 600;
      color: var(--fg-subtle);
      font-family: var(--font-mono);
      background: hsl(var(--background));
    }

    .step-node.active {

      line-height: 1.65;
    }

    /* Connector line between steps on desktop */
    @media (min-width: 640px) {
      .landing-step:not(:last-child)::after {
        content: '';
        position: absolute;
        top: 20px;
        left: calc(40px + 16px);
        right: calc(-32px + 0px);
        height: 1px;
        background: linear-gradient(90deg, var(--brand-border), hsl(var(--border)));
      }
    }

    /* ── CTA BANNER ── */
    .landing-cta-section {
      margin: 0 var(--p-x) 48px;
      border-radius: calc(var(--radius) + 12px);
      overflow: hidden;
      background: linear-gradient(135deg,
        hsl(142.1 76.2% 14%) 0%,
        hsl(142.1 76.2% 20%) 60%,
        hsl(150 60% 26%) 100%);
      padding: 40px 24px;
      position: relative;
    }

    .landing-cta-section::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    @media (min-width: 768px) {
      .landing-cta-section {
        margin: 0 32px 64px;
        padding: 52px 48px;
      }
    }

    .landing-cta-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 20px;
    }

    @media (min-width: 640px) {
      .landing-cta-inner {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
      }
    }

    .landing-cta-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(20px, 3vw, 30px);
      font-weight: 800;
      color: #ffffff;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .landing-cta-desc {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      line-height: 1.6;
    }

    .landing-cta-btns {
      display: flex;
      gap: 10px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    /* ── FOOTER ── */
    .landing-footer {
      border-top: 1px solid hsl(var(--border));
      padding: 20px var(--p-x);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--fg-subtle);
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      flex-wrap: wrap;
      gap: 8px;
    }

    @media (min-width: 768px) {
      .landing-footer {
        padding: 24px 32px;
      }
    }

    /* ── QUIZ LIBRARY ── */
    .quiz-lib-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
    }

    @media (min-width: 480px) {
      .quiz-lib-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }
    }

    @media (min-width: 860px) {
      .quiz-lib-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .quiz-lib-card {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius-xl);
      padding: 16px;
      cursor: pointer;
      transition: all 150ms;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      touch-action: manipulation;
    }

    .quiz-lib-card:hover {
      border-color: var(--brand);
      box-shadow: var(--shadow-md);
    }

    .quiz-lib-card:active {
      transform: scale(.99);
    }

    .quiz-lib-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .quiz-lib-card-title {
      font-weight: 600;
      font-size: 14px;
      line-height: 1.4;
      color: var(--fg);
    }

    .quiz-lib-card-meta {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .quiz-lib-card-date {
      font-size: 11px;
      color: var(--fg-subtle);
      font-family: var(--font-mono);
      margin-top: auto;
    }

    /* ── QUIZ ATTEMPT HEADER ── */
    .quiz-page-header {
      background: hsl(var(--card));
      border-bottom: 1px solid hsl(var(--border));
      padding: 10px var(--p-x);
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: var(--topbar-h);
      z-index: 30;
    }

    @media (min-width: 768px) {
      .quiz-page-header {
        padding: 10px 24px;
      }
    }

    .quiz-page-progress {
      flex: 1;
    }

    .quiz-page-timer {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--fg-muted);
      white-space: nowrap;
    }

    /* ── USER DASHBOARD ── */
    .dashboard-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
    }

    @media (min-width: 640px) {
      .dashboard-grid {
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
    }

    .dashboard-card {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius-xl);
      padding: 18px 16px;
    }

    @media (min-width: 768px) {
      .dashboard-card {
        padding: 22px 20px;
      }
    }

    .dashboard-card-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--fg);
    }

    /* ── BREADCRUMB ── */
    .page-breadcrumb {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--fg-muted);
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .page-breadcrumb a,
    .page-breadcrumb span[data-nav] {
      color: var(--fg-muted);
      text-decoration: none;
      cursor: pointer;
    }

    .page-breadcrumb a:hover,
    .page-breadcrumb span[data-nav]:hover {
      color: var(--brand);
    }

    .page-breadcrumb .sep {
      color: var(--fg-subtle);
    }

    .page-breadcrumb .current {
      color: var(--fg);
      font-weight: 500;
    }

    /* ── RESULT SHARE BAR ── */
    .result-share-bar {
      background: hsl(var(--card));
      border: 1px solid var(--brand-border);
      border-radius: var(--radius-lg);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .result-share-url {
      flex: 1;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--fg-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
      max-width: calc(100vw - 120px);
    }

    /* ═══════════════════════════════════════════════════════════════════
     MOBILE-FIRST RESULTS SCREEN OVERHAUL
    ═══════════════════════════════════════════════════════════════════ */

    /* On mobile: results layout is always single column */
    .results-layout {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    @media (min-width: 860px) {
      .results-layout {
        display: grid;
        grid-template-columns: 300px 1fr;
        gap: 24px;
        align-items: start;
      }
    }

    /* Score display: more compact on mobile, horizontal stat row */
    @media (max-width: 859px) {
      .score-display {
        padding: 20px 16px;
        gap: 14px;
      }

      .score-ring-svg {
        width: 110px;
        height: 110px;
      }

      .score-pct {
        font-size: 24px;
      }

      .score-stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .stat-box {
        padding: 10px 4px;
      }

      .stat-num {
        font-size: 18px;
      }

      .stat-lbl {
        font-size: 10px;
      }

      /* On mobile, show score + stats + actions compactly */
      .result-share-bar {
        flex-direction: row;
        align-items: center;
        gap: 8px;
      }

      .result-share-bar .btn {
        flex-shrink: 0;
      }
    }

    /* Mobile result action buttons - full width, stacked nicely */
    @media (max-width: 859px) {
      .results-actions-mobile {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
    }

    @media (min-width: 860px) {
      .results-actions-mobile {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
    }

    /* Review cards: tighter on mobile */
    @media (max-width: 767px) {
      .review-card {
        padding: 12px 12px;
      }

      .review-answers {
        padding-inline-start: 0;
      }

      .review-answer-row {
        font-size: 12px;
      }
    }

    /* ═══════════════════════════════════════════════════════════════════
     ADMIN MOBILE CARD LISTS (replace tables on mobile)
    ═══════════════════════════════════════════════════════════════════ */

    /* Mobile admin card list */
    .mob-card-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .mob-card {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius-lg);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: fadeUp .15s ease both;
    }

    .mob-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .mob-card-title {
      font-weight: 600;
      font-size: 14px;
      color: var(--fg);
      line-height: 1.3;
    }

    .mob-card-subtitle {
      font-size: 12px;
      color: var(--fg-muted);
      font-family: var(--font-mono);
      margin-top: 2px;
    }

    .mob-card-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
    }

    .mob-card-label {
      color: var(--fg-muted);
      font-size: 12px;
      flex-shrink: 0;
    }

    .mob-card-value {
      font-weight: 500;
      color: var(--fg);
      text-align: end;
      font-size: 13px;
      word-break: break-all;
    }

    .mob-card-actions {
      display: flex;
      gap: 6px;
      padding-top: 6px;
      border-top: 1px solid hsl(var(--border));
    }

    /* Show/hide table vs cards based on screen */
    .desktop-only {
      display: none;
    }

    .mobile-only {
      display: block;
    }

    @media (min-width: 769px) {
      .desktop-only {
        display: block;
      }

      .mobile-only {
        display: none;
      }
    }

    /* Admin content on mobile: tighter padding */
    @media (max-width: 768px) {
      .admin-content {
        padding: 14px 12px;
        overflow-x: hidden;
      }
    }

    /* Admin filters: stack on mobile */
    @media (max-width: 600px) {
      .admin-filter-row {
        flex-direction: column;
        gap: 10px;
        align-items: stretch !important;
      }

      .admin-filter-row > div {
        width: 100% !important;
      }

      .admin-filter-row select {
        width: 100% !important;
        min-width: unset !important;
      }
    }

    /* Admin page header stack on mobile */
    @media (max-width: 600px) {
      .admin-page-head {
        flex-direction: column !important;
        align-items: flex-start !important;
        gap: 12px;
      }

      .admin-page-head .btn {
        align-self: flex-start;
      }
    }

    /* Recent results on dashboard: mobile cards */
    .dash-result-card {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius-lg);
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .dash-result-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .dash-result-card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      font-size: 12px;
      color: var(--fg-muted);
    }
  </style>
</head>

    /* ── API wrapper ── */
    async function api(method, path, body, noAuth = false) {
      const headers = { 'Content-Type': 'application/json' };
      if (!noAuth && authToken) headers['Authorization'] = `Bearer ${authToken}`;
      const opts = { method, headers };
      if (body) opts.body = JSON.stringify(body);
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 30000);
      try {
        const r = await fetch(path, { ...opts, signal: controller.signal });
        clearTimeout(timeout);
        const data = await r.json().catch(() => ({}));
        return { ok: r.ok, status: r.status, data };
      } catch (e) {
        clearTimeout(timeout);
        if (e.name === 'AbortError') throw new Error('Request timed out. Check your connection.');
        throw new Error('Network error. Check your connection.');
      }
    }

    function setupMarkdown() {
      if (window.marked) marked.setOptions({ breaks: true, gfm: true });

    function escapeHTML(str) {
      return String(str || '').replace(/[&<>"']/g, s => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[s]));
    }
    function sanitizeHTML(html, inline = false) {
      if (!window.DOMPurify) return html;
      const allowedInline = ['em', 'strong', 'code', 'br', 'sub', 'sup', 'span', 'del', 'u'];
      const allowedBlock = ['p', 'ul', 'ol', 'li', 'blockquote', 'code', 'pre', 'em', 'strong', 'br', 'sub', 'sup', 'span', 'del', 'u'];
      return DOMPurify.sanitize(html, { ALLOWED_TAGS: inline ? allowedInline : allowedBlock, ALLOWED_ATTR: [] });
    }
    function hasMathDelimiters(s) {
      return /(\$\$[\s\S]+?\$\$)|(\$[^$\n]+\$)|\\\(|\\\[/.test(s);
    }
    function mdInline(text) {
      const s = String(text || '');
      if (hasMathDelimiters(s)) return escapeHTML(s).replace(/\n/g, '<br>');
      if (window.marked) return sanitizeHTML(marked.parseInline(s), true);
      return escapeHTML(s).replace(/\n/g, '<br>');
    }
    function mdBlock(text) {
      const s = String(text || '');
      if (hasMathDelimiters(s)) return escapeHTML(s).replace(/\n/g, '<br>');
      if (window.marked) return sanitizeHTML(marked.parse(s), false);
      return escapeHTML(s).replace(/\n/g, '<br>');
    }
    function applyMath(el) {
      if (!el || !window.renderMathInElement) return;
      renderMathInElement(el, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '\\[', right: '\\]', display: true },
          { left: '$', right: '$', display: false },
          { left: '\\(', right: '\\)', display: false },
        ],
        throwOnError: false
      });
    }
