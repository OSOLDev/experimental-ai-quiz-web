<!doctype html>
<html lang="en" dir="ltr" data-theme="light" data-lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Career Boost Officers Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@700;800&display=swap"
    rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" rel="stylesheet" />
  <link href="/styles/main.css" rel="stylesheet" />
</head>

<body>
  <div id="root">
    <nav class="topbar" id="main-topbar">
      <div class="topbar-inner">
        <a class="brand" href="/" onclick="window._navigate(event,'/')">
          <img src="/images/logo.png" alt="Career Boost" style="width:36px;height:36px;object-fit:contain" />
          <div class="brand-text">
            <span class="brand-name" id="brand-name-text">Career Boost</span>
            <span class="brand-sub" id="brand-sub-text">Officers Academy</span>
          </div>
        </a>
        <div class="topbar-center"></div>
        <div class="topbar-right">
          <div class="dropdown" id="notif-dd" style="display:none">
            <button class="topbar-icon-btn" onclick="window._toggleNotifMenu(event)" title="Notifications" id="notif-btn">
              <i class="fa-solid fa-bell"></i>
              <span class="notif-dot" id="notif-dot" style="display:none"></span>
            </button>
            <div class="dropdown-menu notif-menu" id="notif-menu">
              <div class="notif-header">
                <div class="notif-title">Notifications</div>
                <button class="btn btn-ghost btn-sm" style="height:24px;font-size:11px" onclick="window._markAllRead(event)">Mark all as read</button>
              </div>
              <div class="dropdown-divider"></div>
              <div class="notif-list" id="notif-list">
                <div class="notif-empty">No new notifications</div>
              </div>
            </div>
          </div>
          <div id="user-chip-container"></div>
        </div>
      </div>
    </nav>
    <div class="progress-rail">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <main id="main-content"></main>
  </div>

  <div class="submit-bar" id="submit-bar">
    <div style="display:flex;flex-direction:column;gap:2px">
      <div style="font-size:13px;font-weight:600" id="sb-answered">0 / 0 answered</div>
      <div style="font-size:12px;color:var(--fg-muted)" id="sb-time"></div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="window._openSubmitModal()">
      <i class="fa-solid fa-flag-checkered"></i> <span id="sb-submit-label">Submit Quiz</span>
    </button>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title" id="modal-title"></span>
        <button class="icon-btn" onclick="window._closeModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>

</html>
