<!doctype html>
<html lang="en" data-theme="light">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <title>ProQuiz — Assessment Platform</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=DM+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
            rel="stylesheet"
        />

        <style>
            /* ─── DESIGN SYSTEM ───────────────────────────────── */
            :root {
                /* Neutral palette */
                --gray-50: #fafafa;
                --gray-100: #f4f4f5;
                --gray-200: #e4e4e7;
                --gray-300: #d1d1d6;
                --gray-400: #a1a1aa;
                --gray-500: #71717a;
                --gray-600: #52525b;
                --gray-700: #3f3f46;
                --gray-800: #27272a;
                --gray-900: #18181b;
                --gray-950: #09090b;

                /* Semantic tokens — light */
                --bg: #ffffff;
                --bg-subtle: var(--gray-50);
                --bg-muted: var(--gray-100);
                --bg-elevated: #ffffff;
                --fg: var(--gray-950);
                --fg-muted: var(--gray-600);
                --fg-subtle: var(--gray-400);
                --fg-inverted: #ffffff;
                --border: var(--gray-200);
                --border-strong: var(--gray-300);

                /* Brand */
                --brand: #0f172a;
                --brand-fg: #ffffff;
                --accent: #2563eb;
                --accent-hover: #1d4ed8;
                --accent-subtle: #eff6ff;
                --accent-border: #bfdbfe;
                --accent-fg: #1e40af;

                /* Status */
                --success: #16a34a;
                --success-subtle: #f0fdf4;
                --success-border: #bbf7d0;
                --error: #dc2626;
                --error-subtle: #fef2f2;
                --error-border: #fecaca;
                --warning: #d97706;
                --warning-subtle: #fffbeb;
                --warning-border: #fde68a;

                /* Shadows */
                --shadow-xs: 0 1px 2px 0 rgb(0 0 0 / 0.05);
                --shadow-sm:
                    0 1px 3px 0 rgb(0 0 0 / 0.1),
                    0 1px 2px -1px rgb(0 0 0 / 0.1);
                --shadow-md:
                    0 4px 6px -1px rgb(0 0 0 / 0.1),
                    0 2px 4px -2px rgb(0 0 0 / 0.1);
                --shadow-lg:
                    0 10px 15px -3px rgb(0 0 0 / 0.1),
                    0 4px 6px -4px rgb(0 0 0 / 0.1);
                --shadow-xl:
                    0 20px 25px -5px rgb(0 0 0 / 0.1),
                    0 8px 10px -6px rgb(0 0 0 / 0.1);
                --shadow-2xl: 0 25px 50px -12px rgb(0 0 0 / 0.25);

                /* Radius */
                --radius-sm: 4px;
                --radius: 6px;
                --radius-md: 8px;
                --radius-lg: 12px;
                --radius-xl: 16px;
                --radius-2xl: 20px;

                /* Type */
                --font-sans:
                    "DM Sans", -apple-system, BlinkMacSystemFont, sans-serif;
                --font-mono: "DM Mono", "Cascadia Code", "Fira Code", monospace;

                /* Spacing scale */
                --s1: 4px;
                --s2: 8px;
                --s3: 12px;
                --s4: 16px;
                --s5: 20px;
                --s6: 24px;
                --s8: 32px;
                --s10: 40px;
                --s12: 48px;
                --s16: 64px;

                /* Transitions */
                --ease: cubic-bezier(0.4, 0, 0.2, 1);
                --ease-out: cubic-bezier(0, 0, 0.2, 1);
                --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
                --duration-fast: 100ms;
                --duration: 150ms;
                --duration-slow: 250ms;
            }

            [data-theme="dark"] {
                --bg: #0a0a0a;
                --bg-subtle: #111111;
                --bg-muted: #1a1a1a;
                --bg-elevated: #161616;
                --fg: #ededed;
                --fg-muted: var(--gray-400);
                --fg-subtle: var(--gray-600);
                --fg-inverted: var(--gray-950);
                --border: #262626;
                --border-strong: #333333;

                --brand: #ededed;
                --brand-fg: #0a0a0a;
                --accent: #3b82f6;
                --accent-hover: #60a5fa;
                --accent-subtle: #172554;
                --accent-border: #1e40af;
                --accent-fg: #93c5fd;

                --success: #22c55e;
                --success-subtle: #052e16;
                --success-border: #166534;
                --error: #f87171;
                --error-subtle: #450a0a;
                --error-border: #991b1b;
                --warning: #fbbf24;
                --warning-subtle: #451a03;
                --warning-border: #92400e;
            }

            /* ─── SYSTEM THEME ───────────────────────────────── */
            @media (prefers-color-scheme: dark) {
                html:not([data-theme="light"]) {
                    --bg: #0a0a0a;
                    --bg-subtle: #111111;
                    --bg-muted: #1a1a1a;
                    --bg-elevated: #161616;
                    --fg: #ededed;
                    --fg-muted: var(--gray-400);
                    --fg-subtle: var(--gray-600);
                    --fg-inverted: var(--gray-950);
                    --border: #262626;
                    --border-strong: #333333;
                    --brand: #ededed;
                    --brand-fg: #0a0a0a;
                    --accent: #3b82f6;
                    --accent-hover: #60a5fa;
                    --accent-subtle: #172554;
                    --accent-border: #1e40af;
                    --accent-fg: #93c5fd;
                    --success: #22c55e;
                    --success-subtle: #052e16;
                    --success-border: #166534;
                    --error: #f87171;
                    --error-subtle: #450a0a;
                    --error-border: #991b1b;
                    --warning: #fbbf24;
                    --warning-subtle: #451a03;
                    --warning-border: #92400e;
                }
            }

            /* ─── RESET ───────────────────────────────────────── */
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html {
                font-size: 16px;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }
            body {
                font-family: var(--font-sans);
                background: var(--bg-subtle);
                color: var(--fg);
                min-height: 100dvh;
                line-height: 1.5;
                transition:
                    background var(--duration-slow) var(--ease),
                    color var(--duration-slow) var(--ease);
            }

            /* ─── KEYFRAMES ───────────────────────────────────── */
            @keyframes shimmer {
                0% {
                    background-position: -600px 0;
                }
                100% {
                    background-position: 600px 0;
                }
            }
            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(8px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            @keyframes checkBounce {
                0% {
                    transform: scale(0);
                }
                60% {
                    transform: scale(1.2);
                }
                100% {
                    transform: scale(1);
                }
            }
            @keyframes modalIn {
                from {
                    opacity: 0;
                    transform: scale(0.96) translateY(4px);
                }
                to {
                    opacity: 1;
                    transform: scale(1) translateY(0);
                }
            }
            @keyframes progressPulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.6;
                }
            }
            @keyframes ringDraw {
                from {
                    stroke-dashoffset: 339.29;
                }
            }

            /* ─── LAYOUT SHELL ───────────────────────────────── */
            #root {
                min-height: 100dvh;
                display: grid;
                grid-template-rows: auto 1fr;
            }

            /* ─── TOPBAR ─────────────────────────────────────── */
            .topbar {
                position: sticky;
                top: 0;
                z-index: 40;
                background: color-mix(in srgb, var(--bg) 85%, transparent);
                backdrop-filter: blur(16px) saturate(180%);
                -webkit-backdrop-filter: blur(16px) saturate(180%);
                border-bottom: 1px solid var(--border);
                height: 56px;
                display: flex;
                align-items: center;
            }

            .topbar-inner {
                width: 100%;
                max-width: 1200px;
                margin: 0 auto;
                padding: 0 var(--s6);
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: var(--s4);
            }

            .brand {
                display: flex;
                align-items: center;
                gap: var(--s3);
                text-decoration: none;
                flex-shrink: 0;
            }

            .brand-icon {
                width: 28px;
                height: 28px;
                background: var(--fg);
                border-radius: var(--radius);
                display: grid;
                place-items: center;
                color: var(--bg);
                font-size: 11px;
                flex-shrink: 0;
            }

            .brand-name {
                font-size: 14px;
                font-weight: 600;
                letter-spacing: -0.3px;
                color: var(--fg);
            }

            .brand-divider {
                width: 1px;
                height: 16px;
                background: var(--border-strong);
                flex-shrink: 0;
            }

            .brand-product {
                font-size: 13px;
                font-weight: 400;
                color: var(--fg-muted);
            }

            .topbar-right {
                display: flex;
                align-items: center;
                gap: var(--s2);
            }

            .topbar-badge {
                display: inline-flex;
                align-items: center;
                gap: var(--s2);
                height: 28px;
                padding: 0 var(--s3);
                background: var(--bg-muted);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                font-size: 12px;
                font-weight: 500;
                color: var(--fg-muted);
                font-family: var(--font-mono);
            }

            .topbar-badge .dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--success);
                flex-shrink: 0;
            }

            .icon-btn {
                width: 32px;
                height: 32px;
                border-radius: var(--radius);
                background: transparent;
                border: 1px solid var(--border);
                cursor: pointer;
                display: grid;
                place-items: center;
                font-size: 13px;
                color: var(--fg-muted);
                transition:
                    background var(--duration-fast) var(--ease),
                    color var(--duration-fast) var(--ease);
            }

            .icon-btn:hover {
                background: var(--bg-muted);
                color: var(--fg);
            }

            /* Progress rail under topbar */
            .progress-rail {
                height: 2px;
                background: var(--border);
                overflow: hidden;
            }

            .progress-fill-top {
                height: 100%;
                background: var(--accent);
                transition: width 0.5s var(--ease-out);
                width: 0%;
            }

            /* ─── MAIN LAYOUT ────────────────────────────────── */
            .page-layout {
                width: 100%;
                max-width: 1200px;
                margin: 0 auto;
                padding: var(--s5) var(--s6) var(--s10);
                display: grid;
                grid-template-columns: 1fr;
                gap: var(--s6);
            }

            /* Tablet+ sidebar layout */
            @media (min-width: 768px) {
                .page-layout {
                    padding: var(--s6) var(--s8) var(--s12);
                }
            }

            @media (min-width: 1024px) {
                .page-layout.has-sidebar {
                    grid-template-columns: 280px 1fr;
                    gap: var(--s10);
                }
            }

            /* ─── SIDEBAR ────────────────────────────────────── */
            .sidebar {
                display: none;
            }

            @media (min-width: 1024px) {
                .sidebar {
                    display: block;
                    position: sticky;
                    top: calc(56px + var(--s6));
                    height: fit-content;
                }
            }

            .sidebar-section {
                margin-bottom: var(--s6);
            }

            .sidebar-label {
                font-size: 11px;
                font-weight: 600;
                letter-spacing: 0.06em;
                text-transform: uppercase;
                color: var(--fg-subtle);
                margin-bottom: var(--s3);
                font-family: var(--font-mono);
            }

            .sidebar-card {
                background: var(--bg-elevated);
                border: 1px solid var(--border);
                border-radius: var(--radius-lg);
                padding: var(--s4);
                box-shadow: var(--shadow-xs);
            }

            .sidebar-stat {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: var(--s3) 0;
                border-bottom: 1px solid var(--border);
            }

            .sidebar-stat:last-child {
                border-bottom: none;
            }

            .sidebar-stat-label {
                font-size: 13px;
                color: var(--fg-muted);
            }

            .sidebar-stat-value {
                font-size: 13px;
                font-weight: 600;
                color: var(--fg);
                font-family: var(--font-mono);
            }

            /* ─── CONTENT AREA ───────────────────────────────── */
            .content-area {
                min-width: 0;
            }

            /* ─── PAGE HEADER ────────────────────────────────── */
            .page-header {
                margin-bottom: var(--s5);
                animation: fadeUp var(--duration-slow) var(--ease-out) both;
            }

            .page-header-meta {
                display: flex;
                align-items: center;
                gap: var(--s3);
                margin-bottom: var(--s4);
            }

            .breadcrumb {
                display: flex;
                align-items: center;
                gap: var(--s2);
                font-size: 13px;
                color: var(--fg-subtle);
            }

            .breadcrumb span {
                color: var(--fg-muted);
            }
            .breadcrumb .sep {
                color: var(--fg-subtle);
            }

            .step-track {
                display: flex;
                align-items: center;
                gap: 0;
                margin-left: auto;
            }

            .step-item {
                display: flex;
                align-items: center;
                gap: var(--s2);
            }

            .step-node {
                width: 24px;
                height: 24px;
                border-radius: 50%;
                border: 1.5px solid var(--border-strong);
                display: grid;
                place-items: center;
                font-size: 10px;
                font-weight: 600;
                color: var(--fg-subtle);
                font-family: var(--font-mono);
                transition: all var(--duration) var(--ease);
                background: var(--bg);
            }

            .step-node.active {
                border-color: var(--accent);
                background: var(--accent);
                color: white;
            }

            .step-node.done {
                border-color: var(--success);
                background: var(--success);
                color: white;
            }

            .step-connector {
                width: 32px;
                height: 1px;
                background: var(--border);
            }

            .page-title {
                font-size: clamp(20px, 3vw, 26px);
                font-weight: 700;
                letter-spacing: -0.5px;
                color: var(--fg);
                line-height: 1.2;
                margin-bottom: var(--s2);
            }

            .page-desc {
                font-size: 14px;
                color: var(--fg-muted);
                line-height: 1.6;
                max-width: 540px;
            }

            /* ─── CARD ───────────────────────────────────────── */
            .card {
                background: var(--bg-elevated);
                border: 1px solid var(--border);
                border-radius: var(--radius-xl);
                box-shadow: var(--shadow-xs);
                overflow: hidden;
            }

            .card-header {
                padding: var(--s5) var(--s6);
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: var(--s4);
            }

            .card-title {
                font-size: 14px;
                font-weight: 600;
                color: var(--fg);
                letter-spacing: -0.15px;
            }

            .card-body {
                padding: var(--s6);
            }

            .card-footer {
                padding: var(--s4) var(--s6);
                border-top: 1px solid var(--border);
                background: var(--bg-subtle);
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: var(--s4);
            }

            /* ─── FORM ───────────────────────────────────────── */
            .form-grid {
                display: grid;
                gap: var(--s5);
            }

            @media (min-width: 640px) {
                .form-grid-2 {
                    grid-template-columns: 1fr 1fr;
                }
            }

            .field {
                display: flex;
                flex-direction: column;
                gap: var(--s2);
            }

            .field-label {
                font-size: 13px;
                font-weight: 500;
                color: var(--fg-muted);
                letter-spacing: -0.1px;
            }

            .field-label .required {
                color: var(--error);
                margin-left: 2px;
            }

            .input-wrap {
                position: relative;
            }

            .input-icon {
                position: absolute;
                left: 12px;
                top: 50%;
                transform: translateY(-50%);
                color: var(--fg-subtle);
                font-size: 13px;
                pointer-events: none;
                z-index: 1;
            }

            .field-input {
                width: 100%;
                height: 40px;
                padding: 0 var(--s3);
                border: 1px solid var(--border);
                border-radius: var(--radius-md);
                background: var(--bg);
                color: var(--fg);
                font-family: var(--font-sans);
                font-size: 14px;
                outline: none;
                transition:
                    border-color var(--duration-fast) var(--ease),
                    box-shadow var(--duration-fast) var(--ease),
                    background var(--duration-fast) var(--ease);
                -webkit-appearance: none;
            }

            .field-input.has-icon {
                padding-left: 36px;
            }

            .field-input::placeholder {
                color: var(--fg-subtle);
                font-size: 14px;
            }

            .field-input:hover:not(:focus) {
                border-color: var(--border-strong);
            }

            .field-input:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px
                    color-mix(in srgb, var(--accent) 15%, transparent);
            }

            .field-input.invalid {
                border-color: var(--error);
                box-shadow: 0 0 0 3px
                    color-mix(in srgb, var(--error) 12%, transparent);
            }

            .field-hint {
                font-size: 12px;
                color: var(--fg-subtle);
            }

            .field-error {
                font-size: 12px;
                color: var(--error);
                display: none;
            }

            .field-error.visible {
                display: block;
            }

            /* ─── BUTTONS ────────────────────────────────────── */
            .btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: var(--s2);
                height: 40px;
                padding: 0 var(--s5);
                border-radius: var(--radius-md);
                font-family: var(--font-sans);
                font-size: 14px;
                font-weight: 500;
                cursor: pointer;
                border: 1px solid transparent;
                text-decoration: none;
                white-space: nowrap;
                letter-spacing: -0.1px;
                transition:
                    background var(--duration-fast) var(--ease),
                    border-color var(--duration-fast) var(--ease),
                    box-shadow var(--duration-fast) var(--ease),
                    transform var(--duration-fast) var(--ease),
                    opacity var(--duration-fast) var(--ease);
                flex-shrink: 0;
                line-height: 1;
                -webkit-user-select: none;
                user-select: none;
            }

            .btn:active {
                transform: scale(0.98);
            }
            .btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
                pointer-events: none;
            }

            .btn-default {
                background: var(--bg);
                border-color: var(--border);
                color: var(--fg);
                box-shadow: var(--shadow-xs);
            }

            .btn-default:hover {
                background: var(--bg-muted);
                border-color: var(--border-strong);
            }

            .btn-primary {
                background: var(--fg);
                color: var(--bg);
                border-color: var(--fg);
                box-shadow: var(--shadow-sm);
            }

            .btn-primary:hover {
                opacity: 0.88;
            }

            .btn-accent {
                background: var(--accent);
                color: white;
                border-color: var(--accent);
                box-shadow: 0 1px 3px
                    color-mix(in srgb, var(--accent) 30%, transparent);
            }

            .btn-accent:hover {
                background: var(--accent-hover);
                border-color: var(--accent-hover);
            }

            .btn-ghost {
                background: transparent;
                color: var(--fg-muted);
                border-color: transparent;
            }

            .btn-ghost:hover {
                background: var(--bg-muted);
                color: var(--fg);
            }

            .btn-sm {
                height: 32px;
                padding: 0 var(--s3);
                font-size: 13px;
                border-radius: var(--radius);
            }
            .btn-lg {
                height: 44px;
                padding: 0 var(--s6);
                font-size: 15px;
                border-radius: var(--radius-lg);
            }
            .btn-xl {
                height: 48px;
                padding: 0 var(--s8);
                font-size: 15px;
                font-weight: 600;
                border-radius: var(--radius-lg);
            }
            .btn-full {
                width: 100%;
            }

            .btn-icon {
                width: 40px;
                padding: 0;
            }

            /* ─── BADGE ──────────────────────────────────────── */
            .badge {
                display: inline-flex;
                align-items: center;
                gap: 4px;
                height: 22px;
                padding: 0 var(--s2);
                border-radius: var(--radius);
                font-size: 11px;
                font-weight: 600;
                letter-spacing: 0.02em;
                font-family: var(--font-mono);
                border: 1px solid transparent;
            }

            .badge-default {
                background: var(--bg-muted);
                color: var(--fg-muted);
                border-color: var(--border);
            }
            .badge-accent {
                background: var(--accent-subtle);
                color: var(--accent-fg);
                border-color: var(--accent-border);
            }
            .badge-success {
                background: var(--success-subtle);
                color: var(--success);
                border-color: var(--success-border);
            }
            .badge-error {
                background: var(--error-subtle);
                color: var(--error);
                border-color: var(--error-border);
            }
            .badge-warning {
                background: var(--warning-subtle);
                color: var(--warning);
                border-color: var(--warning-border);
            }

            /* ─── SHIMMER ────────────────────────────────────── */
            .shimmer {
                background: linear-gradient(
                    90deg,
                    var(--bg-muted) 0%,
                    var(--bg-subtle) 40%,
                    var(--bg-muted) 80%
                );
                background-size: 600px 100%;
                animation: shimmer 1.4s ease-in-out infinite;
                border-radius: var(--radius);
            }

            [data-theme="dark"] .shimmer,
            @media (prefers-color-scheme: dark) {
                .shimmer {
                    background: linear-gradient(
                        90deg,
                        var(--bg-muted) 0%,
                        #222222 40%,
                        var(--bg-muted) 80%
                    );
                    background-size: 600px 100%;
                }
            }

            .shimmer-line {
                height: 14px;
                width: 100%;
                margin-bottom: var(--s3);
                border-radius: var(--radius);
            }
            .shimmer-line.w-3-4 {
                width: 75%;
            }
            .shimmer-line.w-1-2 {
                width: 50%;
            }
            .shimmer-line.w-1-3 {
                width: 33%;
            }
            .shimmer-block {
                border-radius: var(--radius-md);
            }

            /* Quiz shimmer */
            .quiz-shimmer {
                display: flex;
                flex-direction: column;
                gap: var(--s4);
            }

            .quiz-shimmer-card {
                background: var(--bg-elevated);
                border: 1px solid var(--border);
                border-radius: var(--radius-xl);
                padding: var(--s5) var(--s6);
            }

            .quiz-shimmer-card .shimmer-line {
                display: block;
            }

            .shimmer-option {
                height: 44px;
                width: 100%;
                border-radius: var(--radius-md);
                margin-bottom: var(--s2);
            }

            /* ─── SEPARATOR ──────────────────────────────────── */
            .sep {
                height: 1px;
                background: var(--border);
                margin: var(--s6) 0;
            }

            /* ─── QUESTION COUNT SELECTOR ────────────────────── */
            .count-selector {
                display: flex;
                gap: var(--s2);
                flex-wrap: wrap;
            }

            .count-opt {
                height: 36px;
                padding: 0 var(--s4);
                border: 1px solid var(--border);
                border-radius: var(--radius-md);
                background: var(--bg);
                color: var(--fg-muted);
                font-family: var(--font-mono);
                font-size: 14px;
                font-weight: 500;
                cursor: pointer;
                transition: all var(--duration-fast) var(--ease);
                box-shadow: var(--shadow-xs);
                -webkit-user-select: none;
                user-select: none;
            }

            .count-opt:hover {
                border-color: var(--border-strong);
                color: var(--fg);
                background: var(--bg-muted);
            }
            .count-opt:active {
                transform: scale(0.97);
            }

            .count-opt.active {
                background: var(--fg);
                color: var(--bg);
                border-color: var(--fg);
                box-shadow: var(--shadow-sm);
            }

            /* ─── TOPIC SUGGESTIONS ──────────────────────────── */
            .topic-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: var(--s2);
            }

            @media (min-width: 480px) {
                .topic-grid {
                    grid-template-columns: repeat(3, 1fr);
                }
            }
            @media (min-width: 768px) {
                .topic-grid {
                    grid-template-columns: repeat(4, 1fr);
                }
            }

            .topic-pill {
                display: flex;
                align-items: center;
                gap: var(--s2);
                height: 36px;
                padding: 0 var(--s3);
                border: 1px solid var(--border);
                border-radius: var(--radius-md);
                background: var(--bg);
                color: var(--fg-muted);
                font-size: 13px;
                font-weight: 500;
                cursor: pointer;
                transition: all var(--duration-fast) var(--ease);
                font-family: var(--font-sans);
                box-shadow: var(--shadow-xs);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .topic-pill:hover {
                border-color: var(--accent-border);
                color: var(--accent-fg);
                background: var(--accent-subtle);
            }

            /* ─── QUIZ LAYOUT ────────────────────────────────── */
            .quiz-topbar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: var(--s4);
                margin-bottom: var(--s6);
                padding-bottom: var(--s6);
                border-bottom: 1px solid var(--border);
                flex-wrap: wrap;
            }

            .quiz-meta {
                display: flex;
                align-items: center;
                gap: var(--s3);
            }

            .quiz-topic-badge {
                display: inline-flex;
                align-items: center;
                gap: var(--s2);
                height: 30px;
                padding: 0 var(--s3);
                background: var(--bg-muted);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                font-size: 12px;
                font-weight: 500;
                color: var(--fg-muted);
                max-width: 200px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .quiz-progress-inline {
                display: flex;
                align-items: center;
                gap: var(--s3);
                flex-wrap: wrap;
            }

            .progress-bar-wrap {
                display: flex;
                align-items: center;
                gap: var(--s3);
            }

            .progress-bar-track {
                width: 120px;
                height: 4px;
                background: var(--bg-muted);
                border-radius: 2px;
                overflow: hidden;
            }

            @media (min-width: 480px) {
                .progress-bar-track {
                    width: 180px;
                }
            }

            .progress-bar-fill {
                height: 100%;
                background: var(--accent);
                border-radius: 2px;
                transition: width 0.4s var(--ease-out);
            }

            .progress-text {
                font-size: 13px;
                font-weight: 600;
                color: var(--fg-muted);
                font-family: var(--font-mono);
                white-space: nowrap;
            }

            /* ─── QUESTIONS LIST ─────────────────────────────── */
            .questions-list {
                display: flex;
                flex-direction: column;
                gap: var(--s3);
            }

            /* ─── QUESTION CARD ──────────────────────────────── */
            .q-card {
                background: var(--bg-elevated);
                border: 1px solid var(--border);
                border-radius: var(--radius-xl);
                overflow: hidden;
                transition: border-color var(--duration) var(--ease);
                animation: fadeUp var(--duration-slow) var(--ease-out) both;
            }

            .q-card.answered {
                border-color: color-mix(
                    in srgb,
                    var(--accent) 30%,
                    var(--border)
                );
            }
            .q-card.flagged {
                border-color: color-mix(
                    in srgb,
                    var(--warning) 40%,
                    var(--border)
                );
            }
            .q-card.highlight-unanswered {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px
                    color-mix(in srgb, var(--accent) 15%, transparent);
            }

            .q-card-head {
                display: flex;
                align-items: flex-start;
                justify-content: space-between;
                gap: var(--s3);
                padding: var(--s4) var(--s5) 0;
            }

            .q-number-row {
                display: flex;
                align-items: center;
                gap: var(--s2);
            }

            .q-num {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 22px;
                height: 22px;
                border-radius: var(--radius);
                background: var(--bg-muted);
                border: 1px solid var(--border);
                font-size: 11px;
                font-weight: 700;
                color: var(--fg-muted);
                font-family: var(--font-mono);
                flex-shrink: 0;
            }

            .q-card.answered .q-num {
                background: var(--accent-subtle);
                border-color: var(--accent-border);
                color: var(--accent-fg);
            }

            .q-label {
                font-size: 11px;
                font-weight: 500;
                color: var(--fg-subtle);
                font-family: var(--font-mono);
                letter-spacing: 0.04em;
                text-transform: uppercase;
            }

            .q-status-badge {
                font-size: 10px;
                height: 20px;
                padding: 0 var(--s2);
                border-radius: var(--radius-sm);
                font-weight: 600;
                letter-spacing: 0.04em;
                font-family: var(--font-mono);
                display: inline-flex;
                align-items: center;
                gap: 4px;
                white-space: nowrap;
            }

            .q-status-badge.answered-badge {
                background: var(--accent-subtle);
                color: var(--accent-fg);
                border: 1px solid var(--accent-border);
            }

            .q-status-badge.unanswered-badge {
                background: var(--warning-subtle);
                color: var(--warning);
                border: 1px solid var(--warning-border);
                display: none;
            }

            .q-card.highlight-unanswered .q-status-badge.unanswered-badge {
                display: inline-flex;
            }

            .q-text {
                font-size: 15px;
                line-height: 1.6;
                color: var(--fg);
                font-weight: 400;
                padding: var(--s3) var(--s5);
            }

            .q-options {
                display: flex;
                flex-direction: column;
                gap: var(--s2);
                padding: 0 var(--s5) var(--s5);
            }

            /* ─── OPTION ROW ─────────────────────────────────── */
            .opt-row {
                display: flex;
                align-items: center;
                gap: var(--s3);
                padding: 10px var(--s4);
                border: 1px solid var(--border);
                border-radius: var(--radius-md);
                cursor: pointer;
                background: var(--bg-subtle);
                transition:
                    border-color var(--duration-fast) var(--ease),
                    background var(--duration-fast) var(--ease),
                    color var(--duration-fast) var(--ease);
                font-family: var(--font-sans);
                text-align: left;
                width: 100%;
            }

            .opt-row:hover {
                border-color: var(--accent-border);
                background: var(--accent-subtle);
            }

            .opt-row:active {
                transform: scale(0.995);
            }

            .opt-row.selected {
                border-color: var(--accent);
                background: var(--accent-subtle);
            }

            .opt-radio {
                width: 16px;
                height: 16px;
                border-radius: 50%;
                border: 1.5px solid var(--border-strong);
                flex-shrink: 0;
                display: grid;
                place-items: center;
                transition: all var(--duration-fast) var(--ease);
                background: var(--bg);
            }

            .opt-row.selected .opt-radio {
                border-color: var(--accent);
                background: var(--accent);
            }

            .opt-radio-inner {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: white;
                transform: scale(0);
                transition: transform var(--duration-fast) var(--ease-spring);
            }

            .opt-row.selected .opt-radio-inner {
                transform: scale(1);
                animation: checkBounce 0.2s var(--ease-spring);
            }

            .opt-text {
                font-size: 14px;
                color: var(--fg-muted);
                line-height: 1.4;
                flex: 1;
            }

            .opt-row.selected .opt-text {
                color: var(--accent-fg);
                font-weight: 500;
            }

            /* ─── STICKY SUBMIT BAR ──────────────────────────── */
            .submit-bar {
                position: sticky;
                bottom: 0;
                z-index: 30;
                background: color-mix(in srgb, var(--bg) 92%, transparent);
                backdrop-filter: blur(16px) saturate(160%);
                -webkit-backdrop-filter: blur(16px) saturate(160%);
                border-top: 1px solid var(--border);
                padding: var(--s4) var(--s6);
                padding-bottom: max(var(--s4), env(safe-area-inset-bottom));
                display: none;
            }

            .submit-bar.visible {
                display: block;
            }

            .submit-bar-inner {
                max-width: 1200px;
                margin: 0 auto;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: var(--s6);
            }

            .submit-stat {
                display: flex;
                align-items: center;
                gap: var(--s4);
                flex: 1;
                min-width: 0;
            }

            .submit-stat-item {
                display: flex;
                align-items: center;
                gap: var(--s2);
            }

            .submit-stat-num {
                font-size: 20px;
                font-weight: 700;
                letter-spacing: -0.5px;
                color: var(--fg);
                font-family: var(--font-mono);
            }

            .submit-stat-label {
                font-size: 12px;
                color: var(--fg-subtle);
                line-height: 1.3;
            }

            .submit-stat-divider {
                width: 1px;
                height: 24px;
                background: var(--border);
                flex-shrink: 0;
            }

            .submit-actions {
                display: flex;
                align-items: center;
                gap: var(--s3);
                flex-shrink: 0;
            }

            /* ─── MODAL ──────────────────────────────────────── */
            .modal-overlay {
                position: fixed;
                inset: 0;
                z-index: 50;
                background: color-mix(
                    in srgb,
                    var(--gray-950) 55%,
                    transparent
                );
                backdrop-filter: blur(4px);
                -webkit-backdrop-filter: blur(4px);
                display: grid;
                place-items: center;
                padding: var(--s6);
                opacity: 0;
                pointer-events: none;
                transition: opacity var(--duration-slow) var(--ease);
            }

            .modal-overlay.open {
                opacity: 1;
                pointer-events: all;
            }

            .modal-box {
                background: var(--bg-elevated);
                border: 1px solid var(--border);
                border-radius: var(--radius-2xl);
                box-shadow: var(--shadow-2xl);
                width: 100%;
                max-width: 440px;
                overflow: hidden;
                transform: scale(0.96) translateY(8px);
                transition: transform var(--duration-slow) var(--ease-spring);
            }

            .modal-overlay.open .modal-box {
                transform: scale(1) translateY(0);
                animation: modalIn 0.25s var(--ease-spring);
            }

            .modal-header {
                padding: var(--s6) var(--s6) var(--s4);
                display: flex;
                align-items: flex-start;
                gap: var(--s4);
            }

            .modal-icon-wrap {
                width: 40px;
                height: 40px;
                border-radius: var(--radius-md);
                background: var(--warning-subtle);
                border: 1px solid var(--warning-border);
                display: grid;
                place-items: center;
                font-size: 16px;
                flex-shrink: 0;
            }

            .modal-title {
                font-size: 16px;
                font-weight: 600;
                color: var(--fg);
                letter-spacing: -0.2px;
                margin-bottom: 4px;
            }

            .modal-desc {
                font-size: 13px;
                color: var(--fg-muted);
                line-height: 1.6;
            }

            .modal-body {
                padding: 0 var(--s6) var(--s5);
            }

            .modal-footer {
                padding: var(--s4) var(--s6) var(--s6);
                display: flex;
                flex-direction: column;
                gap: var(--s2);
            }

            @media (min-width: 480px) {
                .modal-footer {
                    flex-direction: row-reverse;
                    justify-content: flex-start;
                }
            }

            /* ─── RESULTS ────────────────────────────────────── */
            .results-layout {
                display: grid;
                gap: var(--s6);
                animation: fadeUp 0.3s var(--ease-out) both;
            }

            @media (min-width: 768px) {
                .results-layout {
                    grid-template-columns: 1fr 320px;
                    align-items: start;
                }
            }

            .score-display {
                background: var(--bg-elevated);
                border: 1px solid var(--border);
                border-radius: var(--radius-xl);
                padding: var(--s8) var(--s6);
                text-align: center;
                box-shadow: var(--shadow-xs);
            }

            .score-ring-container {
                width: 120px;
                height: 120px;
                margin: 0 auto var(--s5);
                position: relative;
            }

            .score-ring-svg {
                width: 120px;
                height: 120px;
                transform: rotate(-90deg);
            }

            .score-ring-bg {
                fill: none;
                stroke: var(--bg-muted);
                stroke-width: 8;
            }

            .score-ring-arc {
                fill: none;
                stroke-width: 8;
                stroke-linecap: round;
                stroke-dasharray: 339.29;
                stroke-dashoffset: 339.29;
                transition: stroke-dashoffset 1.3s var(--ease-out);
            }

            .score-ring-arc.pass {
                stroke: var(--success);
            }
            .score-ring-arc.fail {
                stroke: var(--error);
            }

            .score-ring-center {
                position: absolute;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 2px;
            }

            .score-pct {
                font-size: 28px;
                font-weight: 800;
                letter-spacing: -1px;
                line-height: 1;
                font-family: var(--font-mono);
            }

            .score-pct.pass {
                color: var(--success);
            }
            .score-pct.fail {
                color: var(--error);
            }

            .score-pct-label {
                font-size: 10px;
                color: var(--fg-subtle);
                font-weight: 500;
            }

            .score-verdict {
                font-size: 22px;
                font-weight: 700;
                letter-spacing: -0.4px;
                color: var(--fg);
                margin-bottom: var(--s2);
            }

            .score-detail {
                font-size: 13px;
                color: var(--fg-muted);
                margin-bottom: var(--s6);
            }

            .score-stats {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: var(--s3);
            }

            .stat-box {
                background: var(--bg-subtle);
                border: 1px solid var(--border);
                border-radius: var(--radius-md);
                padding: var(--s3) var(--s2);
                text-align: center;
            }

            .stat-box-num {
                font-size: 22px;
                font-weight: 800;
                letter-spacing: -0.5px;
                font-family: var(--font-mono);
                display: block;
                line-height: 1;
                margin-bottom: 4px;
            }

            .stat-box-label {
                font-size: 11px;
                color: var(--fg-subtle);
                font-weight: 500;
            }

            /* Results panel */
            .results-panel {
                display: flex;
                flex-direction: column;
                gap: var(--s4);
            }

            .panel-card {
                background: var(--bg-elevated);
                border: 1px solid var(--border);
                border-radius: var(--radius-xl);
                overflow: hidden;
                box-shadow: var(--shadow-xs);
            }

            .panel-card-head {
                padding: var(--s4) var(--s5);
                border-bottom: 1px solid var(--border);
                font-size: 13px;
                font-weight: 600;
                color: var(--fg);
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            .panel-list {
            }

            .panel-list-item {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: var(--s3);
                padding: var(--s3) var(--s5);
                border-bottom: 1px solid var(--border);
                font-size: 13px;
            }

            .panel-list-item:last-child {
                border-bottom: none;
            }

            .panel-list-label {
                color: var(--fg-muted);
            }
            .panel-list-value {
                font-weight: 600;
                color: var(--fg);
                font-family: var(--font-mono);
            }

            /* Review section */
            .review-list {
                display: flex;
                flex-direction: column;
                gap: var(--s3);
                margin-top: var(--s2);
            }

            .review-card {
                background: var(--bg-elevated);
                border: 1px solid var(--border);
                border-radius: var(--radius-xl);
                overflow: hidden;
                box-shadow: var(--shadow-xs);
                animation: fadeUp 0.25s var(--ease-out) both;
            }

            .review-card.correct {
                border-color: color-mix(
                    in srgb,
                    var(--success) 25%,
                    var(--border)
                );
            }
            .review-card.incorrect {
                border-color: color-mix(
                    in srgb,
                    var(--error) 20%,
                    var(--border)
                );
            }

            .review-card-head {
                display: flex;
                align-items: flex-start;
                gap: var(--s3);
                padding: var(--s4) var(--s5);
            }

            .review-icon {
                width: 22px;
                height: 22px;
                border-radius: var(--radius);
                display: grid;
                place-items: center;
                font-size: 9px;
                flex-shrink: 0;
                margin-top: 2px;
            }

            .review-icon.correct {
                background: var(--success-subtle);
                color: var(--success);
                border: 1px solid var(--success-border);
            }
            .review-icon.incorrect {
                background: var(--error-subtle);
                color: var(--error);
                border: 1px solid var(--error-border);
            }
            .review-icon.skipped {
                background: var(--bg-muted);
                color: var(--fg-subtle);
                border: 1px solid var(--border);
            }

            .review-q-text {
                font-size: 13.5px;
                line-height: 1.5;
                color: var(--fg);
                flex: 1;
            }

            .review-answers {
                padding: 0 var(--s5) var(--s4);
                display: flex;
                flex-direction: column;
                gap: var(--s2);
                padding-left: calc(var(--s5) + 22px + var(--s3));
            }

            .review-answer-row {
                display: flex;
                align-items: flex-start;
                gap: var(--s2);
                font-size: 12.5px;
                padding: var(--s2) var(--s3);
                border-radius: var(--radius);
                border: 1px solid transparent;
            }

            .review-answer-row.user-correct {
                background: var(--success-subtle);
                border-color: var(--success-border);
                color: var(--success);
            }
            .review-answer-row.user-wrong {
                background: var(--error-subtle);
                border-color: var(--error-border);
                color: var(--error);
                text-decoration: line-through;
            }
            .review-answer-row.correct-ans {
                background: var(--accent-subtle);
                border-color: var(--accent-border);
                color: var(--accent-fg);
            }
            .review-answer-row.skipped-row {
                background: var(--bg-muted);
                color: var(--fg-subtle);
                border-color: var(--border);
            }

            .review-answer-tag {
                font-size: 10px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                opacity: 0.7;
                white-space: nowrap;
                font-family: var(--font-mono);
            }

            /* ─── EMPTY / ERROR STATES ───────────────────────── */
            .state-container {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: var(--s16) var(--s6);
                text-align: center;
                min-height: 40vh;
            }

            .state-icon {
                width: 52px;
                height: 52px;
                border-radius: var(--radius-lg);
                display: grid;
                place-items: center;

            /* ── THEME ── */
            window.toggleTheme = function () {
                const html = document.documentElement;
                const current = html.getAttribute("data-theme");
                const mq = window.matchMedia("(prefers-color-scheme: dark)");
                if (current === "dark" || (!current && mq.matches)) {
                    html.setAttribute("data-theme", "light");
                } else {
                    html.setAttribute("data-theme", "dark");
                }
            };

            // Init theme from system
            (function () {
                if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
                    document.documentElement.setAttribute("data-theme", "dark");
                }
            })();

            /* ── FIREBASE INIT ── */

    </div>`);
                try {
                    const app = initializeApp(firebaseConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);
                    await signInAnonymously(auth);
                    onAuthStateChanged(auth, (user) => {
                        if (user) {
                            currentUser = user;
                            setProgress(8);
                            setBadge("Connected");
                            renderRegistration();

                    renderError(

            /* ── REGISTRATION ── */

                hideSubmitBar();
                setBadge("Step 1 / 3");
                setProgress(12);
                setView(`
