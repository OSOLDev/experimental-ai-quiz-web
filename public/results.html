      <span class="badge badge-default">${r.details.length}q</span>
    </div>
    <div style="height:var(--s4)"></div>
    <div class="q-list">`;
                    r.details.forEach((item, i) => {
                        const isSk =
                            item.skipped || item.selectedAnswer == null;
                        const cls = isSk ? "sk" : item.isCorrect ? "ok" : "ng";
                        const icon = isSk
                            ? "fa-minus"
                            : item.isCorrect
                              ? "fa-check"
                              : "fa-xmark";
                        h += `
        <div class="q-row ${cls}">
          <div class="q-row-inner">
            <div class="q-icon ${cls}"><i class="fa-solid ${icon}"></i></div>
            <div class="q-text"><strong style="font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle)">${i + 1}.</strong> ${esc(item.question)}</div>
          </div>
          <div class="q-answers">
            ${
                isSk
                    ? `<span class="answer-chip sk"><i class="fa-solid fa-minus" style="font-size:8px"></i>Skipped</span>
                 <span class="answer-chip ca"><i class="fa-solid fa-check" style="font-size:8px;opacity:.7"></i>${esc(item.correctAnswer)}</span>`
                    : item.isCorrect
                      ? `<span class="answer-chip ok"><i class="fa-solid fa-check" style="font-size:8px"></i>${esc(item.selectedAnswer)}</span>`
                      : `<span class="answer-chip ng"><i class="fa-solid fa-xmark" style="font-size:8px"></i>${esc(item.selectedAnswer)}</span>
                   <span class="answer-chip ca"><i class="fa-solid fa-check" style="font-size:8px;opacity:.7"></i>${esc(item.correctAnswer)}</span>`
            }
          </div>
        </div>`;
                    });
                    h += `</div>`;
                } else {
                    h += `<div style="text-align:center;padding:var(--s10);color:var(--fg-subtle);font-size:13px">No answer details available.</div>`;
                }

                document.getElementById("modal-body").innerHTML = h;
                document.getElementById("modal-overlay").classList.add("open");
                document.body.style.overflow = "hidden";
            };

            window.closeModal = function () {
                document
                    .getElementById("modal-overlay")
                    .classList.remove("open");
                document.body.style.overflow = "";
                activeId = null;
            };

            window.handleModalBackdrop = function (e) {
                if (e.target === document.getElementById("modal-overlay"))
                    closeModal();
            };

            window.promptDelete = () => {
                document.getElementById("del-init").style.display = "none";
                document.getElementById("del-confirm").classList.add("visible");
            };
            window.cancelDelete = () => {
                document.getElementById("del-init").style.display = "";
                document
                    .getElementById("del-confirm")
                    .classList.remove("visible");
            };

            window.confirmDelete = async function () {
                if (!activeId) return;
                const id = activeId;
                const btn = document.getElementById("del-confirm-btn");
                btn.disabled = true;
                btn.innerHTML =
                    '<i class="fa-solid fa-spinner fa-spin" style="font-size:10px"></i> Deleting…';
                try {
                    await deleteDoc(doc(db, ...COL, id));
                    all = all.filter((r) => r.id !== id);
                    fil = fil.filter((r) => r.id !== id);
                    animateRowOut(id);
                    setTimeout(() => {
                        closeModal();
                        refreshStats();
                        if (pg > Math.ceil(fil.length / PER) && pg > 1) pg--;
                        applyFilters();
                    }, 320);
                } catch (e) {
                    btn.disabled = false;
                    btn.innerHTML =
                        '<i class="fa-solid fa-trash" style="font-size:10px"></i> Yes, delete';
                    alert("Failed to delete: " + e.message);
                }
            };

            window.quickDelete = async function (id, btnEl) {
                if (!confirm("Delete this record? This cannot be undone."))
                    return;
                btnEl.disabled = true;
                btnEl.innerHTML =
                    '<i class="fa-solid fa-spinner fa-spin" style="font-size:9px"></i>';
                try {
                    await deleteDoc(doc(db, ...COL, id));
                    all = all.filter((r) => r.id !== id);
                    fil = fil.filter((r) => r.id !== id);
                    animateRowOut(id);
                    setTimeout(() => {
                        refreshStats();
                        if (pg > Math.ceil(fil.length / PER) && pg > 1) pg--;
                        applyFilters();
                    }, 320);
                } catch (e) {
                    btnEl.disabled = false;
                    btnEl.innerHTML = '<i class="fa-solid fa-trash"></i>';
                    alert("Failed to delete: " + e.message);
                }
            };

            function animateRowOut(id) {
                document.querySelectorAll("#table-body tr").forEach((tr) => {
                    if (tr.dataset.id === id) tr.classList.add("row-exit");
                });
            }

            function showTableError(msg) {
                setShimmer(false);
                const empty = document.getElementById("table-empty");
                const real = document.getElementById("table-real");
                real.style.display = "none";
                empty.style.display = "block";
                empty.innerHTML = `
    <div class="empty-state">
      <div class="empty-icon"><i class="fa-solid fa-triangle-exclamation" style="color:var(--error)"></i></div>
      <div class="empty-title">Failed to load results</div>
      <div class="empty-sub">${esc(msg)}</div>
    </div>`;
            }

            function esc(s) {
                return String(s ?? "")
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;");
            }

            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape") closeModal();
            });

            boot();
        </script>
    </body>
</html>
